<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>胶囊竖列版 - 婚礼场馆展示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Pinyon+Script&family=Dancing+Script:wght@400;700&family=Pacifico&family=Sacramento&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.topbar a{color:#888;font-size:18px;text-decoration:none;}
.topbar .lbl{font-size:12px;color:#666;}
.credits{background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;margin-left:auto;}
.logout-btn{padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;}
.main{display:flex;flex:1;overflow:hidden;}
.sb{width:188px;flex-shrink:0;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;}
.sb-head{padding:12px;border-bottom:1px solid #1e1e1e;}
.sb-head h2{font-size:13px;font-weight:500;}
.sb-head p{font-size:10px;color:#555;margin-top:2px;}
.sb-new{margin:10px;padding:7px;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;background:#161616;}
.sb-new:hover{border-color:#666;color:#ccc;}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.pi{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.pi:hover{background:#1a1a1a;}.pi.on{background:#1a1a1a;border-color:#2a2a2a;}
.pi h3{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi p{font-size:9px;color:#555;margin-top:2px;}
.pi-acts{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.pi-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pi-btn:hover{border-color:#555;color:#aaa;}.pi-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-top{height:44px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.pname::placeholder{color:#444;}
.lsw{display:flex;gap:3px;background:#111;padding:3px;border-radius:6px;border:1px solid #2a2a2a;}
.lsw-btn{padding:3px 9px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;background:none;color:#666;}
.lsw-btn.on{background:#2a2a2a;color:#fff;}
.exp-btn{padding:6px 14px;background:#c8392b;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto;}
.exp-btn:hover{background:#a02d22;}
.ed-body{display:flex;flex:1;overflow:hidden;}
.canvas{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
#poster{box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;flex-shrink:0;}
.rp{width:252px;flex-shrink:0;background:#111;border-left:1px solid #1e1e1e;overflow-y:auto;padding:12px 10px;}
.rp-t{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.sec{margin-top:10px;padding-top:9px;border-top:1px solid #1a1a1a;}
.sec-t{font-size:10px;color:#aaa;letter-spacing:.5px;margin-bottom:7px;font-weight:500;}
.lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:5px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.sel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.num{width:56px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.unit{font-size:9px;color:#555;}
.sld{flex:1;accent-color:#c8392b;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;text-align:center;margin-top:3px;font-family:inherit;}
.img-btn:hover{border-color:#555;color:#ccc;}
.col-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.ct{padding:4px 9px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;}
.ct.on{background:#2a2a2a;color:#fff;border-color:#444;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">←</a>
  <span class="lbl">胶囊竖列版</span>
  <span class="credits" id="wp-credits"></span>
  <button class="logout-btn" onclick="wpLogout()">退出</button>
</div>
<div class="main">
  <div class="sb">
    <div class="sb-head"><h2>项目</h2><p>胶囊竖列版</p></div>
    <div class="sb-new" onclick="newProj()">＋ 新建项目</div>
    <div class="sb-list" id="proj-list"></div>
    <div style="padding:8px;border-top:1px solid #1e1e1e;flex-shrink:0;">
      <div class="sb-new" style="margin:0;" onclick="importProjJSON()">↑ 导入备份 JSON</div>
    </div>
  </div>
  <div class="editor">
    <div class="ed-top">
      <input class="pname" id="pname" placeholder="项目名称" oninput="onNameChange()">
      <div class="lsw" id="lsw" style="display:none;">
        <button class="lsw-btn" onclick="setCols(3)">3列</button>
        <button class="lsw-btn" onclick="setCols(4)">4列</button>
        <button class="lsw-btn" onclick="setCols(5)">5列</button>
        <button class="lsw-btn" onclick="setCols(6)">6列</button>

      <button class="exp-btn" id="exp-btn" onclick="doExport()">↓ 导出 PNG 1200×1600</button>

    <div class="ed-body">

      <div class="rp" id="rp"><div style="color:#333;font-size:12px;padding:20px 0;text-align:center;">新建或选择项目</div></div>
    </div>
  </div>
</div>
<script>
// ══ Auth ══════════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const el=document.getElementById('wp-credits');if(el)el.textContent='测试模式';return true;}

function updCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost')return true;

  if((_lic.credits||0)<=0){alert('次数已用完，请充值');return false;}

    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);updCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ══ DB ════════════════════════════════════════════════════════════
let DB=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('capsule-v1',1);q.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:{});});};q.onsuccess=e=>{DB=e.target.result;r();};q.onerror=j;});}
const tx=(s,m='readonly')=>DB.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ══ 常量 ══════════════════════════════════════════════════════════
const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Great Vibes','Pinyon Script','Dancing Script','Sacramento','Pacifico','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC','Arial'];
const SCRIPT_FONTS=['Great Vibes','Pinyon Script','Dancing Script','Sacramento','Pacifico','Cormorant Garamond'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid,i)=>`cap-img-${pid}-${i}`;

// ══ 默认值 ════════════════════════════════════════════════════════
// 布局（1200×1600px）:
// 顶部文字区：超大字间距标题
// 中间胶囊图片区：N列竖向图片，奇偶列上下交错，底部白色渐变
// 艺术字区：斜体大字
// 下方文字区：主标题+副标题+标签行+英文段落
function defP(name,cols=6){
  const imgs=Array.from({length:cols},()=>({imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1}));
  return{
    id:uid(),name,ct:Date.now(),at:Date.now(),
    cols,
    bgColor:'#ffffff',
    // 顶部标题
    topTitle:'百万婚礼主题宴会厅',
    topTitleFont:'Noto Serif SC',topTitleSize:34,topTitleWeight:'300',topTitleColor:'#1a1a1a',
    topTitleY:49,topTitleLS:2.2,
    // 胶囊图片区
    colAreaY:150,
    colAreaH:876,
    colPad:26,
    colGap:14,
    colRadius:999,
    staggerPx:75,
    gradH:170,
    imgs,
    // 艺术字
    artText:'Art Venue',
    artFont:'Dancing Script',artSize:137,artWeight:'400',artColor:'#c8a06a',
    artY:921,artX:600,artLS:0.09,
    // 主标题
    mainTitle:'北京一站式婚礼场地',
    mainTitleFont:'Noto Serif SC',mainTitleSize:107,mainTitleWeight:'700',mainTitleColor:'#111111',
    mainTitleY:1070,mainTitleLS:0.04,
    subTitle:'「繁景艺术中心」',
    subTitleFont:'Noto Serif SC',subTitleSize:90,subTitleWeight:'700',subTitleColor:'#111111',
    subTitleY:1205,subTitleLS:0.1,
    tagLine:'策划  ｜  场地  ｜  酒席  ｜  四大  ｜  婚纱',
    tagFont:'Noto Serif SC',tagSize:43,tagWeight:'500',tagColor:'#444444',
    tagY:1360,tagLS:0.05,
    enPara:'Among the countless lights, one remains on just for you.  Not in chaos, but with you alone\nA partner is truly important, but it\'s not too late\nBut it has to be the right person, because you are the light of my later years',
    enParaFont:'Cormorant Garamond',enParaSize:18,enParaWeight:'300',enParaColor:'#999999',
    enParaY:1477,enParaLS:0.03,enParaLH:1.4,
  };
}

// ══ Storage ═══════════════════════════════════════════════════════
const imgCache={};
async function saveImg(key,blob){await dbP('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){try{await dbD('I',key);}catch(e){}if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];try{const b=await dbG('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}catch(e){return null;}}
async function save(p){p.at=Date.now();await dbP('P',p);}

// ══ 项目管理 ══════════════════════════════════════════════════════
let projs=[],curId=null,selImg=0;
async function newProj(){
  const n=prompt('项目名称：','未命名');if(!n)return;
  const p=defP(n.trim()||'未命名',6);
  await save(p);projs.unshift(p);renderList();openProj(p.id);
}
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi ${p.id===curId?'on':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><p>${new Date(p.at).toLocaleDateString('zh-CN')} · ${p.cols}列</p>
    <div class="pi-acts">
      <button class="pi-btn" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pi-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pi-btn" onclick="event.stopPropagation();exportProjJSON('${p.id}')">备份</button>
      <button class="pi-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function openProj(id){
  curId=id;selImg=0;const p=cur();if(!p)return;
  document.getElementById('pname').value=p.name;
  document.getElementById('lsw').style.display='flex';
  updateLsw();renderList();await renderPoster();renderRP();
}
function updateLsw(){
  const p=cur();if(!p)return;
  document.querySelectorAll('.lsw-btn').forEach((b,i)=>b.classList.toggle('on',[3,4,5,6][i]===p.cols));
}
async function setCols(n){
  const p=cur();if(!p||p.cols===n)return;
  if(!confirm(`切换为${n}列？已上传的图片数据不受影响。`))return;
  const oldLen=p.imgs.length;
  p.cols=n;
  while(p.imgs.length<n)p.imgs.push({imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1});
  selImg=Math.min(selImg,n-1);
  await save(p);updateLsw();await renderPoster();renderRP();
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function dupProj(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  for(let i=0;i<p.cols;i++){const b=await dbG('I',ik(id,i));if(b){await dbP('I',b,ik(nid,i));np.imgs[i].imgKey=ik(nid,i);}}
  await save(np);projs.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  const p=projs.find(x=>x.id===id);
  if(p){for(let i=0;i<p.imgs.length;i++)await delImg(ik(id,i));}
  await dbD('P',id);projs=projs.filter(x=>x.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';document.getElementById('lsw').style.display='none';renderRP();}
  renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
function exportProjJSON(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const data=JSON.parse(JSON.stringify(p));data.imgs.forEach(img=>img.imgKey=null);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download=(p.name||'project')+'_backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function importProjJSON(){
  const fi=document.createElement('input');fi.type='file';fi.accept='.json,application/json';
  fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const text=await f.text();const data=JSON.parse(text);
      if(!data.id||!data.name)throw new Error('格式错误');
      data.id=uid();data.at=Date.now();data.ct=Date.now();data.name=data.name+' (导入)';
      if(data.imgs)data.imgs.forEach(img=>img.imgKey=null);
      await save(data);projs.unshift(data);renderList();openProj(data.id);
    }catch(err){alert('导入失败：文件格式不正确');}
  };fi.click();
}

// ══ 海报尺寸 ══════════════════════════════════════════════════════
function pSz(){
  const a=document.querySelector('.canvas');
  const aH=a.clientHeight-40,aW=a.clientWidth-40;
  let w,h;
  if(aH*0.75<aW){h=Math.floor(aH);w=Math.floor(h*0.75);}
  else{w=Math.floor(aW);h=Math.floor(w/0.75);}
  return{w,h};
}

// ══ 图片位置计算 ══════════════════════════════════════════════════
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ══ 渲染海报 ══════════════════════════════════════════════════════
async function renderPoster(){
  const el=document.getElementById('poster');
  const p=cur();
  if(!p){el.style.cssText='width:300px;height:400px;background:#fff;';el.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  const n=p.cols;
  const bg=p.bgColor||'#ffffff';

  // 胶囊列计算
  const colPad=Math.round((p.colPad||18)*sc);
  const colGap=Math.round((p.colGap||10)*sc);
  const colAreaY=Math.round((p.colAreaY||90)*sc);
  const colAreaH=Math.round((p.colAreaH||820)*sc);
  const stagger=Math.round((p.staggerPx||60)*sc);
  const rad=Math.round((p.colRadius||999)*sc);
  const gradH=Math.round((p.gradH||200)*sc);
  const colW=Math.floor((w-colPad*2-(n-1)*colGap)/n);

  el.style.cssText=`width:${w}px;height:${h}px;background:${bg};position:relative;overflow:hidden;`;

  const urls=await Promise.all(p.imgs.slice(0,n).map(img=>getURL(img.imgKey)));

  let html='';

  // ── 顶部标题 ──
  const ttSz=Math.round((p.topTitleSize||34)*sc);
  const ttY=Math.round((p.topTitleY||52)*sc);
  // letter-spacing会造成视觉偏右，用负margin补偿，或用flex居中
  html+=`<div style="position:absolute;left:0;right:0;top:${ttY}px;display:flex;justify-content:center;z-index:2;"><span style="font-family:'${p.topTitleFont||'Noto Serif SC'}',serif;font-size:${ttSz}px;font-weight:${p.topTitleWeight||'300'};color:${p.topTitleColor||'#1a1a1a'};letter-spacing:${p.topTitleLS||0.25}em;white-space:nowrap;margin-right:-${(p.topTitleLS||0.25)}em;">${esc(p.topTitle)}</span></div>`;

  // ── 胶囊图片列 ──

function updImgPos(i){
  const p=cur();if(!p)return;
  const{w}=pSz();const sc=w/1200;const n=p.cols;
  const colPad=Math.round((p.colPad||18)*sc);
  const colGap=Math.round((p.colGap||10)*sc);
  const colAreaH=Math.round((p.colAreaH||820)*sc);
  const stagger=Math.round((p.staggerPx||60)*sc);
  const colW=Math.floor((w-colPad*2-(n-1)*colGap)/n);
  const cH=colAreaH-(i%2===1?stagger:0);
  const s=p.imgs[i];const img=document.getElementById(`ci-${i}`);if(!img)return;
  const l=iLay(s.nW||img.naturalWidth,s.nH||img.naturalHeight,colW,cH,s.zoom,s.px,s.py);
  img.style.cssText=`position:absolute;display:block;width:${l.width}px;height:${l.height}px;left:${l.left}px;top:${l.top}px;`;
}

// ══ 拖拽 ══════════════════════════════════════════════════════════
let drag={on:false,i:-1,sx:0,sy:0,px0:50,py0:50};
function onMD(e){
  const i=+this.dataset.i;const p=cur();if(!p||e.button!==0)return;
  if(!p.imgs[i]?.imgKey)return;
  drag={on:true,i,sx:e.clientX,sy:e.clientY,px0:p.imgs[i].px,py0:p.imgs[i].py};
  e.preventDefault();
}
document.addEventListener('mousemove',e=>{
  if(!drag.on)return;const p=cur();if(!p)return;
  const{w}=pSz();const sc=w/1200;const n=p.cols;
  const colPad=Math.round((p.colPad||18)*sc);const colGap=Math.round((p.colGap||10)*sc);
  const colAreaH=Math.round((p.colAreaH||820)*sc);const stagger=Math.round((p.staggerPx||60)*sc);
  const colW=Math.floor((w-colPad*2-(n-1)*colGap)/n);
  const i=drag.i;const cH=colAreaH-(i%2===1?stagger:0);
  const s=p.imgs[i];
  const l0=iLay(s.nW,s.nH,colW,cH,s.zoom,drag.px0,drag.py0);
  const mx=Math.max(0,l0.width-colW),my=Math.max(0,l0.height-cH);
  s.px=mx>0?Math.max(0,Math.min(100,drag.px0-(e.clientX-drag.sx)/mx*100)):50;
  s.py=my>0?Math.max(0,Math.min(100,drag.py0-(e.clientY-drag.sy)/my*100)):50;
  updImgPos(i);
});

// ══ 导出 ══════════════════════════════════════════════════════════
function drawTextLS(ctx,text,cx,y,letterSpacingEm,align){
  const fs=parseFloat(ctx.font.match(/([\d.]+)px/)?.[1]||16);
  const ls=letterSpacingEm*fs;
  const chars=text.split('');
  let totalW=0;
  chars.forEach((ch,i)=>{totalW+=ctx.measureText(ch).width;if(i<chars.length-1)totalW+=ls;});
  let sx=align==='center'?cx-totalW/2:align==='right'?cx-totalW:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
}

async function doExport(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const n=p.cols;
  const bg=p.bgColor||'#ffffff';
  const colPad=p.colPad||18;
  const colGap=p.colGap||10;
  const colAreaY=p.colAreaY||90;
  const colAreaH=p.colAreaH||820;
  const stagger=p.staggerPx||60;
  const rad=p.colRadius||999;
  const gradH=p.gradH||200;
  const colW=Math.floor((W-colPad*2-(n-1)*colGap)/n);

  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  // 背景
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  function loadImg(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}
  const imgUrls=await Promise.all(p.imgs.slice(0,n).map(img=>getURL(img.imgKey)));
  const imgEls=await Promise.all(imgUrls.map(loadImg));

  // 绘制胶囊图片（圆角裁切 + 底部渐变）
  for(let i=0;i<n;i++){
    const x=colPad+i*(colW+colGap);
    const y=colAreaY+(i%2===1?stagger:0);
    const cH=colAreaH-(i%2===1?stagger:0);
    const r=Math.min(rad,colW/2);
    const img=imgEls[i];const s=p.imgs[i];

    ctx.save();
    ctx.beginPath();
    // 上方圆角，下方直角
    ctx.moveTo(x+r,y);ctx.lineTo(x+colW-r,y);ctx.quadraticCurveTo(x+colW,y,x+colW,y+r);
    ctx.lineTo(x+colW,y+cH);  // 右下直角
    ctx.lineTo(x,y+cH);       // 左下直角
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();ctx.clip();

    if(img){
      const zoom=s.zoom||1;const nW=img.naturalWidth,nH=img.naturalHeight;
      const sc2=Math.max(colW/nW,cH/nH)*zoom;
      const rW=nW*sc2,rH=nH*sc2;
      const left=x-((s.px||50)/100)*Math.max(0,rW-colW);
      const top=y-((s.py||50)/100)*Math.max(0,rH-cH);
      ctx.drawImage(img,left,top,rW,rH);
    } else {
      ctx.fillStyle='#cccccc';ctx.fillRect(x,y,colW,cH);
    }

    // 底部渐变
    const grd=ctx.createLinearGradient(0,y+cH-gradH,0,y+cH);
    // 解析背景色为rgba
    const bgR=parseInt(bg.slice(1,3),16)||255;
    const bgG=parseInt(bg.slice(3,5),16)||255;
    const bgB=parseInt(bg.slice(5,7),16)||255;
    grd.addColorStop(0,`rgba(${bgR},${bgG},${bgB},0)`);
    grd.addColorStop(1,`rgba(${bgR},${bgG},${bgB},1)`);
    ctx.fillStyle=grd;ctx.fillRect(x,y+cH-gradH,colW,gradH);
    ctx.restore();
  }

  // 文字绘制
  ctx.textBaseline='top';

  // 顶部标题
  ctx.fillStyle=p.topTitleColor||'#1a1a1a';
  ctx.font=`${p.topTitleWeight||'300'} ${p.topTitleSize||34}px "${p.topTitleFont||'Noto Serif SC'}",serif`;
  drawTextLS(ctx,p.topTitle,W/2,p.topTitleY||49,p.topTitleLS||2.2,'center');

  // 艺术字（斜体）
  ctx.fillStyle=p.artColor||'#c8a06a';
  ctx.font=`italic ${p.artWeight||'400'} ${p.artSize||130}px "${p.artFont||'Great Vibes'}",cursive`;
  drawTextLS(ctx,p.artText,W/2,p.artY||940,p.artLS||0,'center');

  // 主标题
  ctx.fillStyle=p.mainTitleColor||'#111';
  ctx.font=`${p.mainTitleWeight||'700'} ${p.mainTitleSize||78}px "${p.mainTitleFont||'Noto Serif SC'}",serif`;
  drawTextLS(ctx,p.mainTitle,W/2,p.mainTitleY||1030,p.mainTitleLS||0.04,'center');

  // 副标题
  ctx.fillStyle=p.subTitleColor||'#111';
  ctx.font=`${p.subTitleWeight||'700'} ${p.subTitleSize||72}px "${p.subTitleFont||'Noto Serif SC'}",serif`;
  drawTextLS(ctx,p.subTitle,W/2,p.subTitleY||1130,p.subTitleLS||0.04,'center');

  // 标签行
  ctx.fillStyle=p.tagColor||'#444';
  ctx.font=`${p.tagWeight||'400'} ${p.tagSize||32}px "${p.tagFont||'Noto Serif SC'}",serif`;
  drawTextLS(ctx,p.tagLine,W/2,p.tagY||1258,p.tagLS||0.05,'center');

  // 英文段落（多行）
  ctx.fillStyle=p.enParaColor||'#888';
  ctx.font=`${p.enParaWeight||'300'} ${p.enParaSize||18}px "${p.enParaFont||'Cormorant Garamond'}",serif`;
  const lines=(p.enPara||'').split('\n');
  const lh=(p.enParaSize||18)*(p.enParaLH||1.9);
  lines.forEach((line,i)=>drawTextLS(ctx,line.trim(),W/2,(p.enParaY||1350)+i*lh,p.enParaLS||0.02,'center'));

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.download=(p.name||'poster')+'_胶囊竖列版_1200x1600.png';
    a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
  },'image/png');
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});
(async()=>{
  await wpCheckAuth();
  try{await openDB();const all=await dbAll('P');projs=all.sort((a,b)=>b.at-a.at);renderList();}
  catch(e){document.getElementById('proj-list').innerHTML='<div style="font-size:10px;color:#e05a5a;padding:8px;">初始化失败</div>';}
})();
</script>
