<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全幅条块版 - 全幅条块海报模板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;font-family:system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;padding-top:40px;}

/* ── Sidebar ── */
.psb{width:190px;flex-shrink:0;background:#111;border-right:1px solid #222;display:flex;flex-direction:column;}
.psb-head{padding:14px 12px 10px;border-bottom:1px solid #222;}
.psb-head h2{font-size:13px;font-weight:500;color:#fff;}
.psb-head p{font-size:10px;color:#555;margin-top:2px;}
.psb-new{margin:10px 12px;padding:7px;background:#1e1e1e;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;}
.psb-new:hover{border-color:#666;color:#ccc;}
.proj-list{flex:1;overflow-y:auto;padding:6px 8px;}
.proj-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.proj-item:hover{background:#1e1e1e;}
.proj-item.active{background:#1e1e1e;border-color:#333;}
.proj-item h3{font-size:12px;font-weight:400;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-item p{font-size:9px;color:#555;margin-top:2px;}
.proj-item-actions{display:flex;gap:4px;margin-top:5px;}
.pa-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pa-btn:hover{border-color:#555;color:#aaa;}
.pa-btn.del:hover{border-color:#c00;color:#f55;}

/* ── Editor ── */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.proj-name-in{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.proj-name-in::placeholder{color:#444;}
.sp{flex:1;}
.tbtn{padding:6px 14px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.tbtn-export{background:#c8392b;color:#fff;}
.tbtn-export:hover{background:#a02d22;}
.tbtn-export:disabled{background:#6a1f17;cursor:default;}
.body{display:flex;flex:1;overflow:hidden;}

/* ── Canvas ── */
.canvas-area{flex:1;background:#222;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.poster{flex-shrink:0;position:relative;overflow:hidden;background:#000;}

/* Strips */
.strips-row{position:absolute;inset:0;display:flex;}
.strip-col{flex:1;position:relative;overflow:hidden;}
.strip-img{position:absolute;display:block;}
.strip-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#111;color:#444;cursor:pointer;}

/* Logo area */
.logo-area{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;}
.logo-img{max-width:100%;max-height:100%;object-fit:contain;}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;pointer-events:all;}
.logo-placeholder .lp-icon{font-size:18px;opacity:.5;}
.logo-placeholder .lp-text{font-size:9px;color:#888;}

/* Center overlay */
.center-overlay{position:absolute;left:0;right:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none;}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.55);}
.overlay-text-wrap{position:relative;z-index:1;text-align:center;padding:0 5%;}

/* ── Right panel ── */
.rp{width:218px;flex-shrink:0;background:#111;border-left:1px solid #222;overflow-y:auto;padding:12px 10px;}
.rp-title{font-size:10px;font-weight:500;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.rp-sec{margin-top:10px;padding-top:9px;border-top:1px solid #1e1e1e;}
.rp-sec-t{font-size:9px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.rp-lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:4px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.fsel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.row label{font-size:9px;color:#666;min-width:26px;flex-shrink:0;}
.fnum{width:52px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.fnum:focus{border-color:#555;}
.funit{font-size:9px;color:#555;}
.fslider{flex:1;accent-color:#c8392b;}
.fval{font-size:9px;color:#888;min-width:32px;text-align:right;}
.col-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.col-tab{padding:4px 9px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;}
.col-tab.on{background:#2a2a2a;color:#fff;border-color:#444;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;font-family:inherit;text-align:center;display:block;margin-top:3px;}
.img-btn:hover{border-color:#555;color:#ccc;}
.drag-hint{font-size:9px;color:#444;text-align:center;margin-top:2px;}
.no-proj{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;}
.no-proj p{font-size:12px;}

/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:22px;width:290px;color:#fff;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px;}
.m-lbl{font-size:10px;color:#888;margin-bottom:4px;}
.m-in{width:100%;padding:7px 10px;background:#111;border:1px solid #333;border-radius:5px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;}
.m-actions{display:flex;gap:8px;}
.m-actions button{flex:1;padding:8px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;}
</style>
</head>
<body>
<!-- AUTH BAR -->
<div style="height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 14px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;">
  <a href="index.html" style="font-size:18px;color:#888;text-decoration:none;padding:2px 6px;line-height:1;">←</a>
  <span style="font-size:12px;color:#666;">全幅条块版</span>
  <div style="flex:1;"></div>
  <span id="wp-credits" style="background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;"></span>
  <button onclick="wpLogout()" style="padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;">退出</button>
</div>


<div class="psb">
  <div class="psb-head"><h2>项目</h2><p>全幅条块模板</p></div>
  <div class="psb-new" onclick="openModal()">＋ 新建项目</div>
  <div class="proj-list" id="proj-list"><div style="font-size:10px;color:#444;padding:8px 4px;">加载中…</div></div>
</div>

<div class="editor">
  <div class="topbar">
    <input class="proj-name-in" id="pname" type="text" placeholder="项目名称" oninput="onNameChange()">
    <div class="sp"></div>
    <button class="tbtn tbtn-export" id="exp-btn" onclick="exportPNG()">↓ 导出 PNG 1200×1600</button>
  </div>
  <div class="body">
    <div class="canvas-area" id="canvas-area">
      <div id="poster" class="poster"></div>
    </div>
    <div class="rp" id="rp"><div class="no-proj"><p>新建或选择项目</p></div></div>
  </div>
</div>

<input type="file" id="fi-img" accept="image/*" style="display:none">
<input type="file" id="fi-logo" accept="image/*" style="display:none">

<div class="ov" id="modal">
  <div class="modal">
    <h3>新建项目</h3>
    <div class="m-lbl">项目名称</div>
    <input class="m-in" id="m-name" type="text" placeholder="未命名">
    <div class="m-actions">
      <button onclick="closeModal()" style="background:#2a2a2a;color:#aaa;border:1px solid #333;">取消</button>
      <button onclick="createProj()" style="background:#fff;color:#000;">创建</button>
    </div>
  </div>
</div>

<script>

// ══ WP AUTH ═══════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){
    _lic={credits:999,id:'test'};
    const el=document.getElementById('wp-credits');
    if(el)el.textContent='测试模式';
    return true;
  }
  const code=localStorage.getItem('wp-license');
  if(!code){location.href='index.html';return false;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();
    if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}
    const lic=d[0];
    if((lic.credits||0)<=0){location.href='index.html';return false;}
    if(lic.expires_at&&new Date(lic.expires_at)<new Date()){location.href='index.html';return false;}
    if(lic.duration_days&&lic.first_used_at){const exp=new Date(lic.first_used_at);exp.setDate(exp.getDate()+lic.duration_days);if(exp<new Date()){location.href='index.html';return false;}}
    _lic=lic;wpUpdCredits();return true;
  }catch(e){return true;}
}
function wpUpdCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost'){return true;}
  if(!_lic){alert('请先登录');return false;}
  if((_lic.credits||0)<=0){alert('导出次数已用完，请联系管理员充值');return false;}
  try{
    const newC=(_lic.credits||0)-1;
    const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:newC})});
    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=newC;wpUpdCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);wpUpdCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
// ══════════════════════════════════════════════════════════════════

// ── DB ────────────────────────────────────────────────────────────
let db;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('fullstrip-v1',1);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('P'))d.createObjectStore('P',{keyPath:'id'});if(!d.objectStoreNames.contains('I'))d.createObjectStore('I');};q.onsuccess=e=>{db=e.target.result;r();};q.onerror=j;});}
const txs=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=txs(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?txs(s,'readwrite').put(v,k):txs(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbA=(s)=>new Promise((r,j)=>{const q=txs(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ── State ─────────────────────────────────────────────────────────
let projects=[],curId=null,selCol=0;
const cache={};
let drag={on:false,col:-1,sx:0,sy:0,px0:50,py0:50};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projects.find(p=>p.id===curId)||null;
const ik=(pid,ci)=>`fs-${pid}-${ci}`;
const ilogo=(pid)=>`fs-logo-${pid}`;

const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC','STHeiti','SimHei'];

// ── Defaults ──────────────────────────────────────────────────────
function defCol(i){return{imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1};}
function defProj(name){return{
  id:uid(),name,ct:Date.now(),at:Date.now(),
  strips:[defCol(0),defCol(1),defCol(2),defCol(3)],
  logo:{imgKey:null,nW:0,nH:0},
  // Logo position & size
  logoH:15,      // % of poster height
  logoTop:3,     // % from top
  // Center overlay
  overlayTop:35,   // % from top
  overlayH:30,     // % height
  overlayOpacity:55, // 0-100
  // Center text
  line1:'在宁波',
  line2:'不到7W办婚礼',
  line1Size:52,
  line2Size:68,
  textFont:'Noto Serif SC',
  textWeight:'700',
  textColor:'#ffffff',
  textShadow:true,
};}

// ── DB helpers ────────────────────────────────────────────────────
async function loadAll(){projects=await dbA('P');projects.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbP('P',p);}
async function saveImg(key,blob){await dbP('I',blob,key);if(cache[key])URL.revokeObjectURL(cache[key]);cache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbD('I',key);if(cache[key]){URL.revokeObjectURL(cache[key]);delete cache[key];}}
async function getURL(key){if(!key)return null;if(cache[key])return cache[key];const b=await dbG('I',key);if(!b)return null;cache[key]=URL.createObjectURL(b);return cache[key];}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(){document.getElementById('m-name').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function createProj(){
  const name=document.getElementById('m-name').value.trim()||'未命名';
  const p=defProj(name);await save(p);projects.unshift(p);closeModal();renderList();openProj(p.id);
}
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

// ── Project list ──────────────────────────────────────────────────
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projects.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projects.map(p=>`
    <div class="proj-item ${p.id===curId?'active':''}" onclick="openProj('${p.id}')">
      <h3>${esc(p.name)}</h3><p>${new Date(p.at).toLocaleDateString('zh-CN')}</p>
      <div class="proj-item-actions">
        <button class="pa-btn" onclick="event.stopPropagation();renameProj('${p.id}')">重命名</button>
        <button class="pa-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
        <button class="pa-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
      </div>
    </div>`).join('');
}

async function openProj(id){curId=id;selCol=0;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;renderList();await renderPoster();renderRP();}
async function renameProj(id){const p=projects.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function dupProj(id){
  const p=projects.find(x=>x.id===id);if(!p)return;const nid=uid();
  const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  for(let i=0;i<4;i++){const ok=ik(id,i),nk=ik(nid,i);const b=await dbG('I',ok);if(b){await dbP('I',b,nk);np.strips[i].imgKey=nk;}}
  const lb=await dbG('I',ilogo(id));if(lb){await dbP('I',lb,ilogo(nid));np.logo.imgKey=ilogo(nid);}
  await save(np);projects.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  for(let i=0;i<4;i++)await delImg(ik(id,i));await delImg(ilogo(id));
  await dbD('P',id);projects=projects.filter(p=>p.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}
  renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}

// ── Poster size ───────────────────────────────────────────────────
function pSize(){const a=document.getElementById('canvas-area');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

function imgLayout(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ── Render poster ─────────────────────────────────────────────────
async function renderPoster(){
  const poster=document.getElementById('poster');
  const p=cur();if(!p){poster.innerHTML='<div class="no-proj" style="height:400px;"><p>新建或选择项目</p></div>';return;}
  const{w,h}=pSize();const sc=w/1200;
  poster.style.cssText=`width:${w}px;height:${h}px;box-shadow:0 20px 60px rgba(0,0,0,.55);background:#000;`;

  const urls=await Promise.all(p.strips.map(s=>getURL(s.imgKey)));
  const logoUrl=await getURL(p.logo?.imgKey);

  const colW=Math.round(w/4);
  const overlayTop=Math.round(h*(p.overlayTop||35)/100);
  const overlayH=Math.round(h*(p.overlayH||30)/100);
  const logoH=Math.round(h*(p.logoH||15)/100);
  const logoTop=Math.round(h*(p.logoTop||3)/100);
  const l1sz=Math.round((p.line1Size||52)*sc);
  const l2sz=Math.round((p.line2Size||68)*sc);
  const shadow=p.textShadow!==false?'2px 3px 12px rgba(0,0,0,0.8)':'none';

  poster.innerHTML=`
  <!-- Strips -->
  <div class="strips-row">
    ${p.strips.map((s,i)=>{
      const lout=imgLayout(s.nW,s.nH,colW,h,s.zoom,s.px,s.py);
      return `<div class="strip-col" id="sc-${i}" data-i="${i}" style="cursor:${s.imgKey?'grab':'pointer'};">
        ${urls[i]
          ?`<img class="strip-img" id="simg-${i}" src="${urls[i]}" draggable="false" style="width:${lout.width}px;height:${lout.height}px;left:${lout.left}px;top:${lout.top}px;">`
          :`<div class="strip-empty" onclick="uploadStrip(${i})"><div style="font-size:20px;opacity:.3;">＋</div><div style="font-size:9px;">${i+1}</div></div>`}
      </div>`;
    }).join('')}
  </div>

  <!-- Center overlay -->
  <div class="center-overlay" style="top:${overlayTop}px;height:${overlayH}px;">
    <div class="overlay-bg" style="background:rgba(0,0,0,${(p.overlayOpacity||55)/100});"></div>
    <div class="overlay-text-wrap">
      ${p.line1?`<div style="font-family:'${p.textFont||'Noto Serif SC'}',serif;font-size:${l1sz}px;font-weight:${p.textWeight||700};color:${p.textColor||'#fff'};text-shadow:${shadow};line-height:1.2;letter-spacing:.05em;">${esc(p.line1)}</div>`:''}
      ${p.line2?`<div style="font-family:'${p.textFont||'Noto Serif SC'}',serif;font-size:${l2sz}px;font-weight:${p.textWeight||700};color:${p.textColor||'#fff'};text-shadow:${shadow};line-height:1.2;letter-spacing:.05em;">${esc(p.line2)}</div>`:''}
    </div>
  </div>

  <!-- Logo -->
  <div class="logo-area" style="top:${logoTop}px;height:${logoH}px;">
    ${logoUrl
      ?`<img class="logo-img" id="logo-img" src="${logoUrl}" draggable="false" onclick="uploadLogo()" style="cursor:pointer;" title="点击替换Logo">`
      :`<div class="logo-placeholder" onclick="uploadLogo()"><div class="lp-icon">🏷</div><div class="lp-text">点击上传Logo</div></div>`}
  </div>`;

  // Drag for strips
  poster.querySelectorAll('.strip-col').forEach(el=>{
    el.addEventListener('mousedown',onMD);
    el.addEventListener('touchstart',onTS,{passive:false});
  });
}

function updStripImg(i){
  const p=cur();if(!p)return;const s=p.strips[i];const img=document.getElementById(`simg-${i}`);if(!img)return;
  const{w,h}=pSize();const colW=Math.round(w/4);
  const lout=imgLayout(s.nW,s.nH,colW,h,s.zoom,s.px,s.py);
  img.style.width=lout.width+'px';img.style.height=lout.height+'px';img.style.left=lout.left+'px';img.style.top=lout.top+'px';
}

// ── Drag ──────────────────────────────────────────────────────────
function onMD(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey||e.button!==0)return;drag={on:true,col:i,sx:e.clientX,sy:e.clientY,px0:p.strips[i].px,py0:p.strips[i].py};e.preventDefault();}
function onTS(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey)return;const t=e.touches[0];drag={on:true,col:i,sx:t.clientX,sy:t.clientY,px0:p.strips[i].px,py0:p.strips[i].py};e.preventDefault();}
document.addEventListener('mousemove',e=>{if(drag.on)doMove(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(drag.on){doMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
function doMove(cx,cy){
  const p=cur();if(!p)return;const{w,h}=pSize();const colW=Math.round(w/4);
  const s=p.strips[drag.col];
  const lout0=imgLayout(s.nW,s.nH,colW,h,s.zoom,drag.px0,drag.py0);
  const maxX=Math.max(0,lout0.width-colW),maxY=Math.max(0,lout0.height-h);
  s.px=maxX>0?Math.max(0,Math.min(100,drag.px0-(cx-drag.sx)/maxX*100)):50;
  s.py=maxY>0?Math.max(0,Math.min(100,drag.py0-(cy-drag.sy)/maxY*100)):50;
  updStripImg(drag.col);
  if(selCol===drag.col){
    const px=document.getElementById('sl-px'),py=document.getElementById('sl-py');
    if(px){px.value=s.px;document.getElementById('v-px').textContent=Math.round(s.px)+'%';}
    if(py){py.value=s.py;document.getElementById('v-py').textContent=Math.round(s.py)+'%';}
  }
}
document.addEventListener('mouseup',async()=>{if(!drag.on)return;drag.on=false;const p=cur();if(p)await save(p);});
document.addEventListener('touchend',async()=>{if(!drag.on)return;drag.on=false;const p=cur();if(p)await save(p);});

// ── Upload ────────────────────────────────────────────────────────
function uploadStrip(i){
  const fi=document.getElementById('fi-img');
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;
    const url=URL.createObjectURL(file);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.strips[i].nW=img.naturalWidth;p.strips[i].nH=img.naturalHeight;URL.revokeObjectURL(url);res();};img.src=url;});
    const key=ik(curId,i);await saveImg(key,file);
    p.strips[i].imgKey=key;p.strips[i].px=50;p.strips[i].py=50;p.strips[i].zoom=1;
    await save(p);await renderPoster();renderRP();fi.value='';
  };fi.click();
}

function uploadLogo(){
  const fi=document.getElementById('fi-logo');
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;
    const url=URL.createObjectURL(file);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.logo.nW=img.naturalWidth;p.logo.nH=img.naturalHeight;URL.revokeObjectURL(url);res();};img.src=url;});
    const key=ilogo(curId);await saveImg(key,file);p.logo.imgKey=key;
    await save(p);await renderPoster();renderRP();fi.value='';
  };fi.click();
}

// ── Right panel ───────────────────────────────────────────────────
function fO(sel){return FONTS.map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('');}

function renderRP(){
  const rp=document.getElementById('rp');const p=cur();
  if(!p){rp.innerHTML='<div class="no-proj"><p>新建或选择项目</p></div>';return;}
  const s=p.strips[selCol];
  rp.innerHTML=`
  <div class="rp-title">编辑面板</div>

  <div class="rp-sec">
    <div class="rp-sec-t">图片条块</div>
    <div class="col-tabs">${[0,1,2,3].map(i=>`<button class="col-tab ${i===selCol?'on':''}" onclick="selC(${i})">第${i+1}条</button>`).join('')}</div>
    <div class="img-btn" data-upload onclick="uploadStrip(${selCol})">${s.imgKey?'更换图片':'上传图片'}</div>
      
    ${s.imgKey?`
    <div class="drag-hint">在画面上拖动调整位置</div>
    <div class="row" style="margin-top:6px;"><label>缩放</label><input id="sl-zoom" class="fslider" type="range" min="1" max="3" step="0.05" value="${s.zoom||1}" oninput="setStrip(${selCol},'zoom',+this.value);updStripImg(${selCol});document.getElementById('v-zoom').textContent=Math.round(this.value*100)+'%'"><span class="fval" id="v-zoom">${Math.round((s.zoom||1)*100)}%</span></div>
    <div class="row"><label>横移</label><input id="sl-px" class="fslider" type="range" min="0" max="100" value="${s.px}" oninput="setStrip(${selCol},'px',+this.value);updStripImg(${selCol});document.getElementById('v-px').textContent=this.value+'%'"><span class="fval" id="v-px">${Math.round(s.px)}%</span></div>
    <div class="row"><label>纵移</label><input id="sl-py" class="fslider" type="range" min="0" max="100" value="${s.py}" oninput="setStrip(${selCol},'py',+this.value);updStripImg(${selCol});document.getElementById('v-py').textContent=this.value+'%'"><span class="fval" id="v-py">${Math.round(s.py)}%</span></div>`:''}
  </div>

  <div class="rp-sec">
    <div class="rp-sec-t">Logo</div>
    <div class="img-btn" onclick="uploadLogo()">${p.logo?.imgKey?'更换Logo':'上传Logo'}</div>
      
    <div class="rp-lbl">距顶部</div>
    <div class="row"><input class="fslider" type="range" min="0" max="20" step="0.5" value="${p.logoTop||3}" oninput="setP('logoTop',+this.value);document.getElementById('v-lt').textContent=this.value+'%';reRender()"><span class="fval" id="v-lt">${p.logoTop||3}%</span></div>
    <div class="rp-lbl">Logo高度</div>
    <div class="row"><input class="fslider" type="range" min="5" max="30" step="0.5" value="${p.logoH||15}" oninput="setP('logoH',+this.value);document.getElementById('v-lh').textContent=this.value+'%';reRender()"><span class="fval" id="v-lh">${p.logoH||15}%</span></div>
  </div>

  <div class="rp-sec">
    <div class="rp-sec-t">中间遮罩</div>
    <div class="rp-lbl">位置（距顶）</div>
    <div class="row"><input class="fslider" type="range" min="10" max="70" value="${p.overlayTop||35}" oninput="setP('overlayTop',+this.value);document.getElementById('v-ot').textContent=this.value+'%';reRender()"><span class="fval" id="v-ot">${p.overlayTop||35}%</span></div>
    <div class="rp-lbl">遮罩高度</div>
    <div class="row"><input class="fslider" type="range" min="10" max="60" value="${p.overlayH||30}" oninput="setP('overlayH',+this.value);document.getElementById('v-oh').textContent=this.value+'%';reRender()"><span class="fval" id="v-oh">${p.overlayH||30}%</span></div>
    <div class="rp-lbl">不透明度</div>
    <div class="row"><input class="fslider" type="range" min="0" max="100" value="${p.overlayOpacity||55}" oninput="setP('overlayOpacity',+this.value);document.getElementById('v-oo').textContent=this.value+'%';updOverlay()"><span class="fval" id="v-oo">${p.overlayOpacity||55}%</span></div>
  </div>

  <div class="rp-sec">
    <div class="rp-sec-t">文字内容</div>
    <div class="rp-lbl">第一行</div><input class="fi" type="text" value="${esc(p.line1||'')}" oninput="setP('line1',this.value);updText()">
    <div class="row"><label>字号</label><input class="fnum" type="number" min="10" max="200" value="${p.line1Size||52}" oninput="setP('line1Size',+this.value);updText()"><span class="funit">px</span></div>
    <div class="rp-lbl">第二行</div><input class="fi" type="text" value="${esc(p.line2||'')}" oninput="setP('line2',this.value);updText()">
    <div class="row"><label>字号</label><input class="fnum" type="number" min="10" max="200" value="${p.line2Size||68}" oninput="setP('line2Size',+this.value);updText()"><span class="funit">px</span></div>
    <div class="rp-lbl">字体</div><select class="fsel" onchange="setP('textFont',this.value);updText()">${fO(p.textFont||'Noto Serif SC')}</select>
    <div class="rp-lbl">字重</div>
    <select class="fsel" onchange="setP('textWeight',this.value);updText()">
      <option value="300" ${p.textWeight==='300'?'selected':''}>细 300</option>
      <option value="400" ${p.textWeight==='400'?'selected':''}>常规 400</option>
      <option value="700" ${(!p.textWeight||p.textWeight==='700')?'selected':''}>粗 700</option>
      <option value="900" ${p.textWeight==='900'?'selected':''}>超粗 900</option>
    </select>
    <div class="rp-lbl">颜色</div>
    <input type="color" value="${p.textColor||'#ffffff'}" style="width:100%;height:26px;border:1px solid #2a2a2a;border-radius:4px;background:#0a0a0a;cursor:pointer;margin-bottom:3px;" onchange="setP('textColor',this.value);updText()">
  </div>`;
}

function selC(i){selCol=i;renderRP();}
async function setStrip(i,k,v){const p=cur();if(!p)return;p.strips[i][k]=v;await save(p);}
async function setP(k,v){const p=cur();if(!p)return;p[k]=v;await save(p);}

// Live updates without full re-render
function updOverlay(){
  const p=cur();if(!p)return;
  const bg=document.querySelector('.overlay-bg');if(bg)bg.style.background=`rgba(0,0,0,${(p.overlayOpacity||55)/100})`;
}
function updText(){
  const p=cur();if(!p)return;const{w}=pSize();const sc=w/1200;
  const wrap=document.querySelector('.overlay-text-wrap');if(!wrap)return;
  const shadow=p.textShadow!==false?'2px 3px 12px rgba(0,0,0,0.8)':'none';
  const divs=wrap.querySelectorAll('div');
  const l1sz=Math.round((p.line1Size||52)*sc),l2sz=Math.round((p.line2Size||68)*sc);
  if(divs[0]){divs[0].textContent=p.line1||'';divs[0].style.fontSize=l1sz+'px';divs[0].style.fontFamily=`'${p.textFont||'Noto Serif SC'}',serif`;divs[0].style.fontWeight=p.textWeight||700;divs[0].style.color=p.textColor||'#fff';divs[0].style.textShadow=shadow;}
  if(divs[1]){divs[1].textContent=p.line2||'';divs[1].style.fontSize=l2sz+'px';divs[1].style.fontFamily=`'${p.textFont||'Noto Serif SC'}',serif`;divs[1].style.fontWeight=p.textWeight||700;divs[1].style.color=p.textColor||'#fff';divs[1].style.textShadow=shadow;}
}
async function reRender(){await renderPoster();}

// ── Export ────────────────────────────────────────────────────────
async function exportPNG(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600,colW=Math.round(W/4);
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  await document.fonts.ready;

  // Draw strips
  for(let i=0;i<4;i++){
    const s=p.strips[i];const url=await getURL(s.imgKey);
    if(url){
      await new Promise(res=>{
        const img=new Image();
        img.onload=()=>{
          ctx.save();ctx.beginPath();ctx.rect(i*colW,0,colW,H);ctx.clip();
          const nW=s.nW||img.naturalWidth||colW,nH=s.nH||img.naturalHeight||H;
          const lout=imgLayout(nW,nH,colW,H,s.zoom,s.px,s.py);
          ctx.drawImage(img,i*colW+lout.left,lout.top,lout.width,lout.height);
          ctx.restore();res();
        };img.src=url;
      });
    }
  }

  // Center overlay
  const overlayTop=Math.round(H*(p.overlayTop||35)/100);
  const overlayH=Math.round(H*(p.overlayH||30)/100);
  ctx.fillStyle=`rgba(0,0,0,${(p.overlayOpacity||55)/100})`;
  ctx.fillRect(0,overlayTop,W,overlayH);

  // Overlay text
  const shadow=p.textShadow!==false;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const totalTextH=(p.line1Size||52)+(p.line2Size||68)+16;
  const textCenterY=overlayTop+overlayH/2;
  const y1=textCenterY-totalTextH/2+(p.line1Size||52)/2;
  const y2=y1+(p.line1Size||52)/2+12+(p.line2Size||68)/2;

  if(shadow){ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=12;ctx.shadowOffsetX=2;ctx.shadowOffsetY=3;}
  ctx.fillStyle=p.textColor||'#ffffff';
  if(p.line1){ctx.font=`${p.textWeight||700} ${p.line1Size||52}px "${p.textFont||'Noto Serif SC'}",serif`;ctx.fillText(p.line1,W/2,y1);}
  if(p.line2){ctx.font=`${p.textWeight||700} ${p.line2Size||68}px "${p.textFont||'Noto Serif SC'}",serif`;ctx.fillText(p.line2,W/2,y2);}
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

  // Logo
  const logoUrl=await getURL(p.logo?.imgKey);
  if(logoUrl){
    await new Promise(res=>{
      const img=new Image();
      img.onload=()=>{
        const logoH=Math.round(H*(p.logoH||15)/100);
        const logoTop=Math.round(H*(p.logoTop||3)/100);
        const scale=Math.min(W*0.4/img.width,logoH/img.height);
        const lw=img.width*scale,lh=img.height*scale;
        ctx.drawImage(img,(W-lw)/2,logoTop+(logoH-lh)/2,lw,lh);res();
      };img.src=logoUrl;
    });
  }

  const a=document.createElement('a');
  a.download=(p.name||'poster')+'_1200x1600.png';
  a.href=canvas.toDataURL('image/png',1);a.click();
  btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(curId)renderPoster();});
openDB().then(async()=>{await wpCheckAuth();await loadAll();renderList();});
</script>
