<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大图文字版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* top bar */
.topbar{height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.topbar a{color:#888;font-size:18px;text-decoration:none;line-height:1;}
.topbar .lbl{font-size:12px;color:#666;}
.topbar .sp{flex:1;}
.credits{background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;}
.logout{padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;}

/* main layout */
.main{display:flex;flex:1;overflow:hidden;}

/* sidebar */
.sb{width:188px;flex-shrink:0;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;}
.sb-head{padding:12px;border-bottom:1px solid #1e1e1e;}
.sb-head h2{font-size:13px;font-weight:500;}
.sb-head p{font-size:10px;color:#555;margin-top:2px;}
.sb-new{margin:10px 10px;padding:7px;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;background:#161616;}
.sb-new:hover{border-color:#666;color:#ccc;}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.pi{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.pi:hover{background:#1a1a1a;}
.pi.on{background:#1a1a1a;border-color:#2a2a2a;}
.pi h3{font-size:12px;font-weight:400;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi p{font-size:9px;color:#555;margin-top:2px;}
.pi-acts{display:flex;gap:4px;margin-top:5px;}
.pi-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pi-btn:hover{border-color:#555;color:#aaa;}
.pi-btn.del:hover{border-color:#c00;color:#f55;}

/* editor */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-top{height:44px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.pname::placeholder{color:#444;}
.sp2{flex:1;}
.lsw{display:flex;gap:3px;background:#0a0a0a;padding:3px;border-radius:6px;border:1px solid #2a2a2a;}
.lsw-btn{padding:4px 10px;border:none;border-radius:4px;font-size:11px;cursor:pointer;background:none;color:#666;font-family:inherit;}
.lsw-btn.on{background:#2a2a2a;color:#fff;}
.exp-btn{padding:6px 14px;background:#c8392b;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.exp-btn:hover{background:#a02d22;}
.ed-body{display:flex;flex:1;overflow:hidden;}
.canvas{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* right panel */
.rp{width:218px;flex-shrink:0;background:#111;border-left:1px solid #1e1e1e;overflow-y:auto;padding:12px 10px;}
.rp-t{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.sec{margin-top:10px;padding-top:9px;border-top:1px solid #1a1a1a;}
.sec-t{font-size:9px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:5px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.ta{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;resize:vertical;min-height:48px;}
.sel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.row label{font-size:9px;color:#666;min-width:26px;flex-shrink:0;}
.num{width:52px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.unit{font-size:9px;color:#555;}
.sld{flex:1;accent-color:#c8392b;}
.fval{font-size:9px;color:#888;min-width:30px;text-align:right;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;text-align:center;margin-top:3px;font-family:inherit;}
.img-btn:hover{border-color:#555;color:#ccc;}
.drag-hint{font-size:9px;color:#444;text-align:center;margin-top:2px;}
.col-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.ct{padding:4px 9px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;}
.ct.on{background:#2a2a2a;color:#fff;border-color:#444;}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:#333;font-size:12px;}

/* modal overlay - OUTSIDE body flex */
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">←</a>
  <span class="lbl">大图文字版</span>
  <div class="sp"></div>
  <span class="credits" id="wp-credits"></span>
  <button class="logout" onclick="wpLogout()">退出</button>
</div>

<div class="main">
  <div class="sb">
    <div class="sb-head"><h2>项目</h2><p>大图文字版模板</p></div>
    <div class="sb-new" id="btn-new">＋ 新建项目</div>
    <div class="sb-list" id="proj-list"><div style="font-size:10px;color:#444;padding:8px 4px;">加载中…</div></div>
  </div>
  <div class="editor">
    <div class="ed-top">
      <input class="pname" id="pname" placeholder="项目名称" oninput="onNameChange()">
      <div class="sp2"></div>
      <div class="lsw" id="lsw" style="display:none;">
        <button class="lsw-btn" id="lsw3" onclick="switchCols(3)">3图</button>
        <button class="lsw-btn" id="lsw4" onclick="switchCols(4)">4图</button>
      </div>
      <button class="exp-btn" id="exp-btn" onclick="doExport()">↓ 导出 PNG</button>
    </div>
    <div class="ed-body">
      <div class="canvas" id="canvas"><div id="poster"></div></div>
      <div class="rp" id="rp"><div class="empty">新建或选择项目</div></div>
    </div>
  </div>
</div>

<input type="file" id="fi-hero" accept="image/*" style="display:none">
<input type="file" id="fi-grid" accept="image/*" style="display:none">

<!-- Modal: positioned fixed, outside flex flow -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:24px;width:300px;color:#fff;">
    <div style="font-size:14px;font-weight:500;margin-bottom:18px;">新建项目</div>
    <div style="font-size:10px;color:#888;margin-bottom:4px;">项目名称</div>
    <input id="m-name" type="text" placeholder="未命名" style="width:100%;padding:8px 10px;background:#111;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;">
    <div style="font-size:10px;color:#888;margin-bottom:8px;">下方图片数量</div>
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <div id="mc3" onclick="mCols=3;updMC()" style="flex:1;border:1.5px solid #c8392b;background:#1a0808;border-radius:7px;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#fff;">3张</div>
      <div id="mc4" onclick="mCols=4;updMC()" style="flex:1;border:1.5px solid #2a2a2a;background:#111;border-radius:7px;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#888;">4张</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeModal()" style="flex:1;padding:9px;background:#2a2a2a;color:#aaa;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">取消</button>
      <button onclick="createProj()" style="flex:1;padding:9px;background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;">创建</button>
    </div>
  </div>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────
const SB='https://kyemjxgdmkupfkntflzh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let LIC=null;

async function checkAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){
    LIC={credits:999,id:'test'};
    document.getElementById('wp-credits').textContent='测试模式';
    return true;
  }
  const code=localStorage.getItem('wp-license');
  if(!code){location.href='index.html';return false;}
  try{
    const r=await fetch(`${SB}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    const d=await r.json();
    if(!d||!d[0]||!d[0].is_active||(d[0].credits||0)<=0){location.href='index.html';return false;}
    LIC=d[0];updCredits();return true;
  }catch(e){LIC={credits:0,id:'err'};updCredits();return true;}
}
function updCredits(){const el=document.getElementById('wp-credits');if(el&&LIC)el.textContent=`剩余 ${LIC.credits||0} 次`;}
async function checkQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost')return true;
  if(!LIC)return false;
  if((LIC.credits||0)<=0){alert('次数已用完，请充值');return false;}
  try{
    const nc=(LIC.credits||0)-1;
    const r=await fetch(`${SB}/rest/v1/licenses?id=eq.${LIC.id}`,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});
    const d=await r.json();if(d&&d[0])LIC=d[0];else LIC.credits=nc;updCredits();return true;
  }catch(e){LIC.credits=Math.max(0,(LIC.credits||0)-1);updCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ── DB ────────────────────────────────────────────────────────────
let DB=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('topbig-v2',1);q.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:{});});};q.onsuccess=e=>{DB=e.target.result;r();};q.onerror=j;});}
const tx=(s,m='readonly')=>DB.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ── State ─────────────────────────────────────────────────────────
let projs=[],curId=null,selG=0,mCols=3;
const imgCache={};
let heroDrag={on:false,sx:0,sy:0,px0:50,py0:50};
let gridDrag={on:false,i:-1,sx:0,sy:0,px0:50,py0:50};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const hk=(id)=>`tb2-h-${id}`;
const gk=(id,i)=>`tb2-g-${id}-${i}`;
const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC'];

function defG(){return{imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1};}
function defP(name,cols){return{
  id:uid(),name,ct:Date.now(),at:Date.now(),cols:cols||3,
  hero:{imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1},
  grids:Array.from({length:cols||3},()=>defG()),
  heroPct:58,
  bgTop:'#f5ede0',bgBot:'#e8d5b7',
  mainText:'xx小预算婚礼必看',
  mainSize:108,mainFont:'Noto Serif SC',mainWeight:'700',mainColor:'#2a1a0a',
  subText:'主题宴会厅 资深婚庆团队 星级厨师服务',
  subSize:30,subWeight:'400',subFont:'Noto Sans SC',subColor:'#5a3a1a',
  ctaText:'点击获取最新报价',ctaTagText:'含草坪婚礼',
  ctaSize:26,ctaColor:'#2a1a0a',ctaBorderColor:'#7a4a1a',
  ctaTagColor:'#ffffff',ctaTagBg:'#f0a050',
  gridPad:3,gridGap:2,gridRadius:4,midTextPct:32,titleOffsetY:0,midOffsetX:0,midOffsetY:0,
};}

// ── Image cache ───────────────────────────────────────────────────
async function saveImg(key,blob){await dbP('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){try{await dbD('I',key);}catch(e){}if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];try{const b=await dbG('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}catch(e){return null;}}

// ── Save ──────────────────────────────────────────────────────────
async function save(p){p.at=Date.now();await dbP('P',p);}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(){
  mCols=3;
  updMC();
  document.getElementById('m-name').value='';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>{try{document.getElementById('m-name').focus();}catch(e){}},80);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function updMC(){
  ['mc3','mc4'].forEach((id,idx)=>{
    const n=[3,4][idx];
    const el=document.getElementById(id);if(!el)return;
    el.style.borderColor=n===mCols?'#c8392b':'#2a2a2a';
    el.style.background=n===mCols?'#1a0808':'#111';
    el.style.color=n===mCols?'#fff':'#888';
  });
}

async function createProj(){
  if(!DB){try{await openDB();}catch(e){alert('数据库未就绪，请稍后重试');return;}}
  const name=document.getElementById('m-name').value.trim()||'未命名';
  const p=defP(name,mCols);
  try{await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);}
  catch(e){alert('创建失败：'+e.message);}
}

// ── Project list ──────────────────────────────────────────────────
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`
    <div class="pi ${p.id===curId?'on':''}" onclick="openProj('${p.id}')">
      <h3>${esc(p.name)}</h3>
      <p>${new Date(p.at).toLocaleDateString('zh-CN')} · ${p.cols}张</p>
      <div class="pi-acts">
        <button class="pi-btn" onclick="event.stopPropagation();renameP('${p.id}')">改名</button>
        <button class="pi-btn del" onclick="event.stopPropagation();delP('${p.id}')">删除</button>
      </div>
    </div>`).join('');
}

async function openProj(id){
  curId=id;selG=0;
  const p=cur();if(!p)return;
  document.getElementById('pname').value=p.name;
  document.getElementById('lsw').style.display='flex';
  updLsw();renderList();
  await renderPoster();renderRP();
}
async function renameP(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function delP(id){
  if(!confirm('确认删除？'))return;
  const p=projs.find(x=>x.id===id);if(!p)return;
  await delImg(hk(id));for(let i=0;i<(p.cols||3);i++)await delImg(gk(id,i));
  await dbD('P',id);projs=projs.filter(x=>x.id!==id);
  if(curId===id){curId=null;document.getElementById('lsw').style.display='none';document.getElementById('poster').innerHTML='';renderRP();}
  renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
async function switchCols(n){
  const p=cur();if(!p||p.cols===n)return;
  if(!confirm(`切换为 ${n} 张？`))return;
  p.cols=n;while(p.grids.length<n)p.grids.push(defG());
  selG=0;await save(p);updLsw();await renderPoster();renderRP();
}
function updLsw(){const p=cur();if(!p)return;['lsw3','lsw4'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.className='lsw-btn'+(([3,4][i]===p.cols)?' on':'');});}

// ── Poster ────────────────────────────────────────────────────────
function pSz(){
  const a=document.getElementById('canvas');
  const aH=a.clientHeight-24,aW=a.clientWidth-24;
  let h,w;
  if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}
  else{w=Math.floor(aW);h=Math.floor(w/.75);}
  return{w,h};
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}
function h2rgb(hex){
  return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}

async function renderPoster(){
  const el=document.getElementById('poster');
  const p=cur();
  if(!p){el.innerHTML='<div class="empty">新建或选择项目</div>';return;}
  const{w,h}=pSz();const sc=w/1200;
  el.style.cssText=`width:${w}px;height:${h}px;box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;background:${p.bgTop};`;

  const heroH=Math.round(h*(p.heroPct||58)/100);
  const cols=p.cols||3;
  const pad=Math.round(w*(p.gridPad||3)/100);
  const gap=Math.round(w*(p.gridGap||2)/100);
  const gW=Math.round((w-pad*2-gap*(cols-1))/cols);
  const midH=h-heroH;
  const midTxtH=Math.round(midH*(p.midTextPct||32)/100);
  const gH=midH-midTxtH-pad;
  const rad=Math.round(gW*(p.gridRadius||4)/100);

  const rgb=h2rgb(p.bgTop||'#f5ede0');
  const heroUrl=await getURL(p.hero.imgKey);
  const gridUrls=await Promise.all(p.grids.slice(0,cols).map(g=>getURL(g.imgKey)));

  const mainSz=Math.round((p.mainSize||68)*sc);
  const subSz=Math.round((p.subSize||30)*sc);
  const ctaSz=Math.round((p.ctaSize||26)*sc);

  el.innerHTML=`
  <!-- bg gradient: starts above heroH to avoid seam -->
  <div style="position:absolute;top:${Math.max(0,heroH-Math.round(h*0.01))}px;left:0;right:0;bottom:0;background:${p.bgTop};"></div>
  <div style="position:absolute;top:${heroH+Math.round(h*0.12)}px;left:0;right:0;bottom:0;background:linear-gradient(to bottom,transparent,${p.bgBot});"></div>

  <!-- hero: image only, no overflow clipping of gradient -->
  <div id="hero-w" data-role="hero" style="position:absolute;top:0;left:0;width:${w}px;height:${heroH}px;overflow:hidden;cursor:${heroUrl?'grab':'pointer'};">
    ${heroUrl
      ?`<img id="hero-img" src="${heroUrl}" draggable="false" style="position:absolute;display:block;">`

function updHeroPos(){
  const p=cur();if(!p)return;const img=document.getElementById('hero-img');if(!img)return;
  const{w,h}=pSz();const heroH=Math.round(h*(p.heroPct||58)/100);
  const l=iLay(p.hero.nW,p.hero.nH,w,heroH,p.hero.zoom,p.hero.px,p.hero.py);
  img.style.width=l.width+'px';img.style.height=l.height+'px';img.style.left=l.left+'px';img.style.top=l.top+'px';
}
function updGridPos(i){
  const p=cur();if(!p)return;const g=p.grids[i];const img=document.getElementById(`gimg-${i}`);if(!img)return;
  const{w,h}=pSz();const cols=p.cols||3;
  const pad=Math.round(w*(p.gridPad||3)/100);const gap=Math.round(w*(p.gridGap||2)/100);
  const gW=Math.round((w-pad*2-gap*(cols-1))/cols);
  const midH=h-Math.round(h*(p.heroPct||58)/100);const gH=Math.round(midH*0.68);
  const l=iLay(g.nW,g.nH,gW,gH,g.zoom,g.px,g.py);
  img.style.width=l.width+'px';img.style.height=l.height+'px';img.style.left=l.left+'px';img.style.top=l.top+'px';
}

// ── Drag ──────────────────────────────────────────────────────────
function onHMD(e){const p=cur();if(!p||!p.hero.imgKey||e.button!==0)return;heroDrag={on:true,sx:e.clientX,sy:e.clientY,px0:p.hero.px,py0:p.hero.py};e.preventDefault();}
function onHTS(e){const p=cur();if(!p||!p.hero.imgKey)return;const t=e.touches[0];heroDrag={on:true,sx:t.clientX,sy:t.clientY,px0:p.hero.px,py0:p.hero.py};e.preventDefault();}
function mvHero(cx,cy){
  const p=cur();if(!p)return;const{w,h}=pSz();const hH=Math.round(h*(p.heroPct||58)/100);
  const l0=iLay(p.hero.nW,p.hero.nH,w,hH,p.hero.zoom,heroDrag.px0,heroDrag.py0);
  const mx=Math.max(0,l0.width-w),my=Math.max(0,l0.height-hH);
  p.hero.px=mx>0?Math.max(0,Math.min(100,heroDrag.px0-(cx-heroDrag.sx)/mx*100)):50;
  p.hero.py=my>0?Math.max(0,Math.min(100,heroDrag.py0-(cy-heroDrag.sy)/my*100)):50;
  updHeroPos();
}
function onGMD(e){const i=+this.dataset.i;const p=cur();if(!p||!p.grids[i].imgKey||e.button!==0)return;gridDrag={on:true,i,sx:e.clientX,sy:e.clientY,px0:p.grids[i].px,py0:p.grids[i].py};e.preventDefault();}
function onGTS(e){const i=+this.dataset.i;const p=cur();if(!p||!p.grids[i].imgKey)return;const t=e.touches[0];gridDrag={on:true,i,sx:t.clientX,sy:t.clientY,px0:p.grids[i].px,py0:p.grids[i].py};e.preventDefault();}
function mvGrid(cx,cy){
  const p=cur();if(!p)return;const{w,h}=pSz();const i=gridDrag.i;const g=p.grids[i];
  const cols=p.cols||3;const pad=Math.round(w*(p.gridPad||3)/100);const gap=Math.round(w*(p.gridGap||2)/100);
  const gW=Math.round((w-pad*2-gap*(cols-1))/cols);const midH=h-Math.round(h*(p.heroPct||58)/100);const gH=Math.round(midH*0.68);
  const l0=iLay(g.nW,g.nH,gW,gH,g.zoom,gridDrag.px0,gridDrag.py0);
  const mx=Math.max(0,l0.width-gW),my=Math.max(0,l0.height-gH);
  g.px=mx>0?Math.max(0,Math.min(100,gridDrag.px0-(cx-gridDrag.sx)/mx*100)):50;
  g.py=my>0?Math.max(0,Math.min(100,gridDrag.py0-(cy-gridDrag.sy)/my*100)):50;
  updGridPos(i);
}
document.addEventListener('mousemove',e=>{if(heroDrag.on)mvHero(e.clientX,e.clientY);if(gridDrag.on)mvGrid(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(heroDrag.on){mvHero(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}if(gridDrag.on){mvGrid(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});

// ── Export ────────────────────────────────────────────────────────
async function doExport(){
  const p=cur();if(!p)return;
  if(!await checkQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const sc=1; // 导出固定1200px，sc=1
  const heroH=Math.round(H*(p.heroPct||58)/100);
  const cols=p.cols||3;
  const pad=Math.round(W*(p.gridPad||3)/100);
  const gap=Math.round(W*(p.gridGap||2)/100);
  const gW=Math.round((W-pad*2-gap*(cols-1))/cols);
  const midH=H-heroH;
  const midTxtH=Math.round(midH*(p.midTextPct||32)/100);
  const gH=midH-midTxtH-pad;
  const rad=Math.round(gW*(p.gridRadius||4)/100);
  const rgb=h2rgb(p.bgTop||'#f5ede0');

  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  // background
  const bg=ctx.createLinearGradient(0,heroH,0,H);
  bg.addColorStop(0,p.bgTop||'#f5ede0');bg.addColorStop(1,p.bgBot||'#e8d5b7');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // hero
  const heroUrl=await getURL(p.hero.imgKey);
  if(heroUrl){
    await new Promise(res=>{const img=new Image();img.onload=()=>{
      ctx.save();ctx.beginPath();ctx.rect(0,0,W,heroH);ctx.clip();
      const l=iLay(p.hero.nW||img.naturalWidth,p.hero.nH||img.naturalHeight,W,heroH,p.hero.zoom,p.hero.px,p.hero.py);
      ctx.drawImage(img,l.left,l.top,l.width,l.height);ctx.restore();res();
    };img.src=heroUrl;});
  }
  // fade
  const gradH=Math.round(heroH*0.55);
  const gr=ctx.createLinearGradient(0,heroH-gradH,0,heroH);
  gr.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);gr.addColorStop(0.25,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.35)`);gr.addColorStop(0.55,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.72)`);gr.addColorStop(0.80,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.92)`);gr.addColorStop(1,p.bgTop||'#f5ede0');
  ctx.fillStyle=gr;ctx.fillRect(0,heroH-gradH,W,gradH);

  // main title
  ctx.textAlign='center';ctx.textBaseline='top';
  const exportMainSz=Math.round(p.mainSize||68);
  ctx.font=`${p.mainWeight||700} ${exportMainSz}px "${p.mainFont||'Noto Serif SC'}",serif`;
  ctx.fillStyle=p.mainColor||'#2a1a0a';
  const titleY=heroH - exportMainSz - Math.round(H*0.04) + Math.round(p.titleOffsetY||0);
  ctx.fillText(p.mainText,W/2,titleY);

  // subtitle
  const midOffY=Math.round(p.midOffsetY||0);
  const midOffX=Math.round(p.midOffsetX||0);
  const exportSubSz=Math.round(p.subSize||30);
  const subY=heroH+midOffY+Math.round(16)+exportSubSz/2+Math.round(10);
  ctx.textBaseline='middle';
  ctx.font=`${p.subWeight||'400'} ${exportSubSz}px "${p.subFont||'Noto Sans SC'}",sans-serif`;
  ctx.fillStyle=p.subColor||'#5a3a1a';
  ctx.fillText(p.subText,W/2+midOffX,subY);

  // CTA - unified pill (matches preview)
  const ctaSz=Math.round(p.ctaSize||26);
  const ctaY=subY+exportSubSz/2+10+Math.round(12)+ctaSz/2;
  const padX=ctaSz*1.2,padY=ctaSz*0.55;
  ctx.font=`400 ${ctaSz}px "${p.subFont||'Noto Sans SC'}",sans-serif`;
  const btnTW=ctx.measureText(p.ctaText).width;
  ctx.font=`700 ${ctaSz}px "${p.subFont||'Noto Sans SC'}",sans-serif`;
  const tagTW=ctx.measureText(p.ctaTagText).width;
  const btnSectionW=btnTW+padX*2, tagSectionW=tagTW+padX*1.5;
  const pillTotalW=btnSectionW+tagSectionW, pillH=ctaSz+padY*2;
  const pillX=(W-pillTotalW)/2, pillY=ctaY-pillH/2;
  const pillR=pillH/2;
  // pill background
  ctx.fillStyle='#f5ede0';
  ctx.beginPath();ctx.roundRect(pillX,pillY,pillTotalW,pillH,pillR);ctx.fill();
  // pill border
  ctx.strokeStyle=p.ctaBorderColor||'#c8a06a';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(pillX,pillY,pillTotalW,pillH,pillR);ctx.stroke();
  // tag orange fill (clipped to pill shape)
  ctx.save();ctx.beginPath();ctx.roundRect(pillX,pillY,pillTotalW,pillH,pillR);ctx.clip();
  ctx.fillStyle=p.ctaTagBg||'#f0a050';
  ctx.fillRect(pillX+btnSectionW,pillY,tagSectionW,pillH);
  ctx.restore();
  // button text
  ctx.font=`400 ${ctaSz}px "${p.subFont||'Noto Sans SC'}",sans-serif`;
  ctx.fillStyle=p.ctaColor||'#2a1a0a';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.ctaText,pillX+btnSectionW/2,ctaY);
  // tag text
  ctx.font=`700 ${ctaSz}px "${p.subFont||'Noto Sans SC'}",sans-serif`;
  ctx.fillStyle=p.ctaTagColor||'#ffffff';
  ctx.fillText(p.ctaTagText,pillX+btnSectionW+tagSectionW/2,ctaY);

  // grid images
  const gridUrls=await Promise.all(p.grids.slice(0,cols).map(g=>getURL(g.imgKey)));
  const gridTop=heroH+midTxtH;
  for(let i=0;i<cols;i++){
    const gx=pad+i*(gW+gap),gy=gridTop;const g=p.grids[i];const url=gridUrls[i];
    ctx.save();ctx.beginPath();ctx.roundRect(gx,gy,gW,gH,rad);ctx.clip();
    if(url){await new Promise(res=>{const img=new Image();img.onload=()=>{
      const l=iLay(g.nW||img.naturalWidth,g.nH||img.naturalHeight,gW,gH,g.zoom,g.px,g.py);
      ctx.drawImage(img,gx+l.left,gy+l.top,l.width,l.height);res();
    };img.src=url;});}
    else{ctx.fillStyle='#d4c4a8';ctx.fillRect(gx,gy,gW,gH);}
    ctx.restore();
  }

  const a=document.createElement('a');
  a.download=(p.name||'poster')+'_大图文字版_1200x1600.png';
  a.href=canvas.toDataURL('image/png',1);a.click();
  btn.textContent='↓ 导出 PNG';btn.disabled=false;
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});

// ── Button binding (after DOM ready) ─────────────────────────────
document.getElementById('btn-new').addEventListener('click',openModal);
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

(async()=>{
  const ok=await checkAuth();
  if(!ok)return;
  try{
    await openDB();
    const all=await dbAll('P');
    projs=all.sort((a,b)=>b.at-a.at);
    renderList();
  }catch(e){
    document.getElementById('proj-list').innerHTML='<div style="font-size:10px;color:#e05a5a;padding:8px;">初始化失败，请刷新</div>';
  }
})();
</script>
