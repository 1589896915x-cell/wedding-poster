// ── drawTextLS + iLay（规范必须函数） ─────────────────────────────
function drawTextLS(ctx,text,cx,y,lsEm,align){
  if(!text)return 0;
  ctx.textBaseline='top';
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
  return tw;
}
function measureTextLS(ctx,text,lsEm){
  if(!text)return 0;
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  return tw;
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ── IndexedDB ─────────────────────────────────────────────────────
const DB='wedding-venuelist-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ── 状态 ──────────────────────────────────────────────────────────
let projs=[],curId=null;

let _hist=[],_hIdx=-1;
let selVenue=0;
let dragging=false,dragV=0,dragSX=0,dragSY=0,dragPX=50,dragPY=50;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// ── History ───────────────────────────────────────────────────────
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hIdx+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hIdx=_hist.length-1;}
async function undo(){if(_hIdx<=0)return;_hIdx--;const p=JSON.parse(_hist[_hIdx]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);renderPoster();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

// ── Storage ───────────────────────────────────────────────────────
async function loadAll(){projs=await dbAll('P');projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'project')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('json-fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('JSON格式错误');}fi.value='';};fi.click();}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(){document.getElementById('m-name').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function createProj(){const name=document.getElementById('m-name').value.trim()||'未命名';const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject(4)};await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);}
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

// ── 项目列表 ──────────────────────────────────────────────────────
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi${p.id===curId?' on':''}" onclick="openProj('${p.id}')">
    <h3>${escH(p.name)}</h3><div class="meta">${new Date(p.at).toLocaleDateString('zh-CN')}</div>
    <div class="pi-act">
      <button class="pb" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pb" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pb del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function openProj(id){curId=id;selVenue=0;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;_hist=[];_hIdx=-1;renderList();renderPoster();renderRP();}
async function dupProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};for(let i=0;i<4;i++){const b=await dbGet('I',ik(id,i));if(b){const nk=ik(nid,i);await dbPut('I',b,nk);np.venues[i].imgKey=nk;}}await save(np);projs.unshift(np);renderList();}
async function delProj(id){if(!confirm('确认删除？'))return;for(let i=0;i<4;i++)await delImg(ik(id,i));await dbDel('P',id);projs=projs.filter(x=>x.id!==id);if(curId===id){curId=null;document.getElementById('poster').style.cssText='';document.getElementById('poster').innerHTML='';renderRP();}renderList();}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}

// ── 海报尺寸 ──────────────────────────────────────────────────────
function pSz(){const a=document.getElementById('ca');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

// ── 颜色工具 ──────────────────────────────────────────────────────
function toHex(c){if(!c)return'#000000';if(c.startsWith('#'))return c;const m=c.match(/[\d.]+/g);if(!m||m.length<3)return'#000000';return'#'+[m[0],m[1],m[2]].map(x=>Math.round(+x).toString(16).padStart(2,'0')).join('');}
function hexToRgb(h){const hex=(h||'#000').replace('#','');return{r:parseInt(hex.slice(0,2),16)||0,g:parseInt(hex.slice(2,4),16)||0,b:parseInt(hex.slice(4,6),16)||0};}

// ── 渲染定时器 ───────────────────────────────────────────────────
let _rt=null;
function scheduleRender(){clearTimeout(_rt);_rt=setTimeout(()=>renderPoster(),100);}

// ═══════════════════════════════════════════════════════════════════
// 核心渲染（DOM预览）
// ═══════════════════════════════════════════════════════════════════
async function renderPoster(){
  const poster=document.getElementById('poster');
  const p=cur();if(!p){poster.style.cssText='';poster.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  const cnt=p.venueCount||4;

  poster.style.cssText=`width:${w}px;height:${h}px;
    background:linear-gradient(180deg,${p.bgTop} 0%,${p.bgMid||p.bgTop} 50%,${p.bgBot} 100%);
    position:relative;flex-shrink:0;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden;`;

  // 卡片尺寸
  const cX=Math.round(p.cardX*sc);
  const cY=Math.round(p.cardY*sc);
  const cW=Math.round(p.cardW*sc);
  const pad=Math.round(p.cardPad*sc);
  const cr=Math.round(p.cardRadius*sc);
  const innerW=cW-pad*2;
  const imgW=Math.round(p.venueImgW*sc);
  const imgH=Math.round(p.venueImgH*sc);
  const gap=Math.round(p.venueGap*sc);
  const tgap=Math.round(p.txtGap*sc);
  const txtX=imgW+tgap;
  const txtW=innerW-imgW-tgap;
  const imgRad=Math.round((p.imgRadius||8)*sc);
  const bc=hexToRgb(p.cardBg||'#ffffff');
  const cardBgStr=`rgba(${bc.r},${bc.g},${bc.b},${(p.cardBgAlpha||97)/100})`;

  // 字号
  const enFs=Math.round(p.enNameSize*sc);
  const zhFs=Math.round(p.zhNameSize*sc);
  const typeFs=Math.round(p.typeSize*sc);
  const descFs=Math.round(p.descSize*sc);
  const descLH=p.descLineH||1.68;

  // 花括号标题拆分
  function bracketHTML(text,mc,bc2){
    return text.split(/([{｛][^}｝]*[}｝])/g).map(part=>{
      const isBk=/^[{｛]/.test(part);
      return`<span style="color:${isBk?bc2:mc};">${escH(part)}</span>`;
    }).join('');
  }

  // 各厅行
  let rows='';let curVY=pad;
  for(let i=0;i<cnt;i++){
    const v=p.venues[i];
    const url=await getURL(v.imgKey);
    const lout=v.imgKey?iLay(v.nW,v.nH,imgW,imgH,v.zoom,v.px,v.py):{left:0,top:0,width:imgW,height:imgH};
    const descLines=(v.desc||'').split('\n');
    const isLast=i===cnt-1;
    const sepLineY=curVY+imgH+Math.round(gap/2);

    rows+=`
    <div style="position:absolute;left:0;top:${curVY}px;width:${innerW}px;height:${imgH}px;">
      <!-- 图片 z-index:1 -->
      <div data-vi="${i}" style="position:absolute;left:0;top:0;width:${imgW}px;height:${imgH}px;
          overflow:hidden;border-radius:${imgRad}px;z-index:1;cursor:${url?'grab':'pointer'};"
        ${url?`onmousedown="onMD(event,${i})" ontouchstart="onTS(event,${i})"`:
               `onclick="uploadImg(${i})"`}>
        ${url
          ?`<img draggable="false" src="${url}" style="position:absolute;left:${lout.left}px;top:${lout.top}px;width:${lout.width}px;height:${lout.height}px;pointer-events:none;">`
          :`<div style="width:100%;height:100%;background:#f5eaee;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c8a0b0;gap:6px;cursor:pointer;">
              <span style="font-size:${Math.round(20*sc)}px;">＋</span>
              <span style="font-size:${Math.round(10*sc)}px;font-family:'Noto Sans SC',sans-serif;">上传第${i+1}张图</span>
            </div>`}
      </div>
      <!-- 文字区 z-index:3 -->
      <div style="position:absolute;left:${txtX}px;top:0;width:${txtW}px;height:${imgH}px;
          z-index:3;display:flex;flex-direction:column;justify-content:center;">
        <!-- 英文厅名 -->
        <div class="tx-edit" contenteditable="true" spellcheck="false"
          style="font-family:'${p.enNameFont}',serif;font-size:${enFs}px;font-weight:${p.enNameWeight};
            color:${p.enNameColor};letter-spacing:${p.enNameLS}em;margin-right:-${p.enNameLS}em;
            line-height:1.1;outline:none;cursor:text;margin-bottom:${Math.round(5*sc)}px;"
          oninput="setVP(${i},'en',this.textContent)"
          onblur="setVP(${i},'en',this.textContent)">${escH(v.en)}</div>
        <!-- 英文名下横线 + 圆点 -->
        <div style="display:flex;align-items:center;margin-bottom:${Math.round(7*sc)}px;">
          <div style="flex:1;height:1px;background:${p.lineColor};"></div>
          <div style="width:${Math.round(7*sc)}px;height:${Math.round(7*sc)}px;border-radius:50%;background:${p.lineColor};margin-left:${Math.round(3*sc)}px;flex-shrink:0;"></div>
        </div>
        <!-- 中文厅名 + 类型 -->
        <div style="display:flex;align-items:baseline;gap:${Math.round(10*sc)}px;flex-wrap:nowrap;margin-bottom:${Math.round(7*sc)}px;">
          <span class="tx-edit" contenteditable="true" spellcheck="false"
            style="font-family:'${p.zhNameFont}',serif;font-size:${zhFs}px;font-weight:${p.zhNameWeight};
              color:${p.zhNameColor};letter-spacing:${p.zhNameLS}em;
              line-height:1;outline:none;cursor:text;white-space:nowrap;flex-shrink:0;"
            oninput="setVP(${i},'zh',this.textContent)"
            onblur="setVP(${i},'zh',this.textContent)">${escH(v.zh)}</span>
          <span class="tx-edit" contenteditable="true" spellcheck="false"
            style="font-family:'${p.typeFont}',sans-serif;font-size:${typeFs}px;font-weight:${p.typeWeight};
              color:${p.typeColor};letter-spacing:${p.typeLS}em;
              line-height:1;outline:none;cursor:text;white-space:nowrap;"
            oninput="setVP(${i},'type',this.textContent)"
            onblur="setVP(${i},'type',this.textContent)">${escH(v.type)}</span>
        </div>
        <!-- 描述 -->
        <div class="tx-edit" contenteditable="true" spellcheck="false"
          style="font-family:'${p.descFont}',sans-serif;font-size:${descFs}px;font-weight:${p.descWeight};
            color:${p.descColor};letter-spacing:${p.descLS}em;line-height:${descLH};outline:none;cursor:text;"
          oninput="setVPDescEl(${i},this)"
          onblur="setVPDescEl(${i},this)">${descLines.map(l=>escH(l)).join('<br>')}</div>
      </div>
    </div>
    ${!isLast?`<div style="position:absolute;left:0;top:${sepLineY}px;width:${innerW}px;height:1px;background:#e0c8d0;opacity:.55;"></div>`:''}`;

    curVY+=imgH+gap;
  }
  const cardH=curVY-gap+pad;

  // 标题坐标
  const teY=Math.round(p.titleENY*sc);
  const teFs=Math.round(p.titleENSize*sc);
  const tzY=Math.round(p.titleZHY*sc);
  const tzFs=Math.round(p.titleZHSize*sc);
  const vzY=Math.round(p.venueZHY*sc);
  const vzFs=Math.round(p.venueZHSize*sc);
  const veY=Math.round(p.venueENY*sc);
  const veFs=Math.round(p.venueENSize*sc);
  const ulY=vzY+vzFs+Math.round(5*sc);
  const ulW=Math.round((p.underlineW||230)*sc);

  poster.innerHTML=`
    <!-- 英文大标题 -->
    <div class="tx-edit" contenteditable="true" spellcheck="false"
      style="position:absolute;left:0;right:0;top:${teY}px;text-align:center;
        letter-spacing:${p.titleENLS}em;margin-right:-${p.titleENLS}em;
        font-family:'${p.titleENFont}',serif;font-size:${teFs}px;font-weight:${p.titleENWeight};
        color:${p.titleENColor};line-height:1;outline:none;cursor:text;"
      oninput="setP('titleEN',this.textContent)"
      onblur="setP('titleEN',this.textContent)">${escH(p.titleEN)}</div>

    <!-- 中文主标题（花括号变色） -->
    <div style="position:absolute;left:0;right:0;top:${tzY}px;
        display:flex;justify-content:center;line-height:1;
        font-family:'${p.titleZHFont}',serif;font-size:${tzFs}px;font-weight:${p.titleZHWeight};
        letter-spacing:${p.titleZHLS}em;margin-right:-${p.titleZHLS}em;">
      <div>${bracketHTML(p.titleZH,p.titleZHColor,p.bracketColor)}</div>
    </div>

    <!-- 场馆中文名 -->
    <div class="tx-edit" contenteditable="true" spellcheck="false"
      style="position:absolute;left:0;right:0;top:${vzY}px;text-align:center;
        letter-spacing:${p.venueZHLS}em;margin-right:-${p.venueZHLS}em;
        font-family:'${p.venueZHFont}',serif;font-size:${vzFs}px;font-weight:${p.venueZHWeight};
        color:${p.venueZHColor};line-height:1;outline:none;cursor:text;"
      oninput="setP('venueZH',this.textContent)"
      onblur="setP('venueZH',this.textContent)">${escH(p.venueZH)}</div>

    <!-- 下划线 -->
    <div style="position:absolute;left:50%;transform:translateX(-50%);top:${ulY}px;
        width:${ulW}px;height:${Math.round(1.5*sc)}px;background:${p.venueZHColor};"></div>

    <!-- 场馆英文名 -->
    <div class="tx-edit" contenteditable="true" spellcheck="false"
      style="position:absolute;left:0;right:0;top:${veY}px;text-align:center;
        letter-spacing:${p.venueENLS}em;margin-right:-${p.venueENLS}em;
        font-family:'${p.venueENFont}',serif;font-size:${veFs}px;font-weight:${p.venueENWeight};
        color:${p.venueENColor};line-height:1;outline:none;cursor:text;"
      oninput="setP('venueEN',this.textContent)"
      onblur="setP('venueEN',this.textContent)">${escH(p.venueEN)}</div>

    <!-- 白色卡片 -->
    <div style="position:absolute;left:${cX}px;top:${cY}px;width:${cW}px;height:${cardH}px;
        background:${cardBgStr};border-radius:${cr}px;overflow:hidden;">
      <div style="position:absolute;left:${pad}px;top:0;width:${innerW}px;height:${cardH}px;">
        ${rows}
      </div>
    </div>`;
}

// ── 拖拽 ──────────────────────────────────────────────────────────
function onMD(e,vi){const p=cur();const v=p?.venues[vi];if(!v||!v.imgKey||e.button!==0)return;dragging=true;dragV=vi;dragSX=e.clientX;dragSY=e.clientY;dragPX=v.px;dragPY=v.py;e.currentTarget.style.cursor='grabbing';if(selVenue!==vi){selVenue=vi;renderRP();}e.preventDefault();}
function onTS(e,vi){const p=cur();const v=p?.venues[vi];if(!v||!v.imgKey)return;dragging=true;dragV=vi;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=v.px;dragPY=v.py;if(selVenue!==vi){selVenue=vi;renderRP();}e.preventDefault();}
document.addEventListener('mousemove',async e=>{
  if(!dragging)return;const p=cur();if(!p)return;
  const{w}=pSz();const sc=w/1200;
  const imgW=Math.round(p.venueImgW*sc),imgH=Math.round(p.venueImgH*sc);
  const v=p.venues[dragV];
  v.px=Math.max(0,Math.min(100,dragPX-(e.clientX-dragSX)/imgW*100));
  v.py=Math.max(0,Math.min(100,dragPY-(e.clientY-dragSY)/imgH*100));
  const slx=document.getElementById('sl-vpx'),sly=document.getElementById('sl-vpy');
  const nix=document.getElementById('ni-vpx'),niy=document.getElementById('ni-vpy');
  if(slx)slx.value=v.px;if(sly)sly.value=v.py;if(nix)nix.value=Math.round(v.px);if(niy)niy.value=Math.round(v.py);
  renderPoster();
});
document.addEventListener('touchmove',async e=>{if(!dragging)return;const p=cur();if(!p)return;const{w}=pSz();const sc=w/1200;const imgW=Math.round(p.venueImgW*sc);const v=p.venues[dragV];v.px=Math.max(0,Math.min(100,dragPX-(e.touches[0].clientX-dragSX)/imgW*100));v.py=Math.max(0,Math.min(100,dragPY-(e.touches[0].clientY-dragSY)/imgW*100));renderPoster();},{passive:false});
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});

// ── 上传 ──────────────────────────────────────────────────────────
function uploadImg(vi){const fi=document.getElementById('fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;const img=new Image();const url=URL.createObjectURL(file);img.onload=async()=>{const key=ik(curId,vi);await saveImg(key,file);const v=p.venues[vi];v.imgKey=key;v.nW=img.naturalWidth;v.nH=img.naturalHeight;v.px=50;v.py=50;v.zoom=1;URL.revokeObjectURL(url);pushH();await save(p);renderPoster();renderRP();};img.src=url;fi.value='';};fi.click();}

// ── Setters ───────────────────────────────────────────────────────
async function setP(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);scheduleRender();}
async function setPN(k,v){const p=cur();if(!p)return;pushH();p[k]=+v;await save(p);renderPoster();}
async function setVP(vi,k,v){const p=cur();if(!p)return;pushH();p.venues[vi][k]=v;await save(p);}
async function setVPDescEl(vi,el){const p=cur();if(!p)return;pushH();const raw=el.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');p.venues[vi].desc=raw;await save(p);}
async function setVPTA(vi,val){const p=cur();if(!p)return;pushH();p.venues[vi].desc=val;await save(p);scheduleRender();}
async function setImgP(k,v){const p=cur();if(!p)return;p.venues[selVenue][k]=+v;renderPoster();await save(p);}
async function setVenueCount(n){
  const p=cur();if(!p)return;pushH();
  p.venueCount=n;
  // 切换厅数时同步更新图片/卡片尺寸默认值
  const D=n===3?DEFAULTS_3:DEFAULTS_4;
  p.venueImgW=D.venueImgW;p.venueImgH=D.venueImgH;
  p.cardX=D.cardX;p.cardY=D.cardY;p.cardW=D.cardW;
  p.cardPad=D.cardPad;p.cardRadius=D.cardRadius;p.venueGap=D.venueGap;
  await save(p);renderPoster();renderRP();
}
function selV(i){selVenue=i;renderRP();}

// ═══════════════════════════════════════════════════════════════════
// 右侧面板
// ═══════════════════════════════════════════════════════════════════
function renderRP(){
  const rp=document.getElementById('rp');const p=cur();
  if(!p){rp.innerHTML='<div class="no-proj"><p>新建或选择项目</p></div>';return;}
  const cnt=p.venueCount||4;const v=p.venues[selVenue];
  const fZh=sel=>FONTS_ZH.map(f=>`<option value="${f}"${sel===f?' selected':''}>${f}</option>`).join('');
  const fEn=sel=>FONTS_EN.map(f=>`<option value="${f}"${sel===f?' selected':''}>${f}</option>`).join('');
  const wO=sel=>WTS.map(([va,l])=>`<option value="${va}"${sel===va?' selected':''}>${l}</option>`).join('');
  const cRow=(key,val,lbl)=>`
    <div class="row"><label>${lbl||'颜色'}</label>
      <div class="cd" id="cd-${key}" style="background:${toHex(val)};" onclick="document.getElementById('ci-${key}').click()"></div>
      <input id="ci-${key}" type="color" value="${toHex(val)}" style="display:none"
        onchange="setP('${key}',this.value);document.getElementById('cd-${key}').style.background=this.value;document.getElementById('ct-${key}').value=this.value">
      <input id="ct-${key}" class="fi" style="flex:1;margin:0;" type="text" value="${val}"
        oninput="setP('${key}',this.value);document.getElementById('cd-${key}').style.background=this.value">
    </div>`;
  const pkY=(key,val,lbl,mn,mx)=>`
    <div class="poskit-row"><span class="pk-lbl">${lbl||'↕ Y'}</span>
      <input id="pks-${key}" class="pk-sld" type="range" min="${mn||0}" max="${mx||1600}" value="${val}"
        oninput="setPN('${key}',+this.value);document.getElementById('pkn-${key}').value=this.value">
      <input id="pkn-${key}" class="pk-num" type="number" value="${val}"
        oninput="setPN('${key}',+this.value);document.getElementById('pks-${key}').value=this.value">
    </div>`;

  rp.innerHTML=`
  <div class="sc">
    <div class="st"><span class="st-icon"></span>厅数量</div>
    <div class="cnt-row">
      <div class="cnt-btn${cnt===3?' on':''}" onclick="setVenueCount(3)">3个厅</div>
      <div class="cnt-btn${cnt===4?' on':''}" onclick="setVenueCount(4)">4个厅</div>
    </div>
  </div>

  <div class="sc">
    <div class="st"><span class="st-icon"></span>当前编辑厅</div>
    <div class="hint">⚡ 英文名/中文名/类型/描述 各厅独立</div>
    <div class="vtabs">
      ${Array.from({length:cnt},(_,i)=>`<button class="vtab${selVenue===i?' on':''}" onclick="selV(${i})">厅${i+1}${p.venues[i].imgKey?'✓':''}</button>`).join('')}
    </div>

// ═══════════════════════════════════════════════════════════════════
// 导出 PNG 1200×1600
// ═══════════════════════════════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;
  if(!await checkQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const W=1200,H=1600;const cnt=p.venueCount||4;
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // 背景渐变
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,p.bgTop||'#f2dce6');
    bg.addColorStop(0.5,p.bgMid||p.bgTop||'#ddb8ca');
    bg.addColorStop(1,p.bgBot||'#c498b0');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    async function loadImgEl(key){const url=await getURL(key);if(!url)return null;return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}

    // ── 英文大标题 ──
    ctx.save();
    ctx.font=`${p.titleENWeight} ${p.titleENSize}px '${p.titleENFont}',serif`;
    ctx.fillStyle=p.titleENColor;
    ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=3;
    drawTextLS(ctx,p.titleEN||'',W/2,p.titleENY,p.titleENLS,'center');
    ctx.shadowBlur=0;ctx.restore();

    // ── 中文主标题（花括号分段） ──
    {
      const fs=p.titleZHSize,ls=p.titleZHLS;
      const parts=(p.titleZH||'').split(/([{｛][^}｝]*[}｝])/g);
      ctx.save();
      ctx.font=`${p.titleZHWeight} ${fs}px '${p.titleZHFont}',serif`;
      ctx.textBaseline='top';
      // 量总宽
      let totalW=0;
      parts.forEach(part=>{const chars=[...part];chars.forEach((ch,i)=>{totalW+=ctx.measureText(ch).width;if(i<chars.length-1)totalW+=ls*fs;});});
      let sx=W/2-totalW/2;
      parts.forEach(part=>{
        const isBk=/^[{｛]/.test(part);
        ctx.fillStyle=isBk?(p.bracketColor||'#c8392b'):(p.titleZHColor||'#1a1010');
        const chars=[...part];
        chars.forEach((ch,i)=>{ctx.fillText(ch,sx,p.titleZHY);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls*fs:0);});
      });
      ctx.restore();
    }

    // ── 场馆中文名 ──
    ctx.save();
    ctx.font=`${p.venueZHWeight} ${p.venueZHSize}px '${p.venueZHFont}',serif`;
    ctx.fillStyle=p.venueZHColor;
    drawTextLS(ctx,p.venueZH||'',W/2,p.venueZHY,p.venueZHLS,'center');
    ctx.restore();
    // 下划线
    {const ulY=p.venueZHY+p.venueZHSize+6;const rgb=hexToRgb(p.venueZHColor);ctx.fillStyle=`rgb(${rgb.r},${rgb.g},${rgb.b})`;ctx.fillRect(W/2-(p.underlineW||230)/2,ulY,(p.underlineW||230),2);}

    // ── 场馆英文名 ──
    ctx.save();
    ctx.font=`${p.venueENWeight} ${p.venueENSize}px '${p.venueENFont}',serif`;
    ctx.fillStyle=p.venueENColor;
    drawTextLS(ctx,p.venueEN||'',W/2,p.venueENY,p.venueENLS,'center');
    ctx.restore();

    // ── 卡片 ──
    const cX=p.cardX,cY=p.cardY,cW=p.cardW;
    const pad=p.cardPad,cr=p.cardRadius;
    const imgW=p.venueImgW,imgH=p.venueImgH;
    const gap=p.venueGap,tgap=p.txtGap||26;
    const innerW=cW-pad*2;
    const txtX_=imgW+tgap,txtW_=innerW-imgW-tgap;
    const enFs=p.enNameSize,zhFs=p.zhNameSize,typeFs=p.typeSize,descFs=p.descSize;
    const descLH=p.descLineH||1.68;
    const lineRgb=hexToRgb(p.lineColor||'#a03060');

    // 卡片总高
    let totalH=pad;
    for(let i=0;i<cnt;i++){totalH+=imgH;if(i<cnt-1)totalH+=gap;}totalH+=pad;
    const bc2=hexToRgb(p.cardBg||'#ffffff');
    ctx.save();ctx.beginPath();ctx.roundRect(cX,cY,cW,totalH,cr);
    ctx.fillStyle=`rgba(${bc2.r},${bc2.g},${bc2.b},${(p.cardBgAlpha||97)/100})`;ctx.fill();ctx.restore();

    let vY=cY+pad;
    for(let i=0;i<cnt;i++){
      const v=p.venues[i];
      const vX=cX+pad;
      // 图片
      const imgEl=await loadImgEl(v.imgKey);
      ctx.save();ctx.beginPath();ctx.roundRect(vX,vY,imgW,imgH,p.imgRadius||8);ctx.clip();
      if(imgEl){const l=iLay(v.nW||imgEl.naturalWidth,v.nH||imgEl.naturalHeight,imgW,imgH,v.zoom,v.px,v.py);ctx.drawImage(imgEl,vX+l.left,vY+l.top,l.width,l.height);}
      else{ctx.fillStyle='#f5eaee';ctx.fillRect(vX,vY,imgW,imgH);ctx.fillStyle='#c8a0b0';ctx.font=`400 24px 'Noto Sans SC',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`第${i+1}张图`,vX+imgW/2,vY+imgH/2);ctx.textAlign='left';}
      ctx.restore();

      // 文字垂直居中
      const txX=vX+txtX_;
      const descLines=(v.desc||'').split('\n').filter(l=>l.trim());
      const descH=descLines.length*descFs*descLH;
      const enH=enFs+5;
      const sepH=14; // 横线+间距
      const zhH=Math.max(zhFs,typeFs)+7;
      const totalTxtH=enH+sepH+zhH+descH;
      let tyY=vY+(imgH-totalTxtH)/2;
      if(tyY<vY+6)tyY=vY+6;

      // 英文名
      ctx.save();
      ctx.font=`${p.enNameWeight} ${enFs}px '${p.enNameFont}',serif`;
      ctx.fillStyle=p.enNameColor;
      drawTextLS(ctx,v.en||'',txX,tyY,p.enNameLS,'left');
      tyY+=enFs+5;

      // 横线+圆点
      const lY=tyY+3;const dotR=4;const lineEndX=cX+cW-pad;
      ctx.strokeStyle=`rgb(${lineRgb.r},${lineRgb.g},${lineRgb.b})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(txX,lY);ctx.lineTo(lineEndX-dotR*2-3,lY);ctx.stroke();
      ctx.fillStyle=`rgb(${lineRgb.r},${lineRgb.g},${lineRgb.b})`;
      ctx.beginPath();ctx.arc(lineEndX-dotR,lY,dotR,0,Math.PI*2);ctx.fill();
      ctx.restore();
      tyY+=sepH;

      // 中文名
      ctx.save();
      ctx.font=`${p.zhNameWeight} ${zhFs}px '${p.zhNameFont}',serif`;
      ctx.fillStyle=p.zhNameColor;
      const zhW=measureTextLS(ctx,v.zh||'',p.zhNameLS);
      drawTextLS(ctx,v.zh||'',txX,tyY,p.zhNameLS,'left');
      ctx.restore();
      // 类型
      ctx.save();
      ctx.font=`${p.typeWeight} ${typeFs}px '${p.typeFont}',sans-serif`;
      ctx.fillStyle=p.typeColor;
      drawTextLS(ctx,v.type||'',txX+zhW+12,tyY,p.typeLS||0,'left');
      ctx.restore();
      tyY+=Math.max(zhFs,typeFs)+7;

      // 描述
      ctx.save();
      ctx.font=`${p.descWeight} ${descFs}px '${p.descFont}',sans-serif`;
      ctx.fillStyle=p.descColor;
      (v.desc||'').split('\n').forEach(line=>{
        if(line.trim())drawTextLS(ctx,line,txX,tyY,p.descLS||0.02,'left');
        tyY+=descFs*descLH;
      });
      ctx.restore();

      // 厅间分隔线
      if(i<cnt-1){
        const sepY=vY+imgH+gap/2;
        ctx.save();ctx.strokeStyle='rgba(224,200,208,0.6)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(cX+pad,sepY);ctx.lineTo(cX+cW-pad,sepY);ctx.stroke();ctx.restore();
      }
      vY+=imgH+gap;
    }

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    },'image/png');

  }catch(err){console.error(err);alert('导出失败：'+err.message);}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});

</script>
