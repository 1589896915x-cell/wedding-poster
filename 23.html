<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0e0e0e;color:#fff;height:100vh;overflow:hidden;display:flex;padding-top:40px;}

<script>

let _lic=null;
async function wpCheckAuth(){if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const e=document.getElementById('credits');if(e)e.textContent='测试模式';return true;}const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}try{const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}const lic=d[0];if((lic.credits||0)<=0||(lic.expires_at&&new Date(lic.expires_at)<new Date())){location.href='index.html';return false;}_lic=lic;updC();return true;}catch{return true;}}
function updC(){const e=document.getElementById('credits');if(e&&_lic)e.textContent=`剩余 ${_lic.credits||0} 次`;}
async function checkQuota(){if(location.protocol==='file:'||location.hostname==='localhost')return true;if(!_lic||(_lic.credits||0)<=0){alert('次数不足');return false;}try{const nc=(_lic.credits||0)-1;const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updC();return true;}catch{_lic.credits=Math.max(0,(_lic.credits||0)-1);updC();return true;}}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}
function drawTextLS(ctx,text,cx,y,lsEm,align){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{ctx.fillText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function drawTextLSstk(ctx,text,cx,y,lsEm,align,strokeWidth){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;ctx.lineWidth=strokeWidth;ctx.lineJoin='round';chars.forEach((c,i)=>{ctx.strokeText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function iLay(nW,nH,cW,cH,zoom,px,py){if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};}
function toHex(c){if(!c)return'#000000';if(c.startsWith('#'))return c;const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(m)return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');return'#000000';}
const DB='wedding-price-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});
let projs=[],curId=null;const imgCache={};let dragging=false,dragSX=0,dragSY=0,dragPX=50,dragPY=50;let _hist=[],_hi=-1;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid)=>`bp-${pid}-bg`;
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hi+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hi=_hist.length-1;}
async function undo(){if(_hi<=0)return;_hi--;const p=JSON.parse(_hist[_hi]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);await render();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});
async function loadAll(){projs=await dbAll('P');projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){if(!key)return;await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'p')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('jfi');fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('格式错误');}fi.value='';};fi.click();}

// ═══ Per-line text style ROOT SPEC ════════════════════════════════════
function defLine(text,opts){return Object.assign({text:text||'',font:'Noto Sans SC',weight:'400',italic:false,size:36,color:'#ffffff',ls:0.02,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:0},opts||{});}
const FONT_OPTS=['Noto Sans SC','Noto Serif SC','Ma Shan Zheng','ZCOOL XiaoWei','Cormorant Garamond','Dancing Script','Pacifico','Oswald','STSong','SimSun','Microsoft YaHei','KaiTi'];
const WEIGHT_OPTS=[['300','细'],['400','常规'],['500','中等'],['700','粗'],['900','超粗']];
function applyLineCSS(line,sizePx){const sty=[`font-family:'${line.font}',sans-serif`,`font-size:${sizePx}px`,`font-weight:${line.weight}`,`color:${line.color}`,`letter-spacing:${line.ls}em`,`line-height:1`];if(line.italic)sty.push('font-style:italic');if(line.strokeWidth>0)sty.push(`-webkit-text-stroke:${line.strokeWidth}px ${line.strokeColor}`);if(line.glowBlur>0)sty.push(`text-shadow:0 0 ${line.glowBlur}px ${line.glowColor},0 0 ${line.glowBlur*1.6}px ${line.glowColor}`);return sty.join(';');}
function canvasDrawLine(ctx,line,cx,y,sizePx,align){if(!line.text)return;const it=line.italic?'italic ':'';ctx.font=`${it}${line.weight} ${sizePx}px '${line.font}',sans-serif`;if(line.glowBlur>0){ctx.shadowColor=line.glowColor;ctx.shadowBlur=line.glowBlur;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}else{ctx.shadowBlur=0;}if(line.strokeWidth>0){ctx.strokeStyle=line.strokeColor;drawTextLSstk(ctx,line.text,cx,y,line.ls,align||'center',line.strokeWidth*2);}ctx.fillStyle=line.color;drawTextLS(ctx,line.text,cx,y,line.ls,align||'center');ctx.shadowBlur=0;}

function defProject(){return{
  bgImg:{imgKey:null,px:50,py:50,zoom:1,nW:0,nH:0},
  // Each text line independently configurable
  headlineLine:defLine('繁景6-9月档期告急',{font:'Noto Sans SC',weight:'900',size:116,color:'#ffffff',ls:0.01,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:0}),
  headlineY:90,
  subLeftLine:defLine('北京婚宴',{font:'Noto Serif SC',weight:'400',size:49,color:'#ffffff',ls:0.08,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:14}),
  subRightLine:defLine('一价全包',{font:'Noto Serif SC',weight:'400',size:49,color:'#ffffff',ls:0.08,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:14}),
  subOffY:32,
  // Price split into 3 independent lines: ¥ (currency), digits, unit
  priceCurrencyLine:defLine('¥',{font:'Noto Sans SC',weight:'900',size:75,color:'#ffffff',ls:0,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:0}),
  priceLine:defLine('5880',{font:'Noto Sans SC',weight:'900',size:140,color:'#ffffff',ls:0,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:30}),
  priceUnitLine:defLine('起/桌',{font:'Noto Sans SC',weight:'700',size:42,color:'#ffffff',ls:0.04,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:18}),
  priceOffY:80,
  badgeLine:defLine('7大宴会厅  Banquet Hall',{font:'Noto Sans SC',weight:'700',size:54,color:'#ffffff',ls:0.06,strokeColor:'#000000',strokeWidth:0,glowColor:'#000000',glowBlur:0}),
  // Symmetric gradient: edges (Edge color) → middle (Mid color) → edges
  badgeColorEdge:'#903060',badgeColorMid:'#e85a85',
  badgeW:90,badgeH:114,badgeOffY:80,badgeRadius:70,
};}

function openModal(){document.getElementById('mn').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('mn').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function createProj(){const name=document.getElementById('mn').value.trim()||'未命名';const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject()};await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);}
document.getElementById('mn').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});
function renderList(){const el=document.getElementById('pl');if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px;">暂无项目</div>';return;}el.innerHTML=projs.map(p=>`<div class="pi${p.id===curId?' on':''}" onclick="openProj('${p.id}')"><h3>${esc(p.name)}</h3><div class="mt">${new Date(p.at).toLocaleDateString('zh-CN')}</div><div class="pa"><button class="pb2" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button><button class="pb2" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button><button class="pb2 del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button></div></div>`).join('');}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function openProj(id){curId=id;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;_hist=[];_hi=-1;renderList();await render();renderRP();}
async function dupProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};const b=await dbGet('I',ik(id));if(b){await dbPut('I',b,ik(nid));np.bgImg.imgKey=ik(nid);}await save(np);projs.unshift(np);renderList();}
async function delProj(id){if(!confirm('确认删除？'))return;await delImg(ik(id));await dbDel('P',id);projs=projs.filter(p=>p.id!==id);if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}renderList();}
async function onNC(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
function pSz(){const a=document.getElementById('ca');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

async function render(){
  const poster=document.getElementById('poster');const p=cur();if(!p){poster.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  poster.style.cssText=`width:${w}px;height:${h}px;background:#0a0a0a;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 20px 60px rgba(0,0,0,.6);`;
  const bgURL=await getURL(p.bgImg.imgKey);const bg=p.bgImg;const bl=bgURL?iLay(bg.nW,bg.nH,w,h,bg.zoom,bg.px,bg.py):{left:0,top:0,width:w,height:h};
  let html='';
  // bg
  if(bgURL){html+=`<div id="bgslot" style="position:absolute;inset:0;overflow:hidden;cursor:grab;"><img id="img-bg" src="${bgURL}" draggable="false" style="position:absolute;left:${bl.left}px;top:${bl.top}px;width:${bl.width}px;height:${bl.height}px;pointer-events:none;"></div>`;}

    ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
    const bgURL=await getURL(p.bgImg.imgKey);
    if(bgURL){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=bgURL;});if(img){const l=iLay(p.bgImg.nW||img.naturalWidth,p.bgImg.nH||img.naturalHeight,W,H,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);ctx.drawImage(img,l.left,l.top,l.width,l.height);}}
    else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1a0a1a');g.addColorStop(.5,'#2a0818');g.addColorStop(1,'#1a0828');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    // headline (centered) - preview line-height:1.15 → +size*0.075
    canvasDrawLine(ctx,p.headlineLine,W/2,p.headlineY+p.headlineLine.size*0.075,p.headlineLine.size,'center');
    // sub line (centered as a unit) - 5 segments share style: — left ｜ right —
    const subY=p.headlineY+p.headlineLine.size+p.subOffY;
    const sl=p.subLeftLine,sr=p.subRightLine;
    const sSz=sl.size;
    // Set font to measure widths
    function measureSubW(ctx,text,line){
      ctx.font=`${line.italic?'italic ':''}${line.weight} ${line.size}px '${line.font}',sans-serif`;
      const ls=(line.ls||0)*line.size;
      const chs=[...text];let w=0;
      chs.forEach((c,i)=>{w+=ctx.measureText(c).width;if(i<chs.length-1)w+=ls;});
      return w;
    }
    const wDashL=measureSubW(ctx,'—',sl);
    const wSL=measureSubW(ctx,sl.text,sl);
    const wPipe=measureSubW(ctx,'｜',sl);
    const wSR=measureSubW(ctx,sr.text,sr);
    const wDashR=measureSubW(ctx,'—',sl);
    const gap=12;
    const totalSubW=wDashL+gap+wSL+gap+wPipe+gap+wSR+gap+wDashR;
    let xCur=Math.round((W-totalSubW)/2);
    // Helper line objects for separators (share sl style, no glow/stroke for cleanliness)
    const sepLine={...sl,text:'—',glowBlur:0,strokeWidth:0};
    const pipeLine={...sl,text:'｜',glowBlur:0,strokeWidth:0};
    ctx.save();ctx.globalAlpha=0.55;
    canvasDrawLine(ctx,sepLine,xCur,subY,sSz,'left');
    ctx.restore();
    xCur+=wDashL+gap;
    canvasDrawLine(ctx,sl,xCur,subY,sl.size,'left');xCur+=wSL+gap;
    ctx.save();ctx.globalAlpha=0.55;
    canvasDrawLine(ctx,pipeLine,xCur,subY,sSz,'left');
    ctx.restore();
    xCur+=wPipe+gap;
    canvasDrawLine(ctx,sr,xCur,subY,sr.size,'left');xCur+=wSR+gap;
    ctx.save();ctx.globalAlpha=0.55;
    canvasDrawLine(ctx,sepLine,xCur,subY,sSz,'left');
    ctx.restore();
    // price (centered as unit) ¥ + digits + unit
    const priceY=subY+sl.size+p.priceOffY;
    const pcl=p.priceCurrencyLine,pl=p.priceLine,pul=p.priceUnitLine;
    // measure widths with proper font + ls
    function measureLineW(ctx,line){ctx.font=`${line.italic?'italic ':''}${line.weight} ${line.size}px '${line.font}',sans-serif`;const ls=(line.ls||0)*line.size;const chs=[...line.text];let w=0;chs.forEach((c,i)=>{w+=ctx.measureText(c).width;if(i<chs.length-1)w+=ls;});return w;}
    const wCur=measureLineW(ctx,pcl),wPr=measureLineW(ctx,pl),wUn=measureLineW(ctx,pul);
    const priceGap=8;
    const totalPriceW=wCur+priceGap+wPr+priceGap+wUn;
    let pxCur=Math.round((W-totalPriceW)/2);
    // Find max size to use as baseline reference
    const maxPriceSize=Math.max(pcl.size,pl.size,pul.size);
    // Each line uses textBaseline:'top' inside canvasDrawLine. To baseline-align, offset y so smaller-size text sits on common baseline.
    // common baseline at priceY + maxPriceSize * 0.85 (approx baseline)
    canvasDrawLine(ctx,pcl,pxCur,priceY+(maxPriceSize-pcl.size),pcl.size,'left');pxCur+=wCur+priceGap;
    canvasDrawLine(ctx,pl,pxCur,priceY+(maxPriceSize-pl.size),pl.size,'left');pxCur+=wPr+priceGap;
    canvasDrawLine(ctx,pul,pxCur,priceY+(maxPriceSize-pul.size)-6,pul.size,'left');
    // badge - symmetric 3-stop gradient
    const bH=p.badgeH||108,bR=p.badgeRadius||54,bOff=p.badgeOffY||80;
    const bWPct=p.badgeW||90;const bW=Math.round(W*bWPct/100);const bX=Math.round((W-bW)/2);const bY=H-bOff-bH;
    const edgeC=p.badgeColorEdge||'#903060',midC=p.badgeColorMid||'#e85a85';
    const g2=ctx.createLinearGradient(bX,0,bX+bW,0);
    g2.addColorStop(0,edgeC);g2.addColorStop(0.5,midC);g2.addColorStop(1,edgeC);
    ctx.beginPath();ctx.roundRect(bX,bY,bW,bH,bR);ctx.fillStyle=g2;ctx.fill();
    canvasDrawLine(ctx,p.badgeLine,bX+bW/2,bY+(bH-p.badgeLine.size)/2,p.badgeLine.size,'center');
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}
window.addEventListener('resize',()=>{if(curId)render();});
(async()=>{await wpCheckAuth();await openDB();await loadAll();renderList();})();
</script>
