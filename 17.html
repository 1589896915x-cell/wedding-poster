<script>
// ═══ AUTH ════════════════════════════════════════════════════════════

function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ═══ drawTextLS & iLay ════════════════════════════════════════════════
function drawTextLS(ctx,text,cx,y,lsEm,align){
  if(!text)return;ctx.textBaseline='top';
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ═══ roundRect polyfill ════════════════════════════════════════════════
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
}

// ═══ IndexedDB ════════════════════════════════════════════════════════
const DB='wedding-cornerlabel-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ═══ 字体 & 权重选项 ════════════════════════════════════════════════
const ZH_FONTS=['Noto Serif SC','Noto Sans SC','STSong','STKaiti','PingFang SC','Microsoft YaHei','SimHei'];
const EN_FONTS=['Cormorant Garamond','Playfair Display','Georgia','Times New Roman','Noto Serif SC','Arial','Trebuchet MS'];
const WTS=[['300','细'],['400','常规'],['500','中'],['700','粗'],['900','超粗']];

// ═══ Defaults ════════════════════════════════════════════════════════
function defProject(){return{
  bgColor:'#0a0a0a',
  gap:0,
  // ★ 全局中文（四格共用同一组文字）
  zhName:'仙境花园',
  zhFont:'Noto Serif SC',zhSize:60,zhWeight:'900',zhColor:'#ffffff',zhLS:0.08,
  zhOffX:175,zhOffY:34,  // 距格子左/上边缘 px (1200基准)
  // ★ 全局英文（四格共用同一组文字）
  enName:'Wonderland Garden',
  enFont:'Cormorant Garamond',enSize:26,enWeight:'400',enStyle:'italic',enColor:'#ffffff',enLS:0.05,
  enOffX:200,enGap:10,   // enOffX=距左, enGap=中英间距
  // 文字阴影
  shadowColor:'rgba(0,0,0,0.6)',shadowBlur:14,shadowOffY:2,
  // 品牌Logo（可清空隐藏）
  brandCN:'格乐利雅',brandEN:'GALLERIA',
  brandColor:'#ffffff',brandCNSize:28,brandENSize:22,
  brandCNLS:0.32,brandENLS:0.18,showBrand:true,
  // 4格图片
  cells:[0,1,2,3].map(()=>({imgKey:null,px:50,py:50,zoom:1,nW:0,nH:0})),
};}

// ═══ State ════════════════════════════════════════════════════════════
let projs=[],curId=null,selCell=0;
const imgCache={};
let dragging=false,dragCell=0,dragSX=0,dragSY=0,dragPX=50,dragPY=50;
let _hist=[],_hIdx=-1;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid,i)=>`cl-${pid}-${i}`;
function toHex(col){if(!col)return'#000000';if(col.startsWith('#'))return col;const m=col.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(m)return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');return'#000000';}

// ═══ History ════════════════════════════════════════════════════════
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hIdx+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hIdx=_hist.length-1;}
async function undo(){if(_hIdx<=0)return;_hIdx--;const p=JSON.parse(_hist[_hIdx]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);await renderPoster();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

// ═══ Storage ════════════════════════════════════════════════════════
async function loadAll(){projs=await dbAll('P');projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'project')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('json-fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('JSON格式错误');}fi.value='';};fi.click();}

// ═══ Modal ════════════════════════════════════════════════════════════
function openModal(){document.getElementById('m-name').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function createProj(){
  const name=document.getElementById('m-name').value.trim()||'未命名';
  const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject()};
  await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);
}
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

// ═══ Project List ════════════════════════════════════════════════════
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi${p.id===curId?' on':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><div class="meta">${new Date(p.at).toLocaleDateString('zh-CN')}</div>
    <div class="pi-actions">
      <button class="pb" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pb" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pb del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function openProj(id){curId=id;selCell=0;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;_hist=[];_hIdx=-1;renderList();await renderPoster();renderRP();}
async function dupProj(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  for(let i=0;i<4;i++){const b=await dbGet('I',ik(id,i));if(b){await dbPut('I',b,ik(nid,i));np.cells[i].imgKey=ik(nid,i);}}
  await save(np);projs.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  for(let i=0;i<4;i++)await delImg(ik(id,i));
  await dbDel('P',id);projs=projs.filter(p=>p.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}

// ═══ Poster Size ════════════════════════════════════════════════════
function pSz(){const a=document.getElementById('ca');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

// ═══ Render Poster ══════════════════════════════════════════════════
async function renderPoster(){
  const poster=document.getElementById('poster');
  const p=cur();if(!p){poster.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  const gap=Math.round((p.gap||0)*sc);
  const cW=Math.floor((w-gap)/2),cH=Math.floor((h-gap)/2);

  poster.style.cssText=`width:${w}px;height:${h}px;background:${p.bgColor||'#0a0a0a'};position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 20px 60px rgba(0,0,0,.6);`;

  const urls=await Promise.all(p.cells.map(c=>getURL(c.imgKey)));

  // 文字阴影 CSS
  const shBlur=Math.round((p.shadowBlur||14)*sc);
  const shOffY=Math.round((p.shadowOffY||2)*sc);
  const shColor=p.shadowColor||'rgba(0,0,0,0.6)';
  const textShadow=`${shOffY}px ${shOffY}px ${shBlur}px ${shColor}, 0 0 ${shBlur*2}px ${shColor}`;

  const zhSz=Math.round((p.zhSize||60)*sc);
  const enSz=Math.round((p.enSize||26)*sc);
  const zhLS=p.zhLS||0.08;
  const enLS=p.enLS||0.05;

  let html='';
  for(let i=0;i<4;i++){
    const c=p.cells[i];
    const col=i%2,row=Math.floor(i/2);
    const cx=col*(cW+gap),cy=row*(cH+gap);
    const url=urls[i];
    const lout=c.imgKey?iLay(c.nW,c.nH,cW,cH,c.zoom,c.px,c.py):{left:0,top:0,width:cW,height:cH};

    // 文字位置（基于格子左上角偏移）
    const zhX=(p.zhOffX||175)*sc;
    const zhY=(p.zhOffY||34)*sc;
    const enX=(p.enOffX||200)*sc;
    const enY=zhY+zhSz+(p.enGap||10)*sc;

    html+=`<div id="cell-${i}" data-i="${i}" style="position:absolute;left:${cx}px;top:${cy}px;width:${cW}px;height:${cH}px;overflow:hidden;cursor:${url?'grab':'pointer'};">
      ${url
        ?`<img id="img-${i}" src="${url}" draggable="false" style="position:absolute;left:${lout.left}px;top:${lout.top}px;width:${lout.width}px;height:${lout.height}px;pointer-events:none;">`
        :`<div onclick="uploadImg(${i})" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;color:#444;gap:8px;cursor:pointer;"><span style="font-size:24px;opacity:.4;">＋</span><span style="font-size:10px;">点击上传第${i+1}张图</span></div>`}

      <!-- 中文（左上角，全局同步） -->
      <div id="zh-${i}" contenteditable="true" spellcheck="false" title="点击编辑文字"
        style="position:absolute;left:${zhX}px;top:${zhY}px;font-family:'${p.zhFont||'Noto Serif SC'}',serif;font-size:${zhSz}px;font-weight:${p.zhWeight||'900'};color:${p.zhColor||'#fff'};letter-spacing:${zhLS}em;line-height:1.1;text-shadow:${textShadow};white-space:nowrap;outline:none;cursor:text;user-select:text;pointer-events:auto;"
        oninput="syncText('zh',this.textContent)"
        onblur="syncText('zh',this.textContent)">${esc(p.zhName||'')}</div>

      <!-- 英文（中文下方，全局同步） -->
      <div id="en-${i}" contenteditable="true" spellcheck="false" title="点击编辑英文"
        style="position:absolute;left:${enX}px;top:${enY}px;font-family:'${p.enFont||'Cormorant Garamond'}',serif;font-size:${enSz}px;font-weight:${p.enWeight||'400'};font-style:${p.enStyle||'italic'};color:${p.enColor||'#fff'};letter-spacing:${enLS}em;line-height:1.2;text-shadow:${textShadow};white-space:nowrap;outline:none;cursor:text;user-select:text;pointer-events:auto;"
        oninput="syncText('en',this.textContent)"
        onblur="syncText('en',this.textContent)">${esc(p.enName||'')}</div>
    </div>`;
  }

  // 品牌Logo（底部居中）
  if(p.showBrand&&(p.brandCN||p.brandEN)){
    const bCNSz=Math.round((p.brandCNSize||28)*sc);
    const bENSz=Math.round((p.brandENSize||22)*sc);
    const bY=h-Math.round(68*sc);
    html+=`<div style="position:absolute;left:0;width:100%;bottom:${Math.round(36*sc)}px;text-align:center;pointer-events:none;">
      ${p.brandCN?`<div style="font-family:'Noto Serif SC',serif;font-size:${bCNSz}px;font-weight:400;color:${p.brandColor||'#fff'};letter-spacing:${(p.brandCNLS||0.32)*bCNSz/bCNSz}em;letter-spacing:${p.brandCNLS||0.32}em;text-shadow:${textShadow};line-height:1.3;">${esc(p.brandCN)}</div>`:''}
      ${p.brandEN?`<div style="font-family:'Cormorant Garamond',serif;font-size:${bENSz}px;font-weight:400;color:${p.brandColor||'#fff'};letter-spacing:${p.brandENLS||0.18}em;text-shadow:${textShadow};line-height:1.2;">${esc(p.brandEN)}</div>`:''}
    </div>`;
  }

  poster.innerHTML=html;

  // 绑定拖拽
  for(let i=0;i<4;i++){
    const el=document.getElementById(`cell-${i}`);
    if(el){el.addEventListener('mousedown',onMD);el.addEventListener('touchstart',onTS,{passive:false});}
  }
}

// 全局文字同步：修改任意一格的文字，其余三格同步更新
function syncText(type,val){
  const p=cur();if(!p)return;
  const key=type==='zh'?'zhName':'enName';
  p[key]=val;save(p);
  // 同步其余三格的 DOM（不触发 oninput 避免循环）
  for(let i=0;i<4;i++){
    const el=document.getElementById(`${type}-${i}`);
    if(el&&el!==document.activeElement)el.textContent=val;
  }
  // 同步右面板输入框
  const rpEl=document.getElementById(`rp-${key}`);
  if(rpEl&&rpEl!==document.activeElement)rpEl.value=val;
}

// ═══ Drag ════════════════════════════════════════════════════════════
function onMD(e){
  const i=+this.dataset.i;const p=cur();const c=p?.cells[i];
  if(!c||!c.imgKey||e.button!==0)return;
  // 如果点击的是文字元素，不启动拖拽
  if(e.target.contentEditable==='true')return;
  dragging=true;dragCell=i;dragSX=e.clientX;dragSY=e.clientY;dragPX=c.px;dragPY=c.py;
  this.style.cursor='grabbing';if(selCell!==i){selCell=i;renderRP();}e.preventDefault();
}
function onTS(e){
  const i=+this.dataset.i;const p=cur();const c=p?.cells[i];
  if(!c||!c.imgKey||e.target.contentEditable==='true')return;
  dragging=true;dragCell=i;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=c.px;dragPY=c.py;
  if(selCell!==i){selCell=i;renderRP();}e.preventDefault();
}
document.addEventListener('mousemove',async e=>{
  if(!dragging)return;const p=cur();if(!p)return;
  const{w,h}=pSz();const cW=Math.floor((w-(p.gap||0))/2);const cH=Math.floor((h-(p.gap||0))/2);
  const c=p.cells[dragCell];
  c.px=Math.max(0,Math.min(100,dragPX-(e.clientX-dragSX)/(cW*(c.zoom||1))*100));
  c.py=Math.max(0,Math.min(100,dragPY-(e.clientY-dragSY)/(cH*(c.zoom||1))*100));
  const sx=document.getElementById('sl-px'),sy=document.getElementById('sl-py');
  const nx=document.getElementById('ni-px'),ny=document.getElementById('ni-py');
  if(sx)sx.value=c.px;if(sy)sy.value=c.py;if(nx)nx.value=Math.round(c.px);if(ny)ny.value=Math.round(c.py);
  const imgEl=document.getElementById(`img-${dragCell}`);
  if(imgEl){const{w,h}=pSz();const cW=Math.floor((w-(p.gap||0))/2);const cH=Math.floor((h-(p.gap||0))/2);const l=iLay(c.nW,c.nH,cW,cH,c.zoom,c.px,c.py);imgEl.style.left=l.left+'px';imgEl.style.top=l.top+'px';imgEl.style.width=l.width+'px';imgEl.style.height=l.height+'px';}
});
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const el=document.getElementById(`cell-${dragCell}`);if(el)el.style.cursor='grab';const p=cur();if(p){pushH();await save(p);}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});

// ═══ Upload ═══════════════════════════════════════════════════════
function uploadImg(i){
  const fi=document.getElementById('fi');
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=async()=>{
      const key=ik(curId,i);await saveImg(key,file);
      p.cells[i].imgKey=key;p.cells[i].nW=img.naturalWidth;p.cells[i].nH=img.naturalHeight;
      p.cells[i].px=50;p.cells[i].py=50;p.cells[i].zoom=1;
      URL.revokeObjectURL(url);pushH();await save(p);await renderPoster();renderRP();
    };img.src=url;fi.value='';
  };fi.click();
}

// ═══ Setters ══════════════════════════════════════════════════════
async function setP(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);await renderPoster();}
async function setPN(k,v){const p=cur();if(!p)return;pushH();p[k]=+v;await save(p);await renderPoster();}
async function setImgP(k,v){const p=cur();if(!p)return;p.cells[selCell][k]=+v;const{w,h}=pSz();const cW=Math.floor((w-(p.gap||0))/2);const cH=Math.floor((h-(p.gap||0))/2);const c=p.cells[selCell];const imgEl=document.getElementById(`img-${selCell}`);if(imgEl){const l=iLay(c.nW,c.nH,cW,cH,c.zoom,c.px,c.py);imgEl.style.left=l.left+'px';imgEl.style.top=l.top+'px';imgEl.style.width=l.width+'px';imgEl.style.height=l.height+'px';}await save(p);}

      <span class="unit">px</span>
    </div>
    <div class="lbl">颜色</div>
    <div class="cp-wrap">
      <div class="cp-dot" style="background:${toHex(p.brandColor||'#ffffff')};" onclick="document.getElementById('brc').click()"></div>
      <input id="brc" type="color" value="${toHex(p.brandColor||'#ffffff')}" style="display:none" onchange="setP('brandColor',this.value);this.previousElementSibling.style.background=this.value">
    </div>
  </div>

  <!-- 整体 -->
  <div class="sec">
    <div class="sec-t">整体设置</div>
    <div class="lbl">背景色</div>
    <div class="cp-wrap">
      <div class="cp-dot" style="background:${toHex(p.bgColor||'#0a0a0a')};" onclick="document.getElementById('bgc').click()"></div>
      <input id="bgc" type="color" value="${toHex(p.bgColor||'#0a0a0a')}" style="display:none" onchange="setP('bgColor',this.value);this.previousElementSibling.style.background=this.value">
    </div>
    <div class="row"><label>图片间隙</label>
      <input class="sld" type="range" min="0" max="20" value="${p.gap||0}" oninput="setPN('gap',+this.value);document.getElementById('ni-gap').value=this.value">
      <input id="ni-gap" type="number" min="0" max="20" value="${p.gap||0}" class="num" oninput="setPN('gap',+this.value);this.previousElementSibling.value=this.value">
      <span class="unit">px</span>
    </div>
  </div>

  <div class="sec">
    <div class="sec-t">项目备份</div>
    <div class="bk-row">
      <button class="bk-btn" onclick="exportJSON()">⬇ 导出备份 JSON</button>
      <button class="bk-btn" onclick="importJSON()">⬆ 导入备份</button>
    </div>
  </div>`;
}

// ═══ Export PNG ═══════════════════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;
  if(!await checkQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const W=1200,H=1600;
    const gap=p.gap||0;
    const cW=Math.floor((W-gap)/2),cH=Math.floor((H-gap)/2);
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // 背景
    ctx.fillStyle=p.bgColor||'#0a0a0a';ctx.fillRect(0,0,W,H);

    // 加载图片
    async function loadImg(key){const url=await getURL(key);if(!url)return null;return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}

    for(let i=0;i<4;i++){
      const c=p.cells[i];
      const col=i%2,row=Math.floor(i/2);
      const cx=col*(cW+gap),cy=row*(cH+gap);

      // 图片
      const imgEl=await loadImg(c.imgKey);
      ctx.save();ctx.beginPath();ctx.rect(cx,cy,cW,cH);ctx.clip();
      if(imgEl){
        const l=iLay(c.nW||imgEl.naturalWidth,c.nH||imgEl.naturalHeight,cW,cH,c.zoom,c.px,c.py);
        ctx.drawImage(imgEl,cx+l.left,cy+l.top,l.width,l.height);
      }else{ctx.fillStyle='#1a1a1a';ctx.fillRect(cx,cy,cW,cH);}
      ctx.restore();

      // 文字阴影
      const shBlur=p.shadowBlur||14;const shOffY=p.shadowOffY||2;
      ctx.shadowColor=p.shadowColor||'rgba(0,0,0,0.6)';
      ctx.shadowBlur=shBlur;ctx.shadowOffsetX=0;ctx.shadowOffsetY=shOffY;

      // 中文
      const zhSz=p.zhSize||60;
      ctx.font=`${p.zhWeight||'900'} ${zhSz}px '${p.zhFont||'Noto Serif SC'}',serif`;
      ctx.fillStyle=p.zhColor||'#ffffff';
      drawTextLS(ctx,p.zhName||'',cx+(p.zhOffX||175),cy+(p.zhOffY||34),p.zhLS||0.08,'left');

      // 英文
      const enSz=p.enSize||26;
      const enY=cy+(p.zhOffY||34)+zhSz+(p.enGap||10);
      const enFW=p.enWeight||'400';
      const enFS=p.enStyle||'italic';
      ctx.font=`${enFS} ${enFW} ${enSz}px '${p.enFont||'Cormorant Garamond'}',serif`;
      ctx.fillStyle=p.enColor||'#ffffff';
      drawTextLS(ctx,p.enName||'',cx+(p.enOffX||200),enY,p.enLS||0.05,'left');

      ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    }

    // 品牌Logo（底部居中）
    if(p.showBrand&&(p.brandCN||p.brandEN)){
      const shBlur=p.shadowBlur||14;
      ctx.shadowColor=p.shadowColor||'rgba(0,0,0,0.6)';ctx.shadowBlur=shBlur;ctx.shadowOffsetY=2;
      const bCNSz=p.brandCNSize||28;const bENSz=p.brandENSize||22;
      let brandY=H-80;
      if(p.brandCN){
        ctx.font=`400 ${bCNSz}px 'Noto Serif SC',serif`;
        ctx.fillStyle=p.brandColor||'#ffffff';
        drawTextLS(ctx,p.brandCN,W/2,brandY,p.brandCNLS||0.32,'center');
        brandY+=bCNSz+8;
      }
      if(p.brandEN){
        ctx.font=`400 ${bENSz}px 'Cormorant Garamond',serif`;
        ctx.fillStyle=p.brandColor||'#ffffff';
        drawTextLS(ctx,p.brandEN,W/2,brandY,p.brandENLS||0.18,'center');
      }
      ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    }

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    },'image/png');
  }catch(err){console.error(err);alert('导出失败，请重试');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}
