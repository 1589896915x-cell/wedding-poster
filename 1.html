<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拱形版 - 婚礼场馆展示模板</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Serif+SC:wght@300;400;700&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;font-family:system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;padding-top:40px;}
.psb{width:180px;flex-shrink:0;background:#111;border-right:1px solid #222;display:flex;flex-direction:column;}
.psb-head{padding:14px 12px 10px;border-bottom:1px solid #222;}
.psb-head h2{font-size:13px;font-weight:500;color:#fff;}
.psb-head p{font-size:10px;color:#555;margin-top:2px;}
.psb-new{margin:10px 12px;padding:7px;background:#1e1e1e;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;}
.psb-new:hover{border-color:#666;color:#ccc;}
.proj-list{flex:1;overflow-y:auto;padding:6px 8px;}
.proj-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.proj-item:hover{background:#1e1e1e;}
.proj-item.active{background:#1e1e1e;border-color:#333;}
.proj-item h3{font-size:11px;font-weight:400;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-item p{font-size:9px;color:#555;margin-top:2px;}
.proj-item-actions{display:flex;gap:4px;margin-top:5px;}
.pa-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pa-btn:hover{border-color:#555;color:#aaa;}
.pa-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.proj-name-in{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:200px;}
.proj-name-in::placeholder{color:#444;}
.sp{flex:1;}
.layout-sw{display:flex;gap:3px;background:#0a0a0a;padding:3px;border-radius:6px;border:1px solid #2a2a2a;}
.lsw-btn{padding:4px 10px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;background:none;color:#666;}
.lsw-btn.active{background:#2a2a2a;color:#fff;}
.lsw-btn:hover:not(.active){color:#aaa;}
.tbtn{padding:6px 14px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.tbtn-export{background:#c8392b;color:#fff;}
.tbtn-export:hover{background:#a02d22;}
.tbtn-export:disabled{background:#6a1f17;cursor:default;}
.body{display:flex;flex:1;overflow:hidden;}
.canvas-area{flex:1;background:#222;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.poster{flex-shrink:0;position:relative;overflow:hidden;display:flex;flex-direction:column;background:#eeece6;}
/* Top */
.top-sec{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.wm-txt{position:absolute;font-family:'Cormorant Garamond',serif;color:rgba(0,0,0,0.07);line-height:1;pointer-events:none;white-space:nowrap;left:50%;transform:translateX(-50%);}
/* Cols */
.cols-wrap{flex:1;display:flex;align-items:stretch;}
.arch-col{flex:1;position:relative;overflow:hidden;cursor:grab;}
.arch-col:active{cursor:grabbing;}
.arch-clip{width:100%;height:100%;position:relative;overflow:hidden;}
.arch-img-wrap{position:absolute;inset:0;overflow:hidden;}
.arch-img{position:absolute;display:block;}
.arch-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#d4d1ca;color:#999;cursor:pointer;font-family:inherit;}
.arch-empty .ic{font-size:20px;opacity:.4;}
.arch-empty .tx{font-size:9px;}
.arch-grad{position:absolute;bottom:0;left:0;right:0;pointer-events:none;}
.arch-labels{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
/* Right panel */
.rp{width:215px;flex-shrink:0;background:#111;border-left:1px solid #222;overflow-y:auto;padding:12px 10px;}
.rp-title{font-size:10px;font-weight:500;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.rp-sec{margin-top:10px;padding-top:9px;border-top:1px solid #1e1e1e;}
.rp-sec-t{font-size:9px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.rp-lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:4px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.fsel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.row label{font-size:9px;color:#666;min-width:26px;flex-shrink:0;}
.fnum{width:50px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}

.funit{font-size:9px;color:#555;}
.fslider{flex:1;accent-color:#c8392b;}
.fval{font-size:9px;color:#888;min-width:32px;text-align:right;}
.col-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.col-tab{padding:4px 9px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;}
.col-tab.on{background:#2a2a2a;color:#fff;border-color:#444;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;font-family:inherit;text-align:center;display:block;margin-top:3px;}
.img-btn:hover{border-color:#555;color:#ccc;}
.drag-hint{font-size:9px;color:#444;text-align:center;margin-top:2px;}
.sync-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.sync-row label{font-size:9px;color:#888;cursor:pointer;}
.no-proj{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;}
.no-proj p{font-size:12px;}
/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:22px;width:290px;color:#fff;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px;}
.m-lbl{font-size:10px;color:#888;margin-bottom:4px;}
.m-in{width:100%;padding:7px 10px;background:#111;border:1px solid #333;border-radius:5px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;}
.m-actions{display:flex;gap:8px;}
.m-actions button{flex:1;padding:8px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;}

<script>

// ══ WP AUTH ═══════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';

async function wpCheckAuth(){

// ── History (Ctrl+Z) ──────────────────────────────────────────────
let _hist=[],_hIdx=-1;
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hIdx+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hIdx=_hist.length-1;}
async function undoH(){if(_hIdx<=0)return;_hIdx--;const p=JSON.parse(_hist[_hIdx]);const i=projects.findIndex(x=>x.id===p.id);if(i>=0)projects[i]=p;await dbP('P',p);await renderPoster();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoH();}});

// ── Backup JSON ───────────────────────────────────────────────────
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'project')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('json-fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await dbP('P',p);projects.unshift(p);renderList();openProj(p.id);}catch{alert('JSON格式错误');}fi.value='';};fi.click();}

// Draw text with letter-spacing (canvas doesn't support it natively)
// letterSpacingEm: em units e.g. 0.18 means 0.18em
// align: 'center' | 'left' | 'right'  — cx is the anchor x
function drawTextLS(ctx,text,cx,y,letterSpacingEm,align){
  if(!text)return;
  const fmatch=ctx.font.match(/([\d.]+)px/);
  const fs=fmatch?parseFloat(fmatch[1]):16;
  const ls=letterSpacingEm*fs;
  const chars=text.split('');
  let totalW=0;
  chars.forEach((ch,i)=>{totalW+=ctx.measureText(ch).width;if(i<chars.length-1)totalW+=ls;});
  let sx=align==='center'?cx-totalW/2:align==='right'?cx-totalW:cx;
  chars.forEach((ch,i)=>{
    ctx.fillText(ch,sx,y);
    sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);
  });
}
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
// ══════════════════════════════════════════════════════════════════

// ── DB ────────────────────────────────────────────────────────────
let db;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('arch-v2',1);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('P'))d.createObjectStore('P',{keyPath:'id'});if(!d.objectStoreNames.contains('I'))d.createObjectStore('I');};q.onsuccess=e=>{db=e.target.result;r();};q.onerror=j;});}
const txs=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=txs(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?txs(s,'readwrite').put(v,k):txs(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbA=(s)=>new Promise((r,j)=>{const q=txs(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ── State ─────────────────────────────────────────────────────────
let projects=[],curId=null,selCol=0,mCol=3;
const cache={};
let drag={on:false,col:-1,sx:0,sy:0,px0:50,py0:50};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projects.find(p=>p.id===curId)||null;
const ik=(pid,ci)=>`i-${pid}-${ci}`;

// ── Fonts ─────────────────────────────────────────────────────────
const FONTS=['Noto Serif SC','Cormorant Garamond','Georgia','Times New Roman','Palatino','Noto Sans SC','PingFang SC','Microsoft YaHei','STSong','STKaiti','STHeiti','SimHei','Arial','Helvetica'];
const WFONTS=['Cormorant Garamond','Georgia','Times New Roman','Palatino','Playfair Display','Dancing Script'];
const fOpts=(sel,list)=>(list||FONTS).map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('');

// ── Defaults ──────────────────────────────────────────────────────
const COL_NAMES=[

function defCol(i){return{zh:COL_NAMES[i]?.zh||'标题'+(i+1),en:COL_NAMES[i]?.en||'TITLE '+(i+1),imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1,zhFont:'Noto Serif SC',enFont:'Cormorant Garamond',zhSize:22,enSize:18,zhColor:'#ffffff',enColor:'rgba(255,255,255,0.75)',gradH:55,gradColor:'rgba(0,0,0,0.85)'};}

             font:'Noto Serif SC',     size:90, weight:'700', color:'#1a1a1a', x:600, y:140, align:'center', ls:0.03},
  subEn:   {text:'I LOVE THERE THINGS  THE SUN THE MOON AND YOU\nTHE MOON IS FOR THE NIGHT AND YOU FOREVER',
             font:'Cormorant Garamond',size:18, weight:'300', color:'#888888', x:600, y:282, align:'center', ls:0.13},
  brandEn: {text:'TENGTOU HOTEL',
             font:'Cormorant Garamond',size:25, weight:'700', color:'#1a1a1a', x:600, y:342, align:'center', ls:0.28},
  brandZh: {text:'滕头中东欧宴会酒店',
             font:'PingFang SC',       size:40, weight:'700', color:'#1a1a1a', x:600, y:387, align:'center', ls:0.18},
  brandSub:{text:'免场布费｜5K帝王蟹套餐｜无预制菜｜赠送甜品台、酒水畅饮',
             font:'Noto Serif SC',     size:28, weight:'700', color:'#555555', x:600, y:456, align:'center', ls:0.12},
};}
function defProj(name,n){return{id:uid(),name,ct:Date.now(),at:Date.now(),cols:n,header:defHdr(),strips:Array.from({length:n},(_,i)=>defCol(i))};}

// ── Save / Load ───────────────────────────────────────────────────
async function loadAll(){projects=await dbA('P');projects.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbP('P',p);}
async function saveImg(key,blob){await dbP('I',blob,key);if(cache[key])URL.revokeObjectURL(cache[key]);cache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbD('I',key);if(cache[key]){URL.revokeObjectURL(cache[key]);delete cache[key];}}
async function getURL(key){if(!key)return null;if(cache[key])return cache[key];const b=await dbG('I',key);if(!b)return null;cache[key]=URL.createObjectURL(b);return cache[key];}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(){mCol=3;updMC();document.getElementById('m-name').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}

// ── Poster size ───────────────────────────────────────────────────
function pSize(){const a=document.getElementById('canvas-area');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

// ── Image transform calculation ───────────────────────────────────
// Returns {left, top, width, height} for absolutely positioned img inside container
function imgLayout(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const coverS=Math.max(cW/nW,cH/nH);
  const s=coverS*(zoom||1);
  const rW=nW*s,rH=nH*s;
  const maxX=Math.max(0,rW-cW),maxY=Math.max(0,rH-cH);
  const l=-((px||50)/100)*maxX;
  const t=-((py||50)/100)*maxY;
  return{left:l,top:t,width:rW,height:rH};
}

// ── Render poster ─────────────────────────────────────────────────
async function renderPoster(){
  const poster=document.getElementById('poster');
  const p=cur();if(!p){poster.innerHTML='<div class="no-proj" style="height:400px;"><p>新建或选择项目</p></div>';return;}
  const{w,h}=pSize();
  const hdr=p.header;
  const topH=Math.round(h*0.35);
  const colsH=h-topH;
  const sc=w/1200;
  const n=p.cols;
  const padX=n===4?0:Math.round(w*0.03);
  const padB=0; // no bottom gap for both layouts
  const gap=n===4?Math.round(w*0.012):Math.round(w*0.016);
  const colW=Math.round((w-padX*2-gap*(n-1))/n);
  const colH=colsH-padB;
  const arcR=Math.round(colW/2);
  const wmSz=Math.round((hdr.wmSize||55)/100*w);

  poster.style.cssText=`width:${w}px;height:${h}px;box-shadow:0 20px 60px rgba(0,0,0,.55);background:${hdr.bgColor||'#eeece6'};`;

  const urls=await Promise.all(p.strips.slice(0,n).map(s=>getURL(s.imgKey)));

  // Block positions: Y% of topH = center of block; X = px offset from center
  // Helper: render one text item absolutely on poster (coords in 1200×1600 space)
  function renderTxtEl(key,t){
    if(!t||!t.text)return'';
    const lx=Math.round(t.x*sc);
    const ty=Math.round(t.y*sc);
    const transform=t.align==='center'?'translateX(-50%)':t.align==='right'?'translateX(-100%)':'';
    // subEn 用 pre 保留手动换行；其他 nowrap 不自动折行
    const ws=key==='subEn'?'pre':'nowrap';
    return`<div id="txt-${key}" style="position:absolute;left:${lx}px;top:${ty}px;transform:${transform};white-space:${ws};line-height:1.8;pointer-events:none;font-family:'${t.font}',serif,sans-serif;font-size:${Math.round(t.size*sc)}px;font-weight:${t.weight};color:${t.color};letter-spacing:${t.ls}em;">${esc(t.text)}</div>`;
  }

  poster.innerHTML=`
  <div id="top-sec" style="height:${topH}px;background:${hdr.bgColor||'#eeece6'};position:relative;overflow:hidden;">
    <div class="wm-txt" style="font-size:${wmSz}px;font-family:'${hdr.wmFont||'Cormorant Garamond'}',serif;font-style:${hdr.wmItalic!==false?'italic':'normal'};bottom:${Math.round(topH*0.02)}px;">${esc(hdr.watermark||'wedding')}</div>
    ${renderTxtEl('mainZh',hdr.mainZh)}
    ${renderTxtEl('subEn',hdr.subEn)}
    ${renderTxtEl('brandEn',hdr.brandEn)}
    ${renderTxtEl('brandZh',hdr.brandZh)}
    ${renderTxtEl('brandSub',hdr.brandSub)}
  </div>
  <div id="cols-wrap" class="cols-wrap" style="height:${colsH}px;padding:0 ${padX}px 0;gap:${gap}px;background:${hdr.bgColor||'#eeece6'};">
    ${p.strips.slice(0,n).map((s,i)=>{
      const lout=imgLayout(s.nW,s.nH,colW,colH,s.zoom,s.px,s.py);
      const gradTo=s.gradColor||'rgba(0,0,0,0.85)';
      const labelPB=Math.round(colH*0.04);
      const zhSz=Math.round((s.zhSize||20)*sc);
      const enSz=Math.round((s.enSize||11)*sc);
      return `<div class="arch-col" id="col-${i}" data-i="${i}">
        <div class="arch-clip" style="border-radius:${arcR}px ${arcR}px 0 0;">
          <div class="arch-img-wrap">
            ${urls[i]
              ?`<img class="arch-img" id="img-${i}" src="${urls[i]}" draggable="false" style="width:${lout.width}px;height:${lout.height}px;left:${lout.left}px;top:${lout.top}px;">`
              :`<div class="arch-empty" onclick="uploadImg(${i})"><div class="ic">＋</div><div class="tx">点击上传图片</div></div>`}
          </div>
          ${urls[i]?`<div class="arch-grad" style="height:${s.gradH||55}%;background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,${gradTo} 100%);"></div>`:''}
          <div class="arch-labels" style="padding-bottom:${labelPB}px;gap:${Math.round(3*sc)}px;">
            <div style="font-family:'${s.zhFont||'Noto Serif SC'}',serif;font-size:${zhSz}px;font-weight:${s.zhWeight||400};color:${s.zhColor||'#fff'};letter-spacing:.15em;">${esc(s.zh)}</div>
            <div style="font-family:'${s.enFont||'Cormorant Garamond'}',serif;font-size:${enSz}px;font-weight:${s.enWeight||300};color:${s.enColor||'rgba(255,255,255,0.75)'};letter-spacing:.1em;text-transform:uppercase;">${esc(s.en)}</div>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // Attach drag
  document.querySelectorAll('.arch-col').forEach(el=>{
    el.addEventListener('mousedown',onMD);
    el.addEventListener('touchstart',onTS,{passive:false});
  });
}

// Update single column image without full re-render
function updColImg(i){
  const p=cur();if(!p)return;
  const s=p.strips[i];
  const img=document.getElementById(`img-${i}`);if(!img)return;
  const{w,h}=pSize();
  const n=p.cols;
  const padX=n===4?0:Math.round(w*0.03);
  const gap=n===4?Math.round(w*0.012):Math.round(w*0.016);
  const colW=Math.round((w-padX*2-gap*(n-1))/n);
  const colH=Math.round(h-Math.round(h*0.35));
  const lout=imgLayout(s.nW,s.nH,colW,colH,s.zoom,s.px,s.py);
  img.style.width=lout.width+'px';img.style.height=lout.height+'px';
  img.style.left=lout.left+'px';img.style.top=lout.top+'px';
}

// ── Drag ──────────────────────────────────────────────────────────
function onMD(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey||e.button!==0)return;startDrag(i,e.clientX,e.clientY);e.preventDefault();}
function onTS(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey)return;const t=e.touches[0];startDrag(i,t.clientX,t.clientY);e.preventDefault();}
function startDrag(i,cx,cy){
  drag={on:true,col:i,sx:cx,sy:cy,px0:cur().strips[i].px,py0:cur().strips[i].py};
  if(selCol!==i){selCol=i;renderRP();}
}
document.addEventListener('mousemove',e=>{if(drag.on)doMove(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(drag.on){doMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
function doMove(cx,cy){
  const p=cur();if(!p)return;
  const{w,h}=pSize();const n=p.cols;
  const padX=n===4?0:Math.round(w*0.03);
  const gap=n===4?Math.round(w*0.012):Math.round(w*0.016);
  const colW=Math.round((w-padX*2-gap*(n-1))/n);
  const colH=Math.round(h-Math.round(h*0.35));
  const s=p.strips[drag.col];
  const lout0=imgLayout(s.nW,s.nH,colW,colH,s.zoom,drag.px0,drag.py0);
  const maxX=Math.max(0,lout0.width-colW),maxY=Math.max(0,lout0.height-colH);
  const dx=cx-drag.sx,dy=cy-drag.sy;
  s.px=maxX>0?Math.max(0,Math.min(100,drag.px0-dx/maxX*100)):50;
  s.py=maxY>0?Math.max(0,Math.min(100,drag.py0-dy/maxY*100)):50;
  updColImg(drag.col);
  // Update sliders
  if(selCol===drag.col){
    const px=document.getElementById('sl-px'),py=document.getElementById('sl-py');
    if(px){px.value=s.px;document.getElementById('v-px').textContent=Math.round(s.px)+'%';}
    if(py){py.value=s.py;document.getElementById('v-py').textContent=Math.round(s.py)+'%';}
    const npx=document.getElementById('ni-img-px'),npy=document.getElementById('ni-img-py');
    if(npx)npx.value=Math.round(s.px);if(npy)npy.value=Math.round(s.py);
  }
}
document.addEventListener('mouseup',endDrag);document.addEventListener('touchend',endDrag);

// 修改独立文字项：实时更新 DOM + 存储
async function setTxt(tk,prop,val){
  const p=cur();if(!p)return;
  pushH();
  p.header[tk][prop]=val;
  await save(p);
  // 实时更新 DOM（不整体重渲）
  const el=document.getElementById('txt-'+tk);
  if(el){
    const t=p.header[tk];
    const{w}=pSize();const sc=w/1200;
    if(prop==='text')el.textContent=val;
    if(prop==='font')el.style.fontFamily=`'${val}',serif,sans-serif`;
    if(prop==='size')el.style.fontSize=Math.round(val*sc)+'px';
    if(prop==='weight')el.style.fontWeight=val;
    if(prop==='color')el.style.color=val;
    if(prop==='ls')el.style.letterSpacing=val+'em';
    if(prop==='align'){
      let tr=val==='center'?'translateX(-50%)':val==='right'?'translateX(-100%)':'';
      el.style.transform=tr;
    }
    if(prop==='x'){el.style.left=Math.round(val*sc)+'px';}
    if(prop==='y'){el.style.top=Math.round(val*sc)+'px';}
  }
}

async function setS(i,k,v){const p=cur();if(!p)return;p.strips[i][k]=v;await save(p);}

// Label style sync: applies to all cols if checkbox checked
const LABEL_STYLE_KEYS=['zhFont','zhSize','zhWeight','zhColor','enFont','enSize','enWeight','enColor'];
async function setLabelStyle(i,k,v){
  const p=cur();if(!p)return;
  const syncEl=document.getElementById('sync-label');
  const doSync=syncEl&&syncEl.checked&&LABEL_STYLE_KEYS.includes(k);
  if(doSync){
    p.strips.forEach(s=>s[k]=v);
    const n=p.cols;for(let j=0;j<n;j++)updLabels(j);
  } else {
    p.strips[i][k]=v;updLabels(i);
  }
  await save(p);
}
async function setCol(i,k,v){
  const p=cur();if(!p)return;p.strips[i][k]=v;updLabels(i);await save(p);
}
function updLabels(i){
  const p=cur();if(!p)return;const s=p.strips[i];const{w}=pSize();const sc=w/1200;
  const col=document.getElementById(`col-${i}`);if(!col)return;
  const divs=col.querySelectorAll('.arch-labels > div');
  if(divs[0]){divs[0].textContent=s.zh;divs[0].style.fontFamily=`'${s.zhFont||'Noto Serif SC'}',serif`;divs[0].style.fontSize=Math.round((s.zhSize||20)*sc)+'px';}
  if(divs[1]){divs[1].textContent=s.en;divs[1].style.fontFamily=`'${s.enFont||'Cormorant Garamond'}',serif`;divs[1].style.fontSize=Math.round((s.enSize||11)*sc)+'px';}
}

function isSyncGrad(){const el=document.getElementById('sync-grad');return el&&el.checked;}
async function setGrad(i,k,v){
  const p=cur();if(!p)return;
  if(isSyncGrad())p.strips.forEach(s=>s[k]=v);else p.strips[i][k]=v;

}
async function setGradColor(i,hex){
  const p=cur();if(!p)return;
  const rgba=`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},0.85)`;
  if(isSyncGrad())p.strips.forEach(s=>s.gradColor=rgba);else p.strips[i].gradColor=rgba;

// ── Upload ────────────────────────────────────────────────────────
function uploadImg(i){
  const fi=document.getElementById('fi');
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const p=cur();if(!p)return;
    // Pre-read natural dimensions
    const url=URL.createObjectURL(file);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.strips[i].nW=img.naturalWidth;p.strips[i].nH=img.naturalHeight;URL.revokeObjectURL(url);res();};img.src=url;});
    const key=ik(curId,i);
    await saveImg(key,file);
    p.strips[i].imgKey=key;p.strips[i].px=50;p.strips[i].py=50;p.strips[i].zoom=1;
    await save(p);await renderPoster();renderRP();fi.value='';
  };fi.click();
}

// ── Export ────────────────────────────────────────────────────────
async function exportPNG(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const topH=Math.round(H*0.35);
  const colsH=H-topH;
  const hdr=p.header;
  const n=p.cols;
  const padX=n===4?0:Math.round(W*0.03);const padB=0;
  const gap=n===4?Math.round(W*0.012):Math.round(W*0.016);const colW=Math.round((W-padX*2-gap*(n-1))/n);
  const colH=colsH;const arcR=Math.round(colW/2);

  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  // Fill entire canvas with background color first
  ctx.fillStyle=hdr.bgColor||'#eeece6';ctx.fillRect(0,0,W,H);

  // Watermark
  const wmSz=Math.round((hdr.wmSize||55)/100*W);
  ctx.save();
  ctx.font=`${hdr.wmItalic!==false?'italic ':''} 400 ${wmSz}px "${hdr.wmFont||'Cormorant Garamond'}",serif`;
  ctx.fillStyle='rgba(0,0,0,0.07)';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(hdr.watermark||'wedding',W/2,topH*0.98);ctx.restore();

  // ── 独立文字项 export：与预览 1:1 对应 ──
  ctx.textBaseline='top';
  function drawTxt(t){
    if(!t||!t.text)return;
    ctx.save();
    ctx.font=`${t.weight} ${t.size}px '${t.font}',serif,sans-serif`;
    ctx.fillStyle=t.color;
    // 多行处理（subEn 含 \n）
    const lines=t.text.split('\n');
    const lineH=Math.round(t.size*1.8);
    const totalH=(lines.length-1)*lineH;
    lines.forEach((line,li)=>{
      const cy=t.y+li*lineH;
      drawTextLS(ctx,line,t.x,cy,t.ls||0,t.align||'center');
    });
    ctx.restore();
  }
  ['mainZh','subEn','brandEn','brandZh','brandSub'].forEach(tk=>drawTxt(hdr[tk]));

  // Columns
  for(let i=0;i<n;i++){
    const s=p.strips[i];
    const cx=padX+i*(colW+gap);
    const cy=topH;
    const url=await getURL(s.imgKey);

    ctx.save();
    // Arch clip
    ctx.beginPath();
    ctx.moveTo(cx,cy+colH);ctx.lineTo(cx,cy+arcR);
    ctx.arc(cx+arcR,cy+arcR,arcR,Math.PI,0);
    ctx.lineTo(cx+colW,cy+colH);ctx.closePath();ctx.clip();

    if(url){
      await new Promise(res=>{
        const img=new Image();
        img.onload=()=>{
          const nW=s.nW||img.naturalWidth||colW;const nH=s.nH||img.naturalHeight||colH;
          const lout=imgLayout(nW,nH,colW,colH,s.zoom,s.px,s.py);
          ctx.drawImage(img,cx+lout.left,cy+lout.top,lout.width,lout.height);res();
        };img.src=url;
      });
    } else {
      ctx.fillStyle='#d4d1ca';ctx.fillRect(cx,cy,colW,colH);
    }

    // Gradient
    const gradH2=Math.round((s.gradH||55)/100*colH);
    const grad=ctx.createLinearGradient(0,cy+colH-gradH2,0,cy+colH);
    grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,s.gradColor||'rgba(0,0,0,0.85)');
    ctx.fillStyle=grad;ctx.fillRect(cx,cy+colH-gradH2,colW,gradH2);
    ctx.restore();

    // Labels — letter-spacing matches preview (.15em zh / .1em en)
    const labelBottomPad=Math.round(colH*0.04);
    const zhSzE=s.zhSize||20;const enSzE=s.enSize||11;
    const labelGapE=Math.round(3);
    const enY=cy+colH-labelBottomPad;
    const zhY=enY-enSzE-labelGapE-zhSzE/2;
    ctx.textBaseline='middle';
    ctx.font=`${s.zhWeight||400} ${zhSzE}px "${s.zhFont||'Noto Serif SC'}",serif`;
    ctx.fillStyle=s.zhColor||'#ffffff';
    drawTextLS(ctx,s.zh,cx+colW/2,zhY,0.15,'center');
    ctx.font=`${s.enWeight||300} ${enSzE}px "${s.enFont||'Cormorant Garamond'}",serif`;
    ctx.fillStyle=s.enColor||'rgba(255,255,255,0.75)';
    drawTextLS(ctx,(s.en||'').toUpperCase(),cx+colW/2,enY-enSzE/2,0.1,'center');

    // Bottom bg fill (below arch)
    ctx.fillStyle=hdr.bgColor||'#eeece6';ctx.fillRect(cx,cy+colH,colW,padB);
  }

  const a=document.createElement('a');
  a.download=(p.name||'poster')+`_${n}列_1200x1600.png`;
  canvas.toBlob(blob=>{a.href=URL.createObjectURL(blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);},'image/png');
  btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
}
