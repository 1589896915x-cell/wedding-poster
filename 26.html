<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0e0e0e;color:#fff;height:100vh;overflow:hidden;display:flex;padding-top:40px;}
.sb{width:186px;flex-shrink:0;background:#161616;border-right:1px solid #222;display:flex;flex-direction:column;}
.sb-h{padding:12px;border-bottom:1px solid #222;}.sb-h h2{font-size:12px;font-weight:500;color:#ddd;}.sb-h p{font-size:9px;color:#444;margin-top:2px;}
.nb{margin:8px 10px;padding:6px;background:#1c1c1c;border:1px dashed #2e2e2e;border-radius:5px;color:#666;font-size:10px;cursor:pointer;text-align:center;}.nb:hover{border-color:#555;color:#bbb;}
.pl{flex:1;overflow-y:auto;padding:4px 7px;}
.pi{padding:7px 9px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}.pi:hover{background:#1c1c1c;}.pi.on{background:#1c1c1c;border-color:#2e2e2e;}
.pi h3{font-size:11px;font-weight:400;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.pi .mt{font-size:9px;color:#444;margin-top:2px;}.pa{display:flex;gap:3px;margin-top:4px;}
.pb2{padding:2px 6px;background:none;border:1px solid #222;border-radius:3px;color:#555;font-size:9px;cursor:pointer;font-family:inherit;}.pb2:hover{border-color:#555;color:#aaa;}.pb2.del:hover{border-color:#b00;color:#f44;}
.ed{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tb{height:44px;background:#161616;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.pn{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:240px;}.pn::placeholder{color:#333;}
.sp{flex:1;}
.xb{padding:6px 16px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:#c8392b;color:#fff;}
.xb:hover{background:#a02d22;}.xb:disabled{background:#6a1f17;cursor:default;}
.bd{display:flex;flex:1;overflow:hidden;}
.ca{flex:1;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.rp{width:262px;flex-shrink:0;background:#161616;border-left:1px solid #222;overflow-y:auto;padding:10px 10px 24px;}
.rp::-webkit-scrollbar{width:3px;}.rp::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
.sc{margin-top:18px;padding:12px;background:#141414;border-radius:8px;border:1px solid #1f1f1f;}
.sc:first-child{margin-top:0;}
.st{font-size:11px;color:#c8a96a;font-weight:600;letter-spacing:.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:6px;}
.st-icon{display:inline-block;width:6px;height:14px;background:#c8392b;border-radius:2px;flex-shrink:0;}
.lb{font-size:9px;color:#888;margin-bottom:3px;margin-top:7px;text-transform:uppercase;letter-spacing:.3px;}
.lineCard{background:#0a0a0a;border:1px solid #232323;border-radius:6px;padding:10px;margin-bottom:8px;}
.lineCard .lt{font-size:11px;color:#ddd;margin-bottom:7px;font-weight:600;letter-spacing:.3px;}
.poskit{background:#0a0a0a;padding:9px 9px;border-radius:5px;border:1px solid #1f1f1f;margin-top:6px;}
.poskit-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}

.poskit-row .pk-num{width:54px;padding:4px 4px;background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;flex-shrink:0;}
.poskit-row .pk-num:focus{border-color:#c8392b;}
/* 文字层默认事件穿透到图片层，只在 hover/focus 时接收事件 */

.tx-edit:hover, .tx-edit:focus{pointer-events:auto;}
.fi{width:100%;padding:5px 7px;background:#111;border:1px solid #222;border-radius:4px;color:#ccc;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}.fi:focus{border-color:#444;}

.ib{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;text-align:center;margin-bottom:3px;}.ib:hover{border-color:#555;color:#aaa;}
.cp{display:flex;gap:5px;align-items:center;}.cd{width:20px;height:20px;border-radius:3px;border:1px solid #333;cursor:pointer;flex-shrink:0;}
.bkr{display:flex;gap:5px;margin-top:6px;}.bk{flex:1;padding:5px 4px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:9px;cursor:pointer;font-family:inherit;}.bk:hover{border-color:#555;color:#aaa;}
.np{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#2a2a2a;}.np p{font-size:12px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}.ov.open{display:flex;}
.md{background:#1c1c1c;border:1px solid #2e2e2e;border-radius:10px;padding:22px;width:300px;}.md h3{font-size:14px;font-weight:500;margin-bottom:16px;color:#ddd;}.ml{font-size:10px;color:#777;margin-bottom:4px;}.mi{width:100%;padding:8px 10px;background:#111;border:1px solid #2e2e2e;border-radius:5px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px;}.mi:focus{border-color:#555;}
.ma{display:flex;gap:8px;}.ma button{flex:1;padding:8px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}

.tplBtn{padding:9px 6px;border:1px solid #2e2e2e;border-radius:5px;background:#111;color:#aaa;font-size:11px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.tplBtn:hover{border-color:#666;color:#ddd;}
.tplBtn.on{border-color:#c8392b;color:#fff;background:#1a0e0c;}
.pi .tag{display:inline-block;background:#1a0e0c;color:#c8a96a;padding:1px 4px;border-radius:3px;font-size:8px;margin-right:4px;font-weight:600;}
</style>

<div style="height:40px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;padding:0 14px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;">

<div class="sb"><div class="sb-h"><h2>项目</h2><p>Ctrl+Z 撤销 · 自动保存</p></div><div class="nb" onclick="openModal()">＋ 新建项目</div><div class="pl" id="pl"></div></div>
<div class="ed">
  <div class="tb"><input class="pn" id="pname" type="text" placeholder="项目名称" oninput="onNC()"><div class="sp"></div><button class="xb" id="xbtn" onclick="doExport()">↓ 导出 PNG 1200×1600</button></div>

  <div class="ml">名称</div><input class="mi" id="mn" type="text" placeholder="未命名">

</div></div>
<script>

// ═══ Auth (公共) ═══════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const e=document.getElementById('credits');if(e)e.textContent='测试模式';return true;}const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}try{const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}const lic=d[0];if((lic.credits||0)<=0||(lic.expires_at&&new Date(lic.expires_at)<new Date())){location.href='index.html';return false;}_lic=lic;updC();return true;}catch{return true;}}
function updC(){const e=document.getElementById('credits');if(e&&_lic)e.textContent=`剩余 ${_lic.credits||0} 次`;}
async function checkQuota(){if(location.protocol==='file:'||location.hostname==='localhost')return true;if(!_lic||(_lic.credits||0)<=0){alert('次数不足');return false;}try{const nc=(_lic.credits||0)-1;const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updC();return true;}catch{_lic.credits=Math.max(0,(_lic.credits||0)-1);updC();return true;}}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ═══ Helpers (公共) ════════════════════════════════════════════════
function drawTextLS(ctx,text,cx,y,lsEm,align){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{ctx.fillText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function drawTextLSstk(ctx,text,cx,y,lsEm,align,strokeWidth){if(!text)return;ctx.lineWidth=strokeWidth;const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{ctx.strokeText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function iLay(nW,nH,cW,cH,zoom,px,py){if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};}
function toHex(c){if(!c)return'#000000';if(c.startsWith('#'))return c.length===4?'#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3]:c.slice(0,7);const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(m)return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');return'#000000';}
function wrapTextLines(ctx,text,maxW,lsEm){const fs=parseFloat((ctx.font.match(/([\d.]+)px/)||[0,16])[1]);const ls=(lsEm||0)*fs;const lines=[];text.split('\n').forEach(para=>{if(!para){lines.push('');return;}let cur='';let curW=0;for(const ch of [...para]){const cw=ctx.measureText(ch).width;const addW=cur?cw+ls:cw;if(curW+addW<=maxW){cur+=ch;curW+=addW;}else{if(cur)lines.push(cur);cur=ch;curW=cw;}}if(cur)lines.push(cur);});return lines;}

// ═══ Line objects (公共) ════════════════════════════════════════════
const FONT_OPTS=[
  ['Noto Serif SC','思源宋体'],['STSong','华文宋体'],['SimSun','宋体'],['STZhongsong','华文中宋'],
  ['STKaiti','华文楷体'],['KaiTi','楷体'],['STFangsong','华文仿宋'],['FangSong','仿宋'],['STXihei','华文细黑'],
  ['Noto Sans SC','思源黑体'],['Microsoft YaHei','微软雅黑'],['PingFang SC','苹方'],['STHeiti','华文黑体'],
  ['Ma Shan Zheng','马善政毛笔楷体'],['ZCOOL XiaoWei','站酷小薇'],['ZCOOL QingKe HuangYou','站酷庆科黄油'],
  ['ZCOOL KuaiLe','站酷快乐体'],['Liu Jian Mao Cao','刘建毛草'],['Long Cang','龙藏'],['ZhiMangXing','志莽行书'],
  ['Cormorant Garamond','Cormorant Garamond'],['Playfair Display','Playfair Display'],['Italiana','Italiana'],
  ['DM Serif Display','DM Serif Display'],['Cinzel','Cinzel（罗马式）'],['Bodoni Moda','Bodoni Moda'],
  ['Libre Bodoni','Libre Bodoni'],['Marcellus','Marcellus'],['Tenor Sans','Tenor Sans'],
  ['EB Garamond','EB Garamond'],['Cardo','Cardo'],['Crimson Text','Crimson Text'],['Lora','Lora'],['Merriweather','Merriweather'],
  ['Montserrat','Montserrat'],['Raleway','Raleway'],['Poppins','Poppins'],['Inter','Inter'],
  ['Dancing Script','Dancing Script（手写）'],['Great Vibes','Great Vibes（花体）'],
  ['Pinyon Script','Pinyon Script（圆润花体）'],['Allura','Allura（精致花体）'],['Pacifico','Pacifico'],
];
const WEIGHT_OPTS=[['300','细'],['400','常规'],['500','中等'],['600','半粗'],['700','粗'],['900','超粗']];
function defLine(text,opts){return Object.assign({text:text||'',font:'Cormorant Garamond',weight:'400',italic:false,size:36,color:'#1a1a1a',ls:0.02,strokeColor:'#000000',strokeWidth:0,glowColor:'#ffffff',glowBlur:0},opts||{});}
function applyLineCSS(line,sizePx){const sty=[`font-family:'${line.font}',serif`,`font-size:${sizePx}px`,`font-weight:${line.weight}`,`color:${line.color}`,`letter-spacing:${line.ls}em`,`line-height:1`];if(line.italic)sty.push('font-style:italic');if(line.strokeWidth>0)sty.push(`-webkit-text-stroke:${line.strokeWidth}px ${line.strokeColor}`);if(line.glowBlur>0)sty.push(`text-shadow:0 0 ${line.glowBlur}px ${line.glowColor},0 0 ${line.glowBlur*1.6}px ${line.glowColor}`);return sty.join(';');}
// canvasDrawLine 公共版：支持发光 + 描边
function canvasDrawLine(ctx,line,cx,y,sizePx,align){
  const it=line.italic?'italic ':'';const w=line.weight||'400';
  ctx.font=`${it}${w} ${sizePx}px '${line.font||'Cormorant Garamond'}',serif`;
  ctx.textBaseline='top';
  // 1) 发光（用 shadowBlur）
  if(line.glowBlur>0&&line.glowColor){ctx.shadowColor=line.glowColor;ctx.shadowBlur=line.glowBlur*(sizePx/(line.size||sizePx));}
  else{ctx.shadowBlur=0;ctx.shadowColor='transparent';}
  // 2) 描边（先描后填）
  if(line.strokeWidth>0&&line.strokeColor){
    ctx.strokeStyle=line.strokeColor;ctx.lineJoin='round';
    drawTextLSstk(ctx,line.text||'',cx,y,line.ls||0,align||'left',line.strokeWidth*2*(sizePx/(line.size||sizePx)));
  }
  // 3) 填充
  ctx.fillStyle=line.color||'#000';
  drawTextLS(ctx,line.text||'',cx,y,line.ls||0,align||'left');
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
}
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function lineControls(lineKey,label,line,sizeMin,sizeMax){
  const fOpts=FONT_OPTS.map(([v,l])=>`<option value="${v}"${(line.font||'Cormorant Garamond')===v?' selected':''}>${l}</option>`).join('');
  const wOpts=WEIGHT_OPTS.map(([v,l])=>`<option value="${v}"${(line.weight||'400')===v?' selected':''}>${l} ${v}</option>`).join('');
  return `<div class="lineCard"><div class="lt">${label}</div>
    <input class="fi" type="text" value="${esc(line.text||'')}" oninput="setLineProp('${lineKey}','text',this.value)" placeholder="文字内容">
    <div class="lb">字体</div><select class="sl" onchange="setLineProp('${lineKey}','font',this.value)">${fOpts}</select>
    <div class="rw"><label>字号</label><input class="nm" type="number" min="${sizeMin}" max="${sizeMax}" value="${line.size||36}" oninput="setLineProp('${lineKey}','size',+this.value)"><span class="ut">px</span></div>
    <div class="lb">字重</div><select class="sl" onchange="setLineProp('${lineKey}','weight',this.value)">${wOpts}</select>
    <div class="rw"><label>斜体</label><select class="sl" style="flex:1;" onchange="setLineProp('${lineKey}','italic',this.value==='true')"><option value="false"${!line.italic?' selected':''}>正体</option><option value="true"${line.italic?' selected':''}>斜体</option></select></div>
    <div class="lb">颜色</div><div class="cp"><div class="cd" style="background:${toHex(line.color)};" onclick="this.nextElementSibling.click()"></div><input type="color" value="${toHex(line.color)}" style="display:none" onchange="setLineProp('${lineKey}','color',this.value);this.previousElementSibling.style.background=this.value"></div>
    <div class="rw"><label>字间距</label><input class="sld" type="range" min="-0.1" max="1" step="0.01" value="${line.ls||0}" oninput="setLineProp('${lineKey}','ls',+this.value);this.nextElementSibling.textContent=this.value+'em'"><span class="vl">${line.ls||0}em</span></div>

async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
    }
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle=p.bgColor||'#fff';ctx.fillRect(0,0,W,H);
    // Image with side margins + top margin + optional rounded corners
    const imgMargX=p.imageMarginX||0,imgTopY=p.imageTop||0;
    const imgWFull=W-2*imgMargX;
    const imgRad=p.imageRadius||0;
    const bgURL=await getURL(p.bgImg.imgKey);
    if(bgURL){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=bgURL;});if(img){const l=iLay(p.bgImg.nW||img.naturalWidth,p.bgImg.nH||img.naturalHeight,imgWFull,p.imageH,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);ctx.save();ctx.beginPath();if(imgRad>0)ctx.roundRect(imgMargX,imgTopY,imgWFull,p.imageH,imgRad);else ctx.rect(imgMargX,imgTopY,imgWFull,p.imageH);ctx.clip();ctx.drawImage(img,imgMargX+l.left,imgTopY+l.top,l.width,l.height);ctx.restore();}}
    else{ctx.fillStyle='#f5f5f5';ctx.save();ctx.beginPath();if(imgRad>0)ctx.roundRect(imgMargX,imgTopY,imgWFull,p.imageH,imgRad);else ctx.rect(imgMargX,imgTopY,imgWFull,p.imageH);ctx.fill();ctx.restore();}
    // Helper: draw a line at absolute (y, xOff) with align
    function drawAtPos(line,y,xOff,align){
      align=align||'left';
      let x;
      if(align==='right')x=W-p.paddingX+(xOff||0);
      else if(align==='center')x=W/2+(xOff||0);
      else x=p.paddingX+(xOff||0);
      canvasDrawLine(ctx,line,x,y,line.size,align);
    }
    // Title EN
    drawAtPos(p.titleEN,p.titleENY,p.titleENX,'left');
    // Title CN
    drawAtPos(p.titleCN,p.titleCNY,p.titleCNX,'left');
    // Logo
    drawAtPos(p.logoLine,p.logoY,p.logoX,p.logoAlign||'right');
    // Body (wrapped, with align)
    const bodyW=W-2*p.paddingX;
    ctx.font=`${p.bodyWeight} ${p.bodySize}px '${p.bodyFont}',serif`;ctx.fillStyle=p.bodyColor;ctx.textBaseline='top';ctx.textAlign='left';
    const lines=wrapTextLines(ctx,p.bodyText||'',bodyW,p.bodyLS);
    const lineH=p.bodySize*p.bodyLineHeight;
    const bAlign=p.bodyAlign||'justify';
    lines.forEach((line,li)=>{
      let bx,balign;
      if(bAlign==='center'){bx=W/2;balign='center';}
      else if(bAlign==='right'){bx=W-p.paddingX;balign='right';}
      else{bx=p.paddingX;balign='left';}
      drawTextLS(ctx,line,bx,p.bodyY+li*lineH,p.bodyLS,balign);
    });
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

TPL.G = (function(){
// canvasDrawLine 用外层公共版（支持发光+描边）

// ═══ DB ═══════════════════════════════════════════════════════════
const DB='wedding-magazine-g-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ═══ State ═══════════════════════════════════════════════════════
let projs=[],curId=null;const imgCache={};
let dragging=false,dragSX=0,dragSY=0,dragPX=50,dragPY=50;
let _hist=[],_hi=-1;

const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid)=>`magG-${pid}`;
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hi+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hi=_hist.length-1;}
async function undo(){if(_hi<=0)return;_hi--;const p=JSON.parse(_hist[_hi]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);await render();renderRP();}

async function loadAll(){const _r=await dbAll('P');projs.length=0;_r.forEach(p=>projs.push(p));projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){if(!key)return;await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'p')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('jfi');fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('格式错误');}fi.value='';};fi.click();}

// ═══ Drag (move image FRAME via imageX/imageTop) ═══════════════════
let dragImgX0=0,dragImgY0=0;
function onMD(e){const p=cur();if(!p||!p.bgImg.imgKey||e.button!==0)return;dragging=true;dragSX=e.clientX;dragSY=e.clientY;dragImgX0=p.imageX||0;dragImgY0=p.imageTop||0;document.getElementById('bgslot').style.cursor='grabbing';e.preventDefault();}
function onTS(e){const p=cur();if(!p||!p.bgImg.imgKey)return;dragging=true;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragImgX0=p.imageX||0;dragImgY0=p.imageTop||0;e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!dragging)return;moveDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(!dragging)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
function moveDrag(cx,cy){
  const p=cur();if(!p)return;
  const{w}=pSz();const sc=w/1200;
  // delta in screen px → convert to canvas px (sc factor)
  const dx=(cx-dragSX)/sc, dy=(cy-dragSY)/sc;
  p.imageX=Math.round(dragImgX0+dx);
  p.imageTop=Math.max(0,Math.round(dragImgY0+dy));
  // Live update image frame position
  const slot=document.getElementById('bgslot');
  if(slot){
    const imgW=Math.round(p.imageW*sc),imgH=Math.round(p.imageH*sc);
    const imgX=Math.round((w-imgW)/2+p.imageX*sc);
    const imgY=Math.round(p.imageTop*sc);
    slot.style.left=imgX+'px';
    slot.style.top=imgY+'px';
  }
}
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const el=document.getElementById('bgslot');if(el)el.style.cursor='grab';const p=cur();if(p){pushH();await save(p);renderRP();}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);renderRP();}});

// ═══ Export PNG ═══════════════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
    }
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle=p.bgColor||'#fff';ctx.fillRect(0,0,W,H);
    // Titles each at own X/Y
    canvasDrawLine(ctx,p.titleEN,p.titleENX||0,p.titleENY||0,p.titleEN.size,'left');
    canvasDrawLine(ctx,p.titleCN,p.titleCNX||0,p.titleCNY||0,p.titleCN.size,'left');
    // Vertical image (center)
    const imgX=Math.round((W-p.imageW)/2+(p.imageX||0)),imgY=p.imageTop;
    const bgURL=await getURL(p.bgImg.imgKey);
    if(bgURL){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=bgURL;});if(img){const l=iLay(p.bgImg.nW||img.naturalWidth,p.bgImg.nH||img.naturalHeight,p.imageW,p.imageH,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);ctx.save();ctx.beginPath();ctx.rect(imgX,imgY,p.imageW,p.imageH);ctx.clip();ctx.drawImage(img,imgX+l.left,imgY+l.top,l.width,l.height);ctx.restore();}}
    else{ctx.fillStyle='#f5f5f5';ctx.fillRect(imgX,imgY,p.imageW,p.imageH);}
    // Body at own X/Y/W with bold lead
    const bodyX=p.bodyX||0,bodyY=p.bodyY||0,bodyW=p.bodyW||1020;
    const lineH=p.bodySize*p.bodyLineHeight;
    let lineY=bodyY;
    const leadText=p.leadText||'';
    const restText=p.bodyText||'';
    const fullText=leadText+restText;
    ctx.font=`${p.bodyWeight} ${p.bodySize}px '${p.bodyFont}',serif`;
    ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle=p.bodyColor;
    const chars=[...fullText];
    const ls=p.bodyLS*p.bodySize;
    let curX=bodyX;
    chars.forEach((ch,i)=>{
      const isLead=i<[...leadText].length;
      ctx.font=`${isLead?(p.leadWeight||'700'):p.bodyWeight} ${p.bodySize}px '${p.bodyFont}',serif`;
      const cw=ctx.measureText(ch).width;
      const addW=cw+(curX>bodyX?ls:0);
      if(ch==='\n'||curX+addW>bodyX+bodyW){
        lineY+=lineH;curX=bodyX;
        if(ch==='\n')return;
      }
      ctx.fillText(ch,curX,lineY);
      curX+=cw+ls;
    });
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}

// ═══ 模板 H ════════════════════════════════════════════════════════
TPL.H = (function(){
// ═══ DB ═══════════════════════════════════════════════════════════
const DB='wedding-magazine-h-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ═══ State ═══════════════════════════════════════════════════════
let projs=[],curId=null;const imgCache={};
let dragging=false,dragSX=0,dragSY=0,dragPX=50,dragPY=50;
let _hist=[],_hi=-1;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid)=>`magH-${pid}`;
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hi+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hi=_hist.length-1;}
async function undo(){if(_hi<=0)return;_hi--;const p=JSON.parse(_hist[_hi]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);await render();renderRP();}

async function loadAll(){const _r=await dbAll('P');projs.length=0;_r.forEach(p=>projs.push(p));projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){if(!key)return;await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'p')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('jfi');fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('格式错误');}fi.value='';};fi.click();}

// ═══ Drag (top image only) ═══════════════════════════════════════
function onMD(e){const p=cur();if(!p||!p.bgImg.imgKey||e.button!==0)return;dragging=true;dragSX=e.clientX;dragSY=e.clientY;dragPX=p.bgImg.px;dragPY=p.bgImg.py;document.getElementById('bgslot').style.cursor='grabbing';e.preventDefault();}
function onTS(e){const p=cur();if(!p||!p.bgImg.imgKey)return;dragging=true;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=p.bgImg.px;dragPY=p.bgImg.py;e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!dragging)return;moveDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(!dragging)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
function moveDrag(cx,cy){const p=cur();if(!p)return;const{w}=pSz();const sc=w/1200;const imageH=p.imageH*sc;p.bgImg.px=Math.max(0,Math.min(100,dragPX-(cx-dragSX)/(w*(p.bgImg.zoom||1))*100));p.bgImg.py=Math.max(0,Math.min(100,dragPY-(cy-dragSY)/(imageH*(p.bgImg.zoom||1))*100));const el=document.getElementById('img-bg');if(el){const l=iLay(p.bgImg.nW,p.bgImg.nH,w,imageH,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);el.style.left=l.left+'px';el.style.top=l.top+'px';el.style.width=l.width+'px';el.style.height=l.height+'px';}}
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const el=document.getElementById('bgslot');if(el)el.style.cursor='grab';const p=cur();if(p){pushH();await save(p);}});

async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
    }
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle=p.bgColor||'#fff';ctx.fillRect(0,0,W,H);
    // Background image
    const bgURL=await getURL(p.bgImg.imgKey);
    if(bgURL){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=bgURL;});if(img){const l=iLay(p.bgImg.nW||img.naturalWidth,p.bgImg.nH||img.naturalHeight,W,p.imageH,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);ctx.save();ctx.beginPath();ctx.rect(0,p.imageTop,W,p.imageH);ctx.clip();ctx.drawImage(img,l.left,p.imageTop+l.top,l.width,l.height);ctx.restore();}}
    else{ctx.fillStyle='#f0f0f0';ctx.fillRect(0,p.imageTop,W,p.imageH);}
    // Centered EN title
    canvasDrawLine(ctx,p.titleEN,W/2,p.titleENTop,p.titleEN.size,'center');
    canvasDrawLine(ctx,p.titleCN,W/2,p.titleENTop+p.titleEN.size+p.titleGap,p.titleCN.size,'center');
    // Subtitle centered
    canvasDrawLine(ctx,p.subtitleLine,W/2,p.subtitleTop,p.subtitleLine.size,'center');
    canvasDrawLine(ctx,p.logoLine,W/2,p.logoTop,p.logoLine.size,'center');
    // List wrapped centered
    const listW=W-2*p.paddingX;
    ctx.font=`${p.listWeight} ${p.listSize}px '${p.listFont}',sans-serif`;ctx.fillStyle=p.listColor;ctx.textBaseline='top';
    const lines=wrapTextLines(ctx,p.listText||'',listW,p.listLS);
    const lineH=p.listSize*p.listLineHeight;
    lines.forEach((line,li)=>{drawTextLS(ctx,line,W/2,p.listTop+li*lineH,p.listLS,'center');});
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

// ═══ DB ═══════════════════════════════════════════════════════════

const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);

const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});

async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
    }
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle=p.bgColor||'#fff';ctx.fillRect(0,0,W,H);
    // Top-left titles
    let curY=p.titleTop;
    canvasDrawLine(ctx,p.titleEN,p.paddingX,curY,p.titleEN.size,'left');
    curY+=p.titleEN.size+p.titleGap;
    canvasDrawLine(ctx,p.titleCN,p.paddingX,curY,p.titleCN.size,'left');
    // Right-top logo
    canvasDrawLine(ctx,p.logoLine,W-p.paddingX,p.logoTop,p.logoLine.size,'right');
    // Big horizontal image
    const bgURL=await getURL(p.bgImg.imgKey);
    if(bgURL){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=bgURL;});if(img){const l=iLay(p.bgImg.nW||img.naturalWidth,p.bgImg.nH||img.naturalHeight,W,p.imageH,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);ctx.save();ctx.beginPath();ctx.rect(0,p.imageTop,W,p.imageH);ctx.clip();ctx.drawImage(img,l.left,p.imageTop+l.top,l.width,l.height);ctx.restore();}}
    else{ctx.fillStyle='#f0f0f0';ctx.fillRect(0,p.imageTop,W,p.imageH);}
    // Tags list (wrapped)
    const tagsW=W-2*p.paddingX;
    ctx.font=`${p.tagsWeight} ${p.tagsSize}px '${p.tagsFont}',sans-serif`;ctx.fillStyle=p.tagsColor;ctx.textBaseline='top';ctx.textAlign='left';
    const tagLines=wrapTextLines(ctx,p.tagsText||'',tagsW,p.tagsLS);
    const tagsLineH=p.tagsSize*p.tagsLineHeight;
    tagLines.forEach((line,li)=>{drawTextLS(ctx,line,p.paddingX,p.tagsTop+li*tagsLineH,p.tagsLS,'left');});
    // Body text (wrapped)
    const bodyW=W-2*p.paddingX;
    ctx.font=`${p.bodyWeight} ${p.bodySize}px '${p.bodyFont}',serif`;ctx.fillStyle=p.bodyColor;ctx.textBaseline='top';ctx.textAlign='left';
    const lines=wrapTextLines(ctx,p.bodyText||'',bodyW,p.bodyLS);
    const lineH=p.bodySize*p.bodyLineHeight;
    lines.forEach((line,li)=>{drawTextLS(ctx,line,p.paddingX,p.bodyTop+li*lineH,p.bodyLS,'left');});
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});

let dragSlot='L';

function moveDrag(cx,cy){const p=cur();if(!p)return;const{w}=pSz();const sc=w/1200;const imgPadX=Math.round((p.imagesPaddingX!==undefined?p.imagesPaddingX:p.paddingX)*sc);const gap=Math.round(p.imagesGap*sc);const imgsAreaW=w-2*imgPadX;const ratio=(p.imagesLeftRatio||0.5);const slotLW=Math.max(40,Math.round((imgsAreaW-gap)*ratio));const slotRW=Math.max(40,imgsAreaW-gap-slotLW);const slotW=dragSlot==='L'?slotLW:slotRW;const imgsH=Math.round(p.imagesH*sc);const im=dragSlot==='L'?p.leftImg:p.rightImg;im.px=Math.max(0,Math.min(100,dragPX-(cx-dragSX)/(slotW*(im.zoom||1))*100));im.py=Math.max(0,Math.min(100,dragPY-(cy-dragSY)/(imgsH*(im.zoom||1))*100));const el=document.getElementById('img-'+dragSlot);if(el){const l=iLay(im.nW,im.nH,slotW,imgsH,im.zoom,im.px,im.py);el.style.left=l.left+'px';el.style.top=l.top+'px';el.style.width=l.width+'px';el.style.height=l.height+'px';}}

// ═══ Export PNG ═══════════════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};
    }
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle=p.bgColor||'#fff';ctx.fillRect(0,0,W,H);
    // Two images side-by-side, respecting imagesPaddingX and leftRatio
    const imgPad=p.imagesPaddingX!==undefined?p.imagesPaddingX:p.paddingX;
    const imgsAreaW=W-2*imgPad;
    const ratio=(p.imagesLeftRatio||0.5);
    const slotLW=Math.max(40,Math.round((imgsAreaW-p.imagesGap)*ratio));
    const slotRW=Math.max(40,imgsAreaW-p.imagesGap-slotLW);
    const slotsCfg=[['L',imgPad,slotLW],['R',imgPad+slotLW+p.imagesGap,slotRW]];
    for(const [slot,sx,sw] of slotsCfg){
      const im=slot==='L'?p.leftImg:p.rightImg;
      const url=await getURL(im.imgKey);
      if(url){const img=await new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=url;});if(img){const l=iLay(im.nW||img.naturalWidth,im.nH||img.naturalHeight,sw,p.imagesH,im.zoom,im.px,im.py);ctx.save();ctx.beginPath();ctx.rect(sx,p.imagesTop,sw,p.imagesH);ctx.clip();ctx.drawImage(img,sx+l.left,p.imagesTop+l.top,l.width,l.height);ctx.restore();}}
      else{ctx.fillStyle='#f0f0f0';ctx.fillRect(sx,p.imagesTop,sw,p.imagesH);}
    }
    // Multi-line EN headline (wrap by maxW)
    const hEN=p.headlineEN;
    ctx.font=`${hEN.italic?'italic ':''}${hEN.weight} ${hEN.size}px '${hEN.font}',serif`;ctx.fillStyle=hEN.color;ctx.textBaseline='top';
    const hLines=wrapTextLines(ctx,hEN.text||'',p.headlineMaxW,hEN.ls);
    const hLineH=hEN.size*p.headlineLineHeight;
    hLines.forEach((line,li)=>{const ln={...hEN,text:line};canvasDrawLine(ctx,ln,p.paddingX,p.headlineTop+li*hLineH,hEN.size,'left');});
    // CN title (left) + Logo (right) on the same row
    canvasDrawLine(ctx,p.titleCN,p.paddingX,p.ctitleTop,p.titleCN.size,'left');
    canvasDrawLine(ctx,p.logoLine,W-p.paddingX,p.ctitleTop+p.logoOffY,p.logoLine.size,'right');
    // Body
    const bodyW=W-2*p.paddingX;
    ctx.font=`${p.bodyWeight} ${p.bodySize}px '${p.bodyFont}',serif`;ctx.fillStyle=p.bodyColor;ctx.textBaseline='top';ctx.textAlign='left';
    const lines=wrapTextLines(ctx,p.bodyText||'',bodyW,p.bodyLS);
    const lineH=p.bodySize*p.bodyLineHeight;
    lines.forEach((line,li)=>{drawTextLS(ctx,line,p.paddingX,p.bodyTop+li*lineH,p.bodyLS,'left');});
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

    handleMove: (cx,cy)=>{ if(dragging) moveDrag(cx,cy); },
    handleUp: async ()=>{ if(!dragging)return; dragging=false; const p=cur(); if(p){ pushH(); await save(p); if(typeof renderRP==="function"){ try{renderRP();}catch(e){} } } if(typeof render==="function") render(); },
  };

})();

</script>
