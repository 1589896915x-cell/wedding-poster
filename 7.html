<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>横条叠图版 - 婚礼场馆展示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.topbar a{color:#888;font-size:18px;text-decoration:none;}
.topbar .lbl{font-size:12px;color:#666;}
.credits{background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;margin-left:auto;}
.logout-btn{padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;}
.main{display:flex;flex:1;overflow:hidden;}
.sb{width:188px;flex-shrink:0;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;}
.sb-head{padding:12px;border-bottom:1px solid #1e1e1e;}
.sb-head h2{font-size:13px;font-weight:500;}
.sb-head p{font-size:10px;color:#555;margin-top:2px;}
.sb-new{margin:10px;padding:7px;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;background:#161616;}
.sb-new:hover{border-color:#666;color:#ccc;}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.pi{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.pi:hover{background:#1a1a1a;}.pi.on{background:#1a1a1a;border-color:#2a2a2a;}
.pi h3{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi p{font-size:9px;color:#555;margin-top:2px;}
.pi-acts{display:flex;gap:4px;margin-top:5px;}
.pi-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pi-btn:hover{border-color:#555;color:#aaa;}.pi-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-top{height:44px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.pname::placeholder{color:#444;}
.lsw{display:flex;gap:3px;background:#111;padding:3px;border-radius:6px;border:1px solid #2a2a2a;}
.lsw-btn{padding:3px 9px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;background:none;color:#666;}
.lsw-btn.on{background:#2a2a2a;color:#fff;}
.exp-btn{padding:6px 14px;background:#c8392b;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto;}
.exp-btn:hover{background:#a02d22;}
.ed-body{display:flex;flex:1;overflow:hidden;}
.canvas{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
#poster{box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;flex-shrink:0;}
.rp{width:244px;flex-shrink:0;background:#111;border-left:1px solid #1e1e1e;overflow-y:auto;padding:12px 10px;}
.rp-t{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.sec{margin-top:10px;padding-top:9px;border-top:1px solid #1a1a1a;}
.sec-t{font-size:10px;color:#aaa;letter-spacing:.5px;margin-bottom:7px;font-weight:500;}
.lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:5px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.sel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.row label{font-size:9px;color:#666;min-width:32px;flex-shrink:0;}
.num{width:56px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.unit{font-size:9px;color:#555;}
.sld{flex:1;accent-color:#c8392b;}
.fval{font-size:9px;color:#888;min-width:34px;text-align:right;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;text-align:center;margin-top:3px;font-family:inherit;}
.img-btn:hover{border-color:#555;color:#ccc;}
.col-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.ct{padding:4px 9px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;}
.ct.on{background:#2a2a2a;color:#fff;border-color:#444;}
.translate-btn{width:100%;padding:6px;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:4px;color:#6a9a6a;font-size:10px;cursor:pointer;text-align:center;margin-top:4px;font-family:inherit;}
.translate-btn:hover{background:#1e341e;border-color:#3a6a3a;color:#8aba8a;}
.translate-btn:disabled{opacity:.5;cursor:default;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">←</a>
  <span class="lbl">横条叠图版</span>
  <span class="credits" id="wp-credits"></span>
  <button class="logout-btn" onclick="wpLogout()">退出</button>
</div>
<div class="main">
  <div class="sb">
    <div class="sb-head"><h2>项目</h2><p>横条叠图版</p></div>
    <div class="sb-new" onclick="newProj()">＋ 新建项目</div>
    <div class="sb-list" id="proj-list"></div>
  </div>
  <div class="editor">
    <div class="ed-top">
      <input class="pname" id="pname" placeholder="项目名称" oninput="onNameChange()">
      <div class="lsw" id="lsw" style="display:none;">
        <button class="lsw-btn" onclick="switchLayout(3)">3图</button>
        <button class="lsw-btn" onclick="switchLayout(4)">4图</button>
      </div>
      <button class="exp-btn" id="exp-btn" onclick="doExport()">↓ 导出 PNG 1200×1600</button>
    </div>
    <div class="ed-body">
      <div class="canvas"><div id="poster"></div></div>
      <div class="rp" id="rp"><div style="color:#333;font-size:12px;padding:20px 0;text-align:center;">新建或选择项目</div></div>
    </div>
  </div>
</div>
<script>
// ══ Auth ══════════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const el=document.getElementById('wp-credits');if(el)el.textContent='测试模式';return true;}
  const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}
    const lic=d[0];if((lic.credits||0)<=0){location.href='index.html';return false;}
    _lic=lic;updCredits();return true;
  }catch(e){return true;}
}
function updCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost')return true;
  if(!_lic){alert('请先登录');return false;}
  if((_lic.credits||0)<=0){alert('次数已用完，请充值');return false;}
  try{
    const nc=(_lic.credits||0)-1;
    const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});
    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);updCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ══ DB ════════════════════════════════════════════════════════════
let DB=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('banner-v1',1);q.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:{});});};q.onsuccess=e=>{DB=e.target.result;r();};q.onerror=j;});}
const tx=(s,m='readonly')=>DB.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ══ 常量 ══════════════════════════════════════════════════════════
const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC','Arial','Times New Roman'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
// 图片key前缀
const bk=(id,i)=>`bn-b-${id}-${i}`; // 横条图
const pk=(id)=>`bn-p-${id}`;         // 人物图

// ══ 默认值（1200×1600px）══════════════════════════════════════════
// 布局：
// 上方图片区 ~1100px：3或4张横条图，最后一张左侧叠人物图
// 下方文字区 ~500px：浅灰背景
// 人物图：绝对定位，左下角，跨越图片区和文字区

function defP(name,cols=4){
  const strips=Array.from({length:cols},(_,i)=>({imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1}));
  return{
    id:uid(),name,ct:Date.now(),at:Date.now(),
    cols,
    strips,
    portrait:{imgKey:null,nW:0,nH:0,px:50,py:49,zoom:0.82},
    portraitW:1067, portraitY:564,
    bgColor:'#f0ede8',
    imgAreaH:1200,
    topPadH:1,
    enTitle:'FOSHAN WEDDING VENUE',
    enTitleFont:'Cormorant Garamond',enTitleSize:28,enTitleWeight:'400',enTitleColor:'#9a8a78',
    enTitleY:1200,
    mainTitle:'XX一站式婚宴酒店',
    mainTitleFont:'Noto Serif SC',mainTitleSize:82,mainTitleWeight:'700',mainTitleColor:'#1a1410',
    mainTitleY:1242,
    subTitle:'婚宴+婚庆+四大 一站式全包',
    subTitleFont:'Noto Serif SC',subTitleSize:43,subTitleWeight:'400',subTitleColor:'#3a2a1a',
    subTitleY:1367,
    enPara:'Foshan Wedding Must See The Wedding Venue\nVenue Layout, Banquet, Makeup And Host Are Included\nTake A Look At The Wedding Ceremony Of \'26',
    enParaFont:'Cormorant Garamond',enParaSize:20,enParaWeight:'300',enParaColor:'#9a8a78',
    enParaY:1448,
  };
}

// ══ Storage ═══════════════════════════════════════════════════════
const imgCache={};
async function saveImg(key,blob){await dbP('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){try{await dbD('I',key);}catch(e){}if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];try{const b=await dbG('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}catch(e){return null;}}
async function save(p){p.at=Date.now();await dbP('P',p);}

// ══ 项目管理 ══════════════════════════════════════════════════════
let projs=[],curId=null,selStrip=0;
async function newProj(){
  const n=prompt('项目名称：','未命名');if(!n)return;
  const p=defP(n.trim()||'未命名',4);
  await save(p);projs.unshift(p);renderList();openProj(p.id);
}
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi ${p.id===curId?'on':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><p>${new Date(p.at).toLocaleDateString('zh-CN')} · ${p.cols}图</p>
    <div class="pi-acts">
      <button class="pi-btn" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pi-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pi-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function openProj(id){
  curId=id;selStrip=0;const p=cur();if(!p)return;
  document.getElementById('pname').value=p.name;
  document.getElementById('lsw').style.display='flex';
  updateLsw();renderList();await renderPoster();renderRP();
}
function updateLsw(){
  const p=cur();if(!p)return;
  document.querySelectorAll('.lsw-btn').forEach((b,i)=>b.classList.toggle('on',[3,4][i]===p.cols));
}
async function switchLayout(n){
  const p=cur();if(!p||p.cols===n)return;
  if(!confirm(`切换为${n}图版面？`))return;
  p.cols=n;
  while(p.strips.length<n)p.strips.push({imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1});
  selStrip=Math.min(selStrip,n-1);
  await save(p);updateLsw();await renderPoster();renderRP();
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function dupProj(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  for(let i=0;i<p.cols;i++){const b=await dbG('I',bk(id,i));if(b){await dbP('I',b,bk(nid,i));np.strips[i].imgKey=bk(nid,i);}}
  const pb=await dbG('I',pk(id));if(pb){await dbP('I',pb,pk(nid));np.portrait.imgKey=pk(nid);}
  await save(np);projs.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  const p=projs.find(x=>x.id===id);if(p){for(let i=0;i<p.cols;i++)await delImg(bk(id,i));await delImg(pk(id));}
  await dbD('P',id);projs=projs.filter(x=>x.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';document.getElementById('lsw').style.display='none';renderRP();}
  renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}

// ══ 海报尺寸 ══════════════════════════════════════════════════════
function pSz(){
  const a=document.querySelector('.canvas');
  const aH=a.clientHeight-40,aW=a.clientWidth-40;
  let w,h;
  if(aH*0.75<aW){h=Math.floor(aH);w=Math.floor(h*0.75);}
  else{w=Math.floor(aW);h=Math.floor(w/0.75);}
  return{w,h};
}

// ══ 渲染海报 ══════════════════════════════════════════════════════
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

async function renderPoster(){
  const el=document.getElementById('poster');
  const p=cur();
  if(!p){el.style.cssText='width:300px;height:400px;background:#222;';el.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  const n=p.cols;
  const imgAreaH=Math.round((p.imgAreaH||1100)*sc);
  const stripH=Math.round(imgAreaH/n);
  const topPadH=Math.round((p.topPadH||30)*sc);
  const bgColor=p.bgColor||'#f0ede8';
  const portraitW=Math.round((p.portraitW||400)*sc);
  const portraitY=Math.round((p.portraitY||800)*sc);

  el.style.cssText=`width:${w}px;height:${h}px;background:${bgColor};position:relative;overflow:hidden;`;

  const stripUrls=await Promise.all(p.strips.slice(0,n).map(s=>getURL(s.imgKey)));
  const portraitUrl=await getURL(p.portrait.imgKey);

  // 字号
  const enTSz=Math.round((p.enTitleSize||26)*sc);
  const mTSz=Math.round((p.mainTitleSize||78)*sc);
  const subSz=Math.round((p.subTitleSize||34)*sc);
  const enPSz=Math.round((p.enParaSize||19)*sc);

  let html='';

  // 横条图（从topPadH开始，z-index:1）
  for(let i=0;i<n;i++){
    const s=p.strips[i];const url=stripUrls[i];const y=topPadH+i*stripH;
    html+=`<div id="sw-${i}" data-i="${i}" data-type="strip" style="position:absolute;left:0;top:${y}px;width:${w}px;height:${stripH}px;overflow:hidden;cursor:${url?'grab':'pointer'};background:#2a2a2a;z-index:1;">
      ${url?`<img id="si-${i}" src="${url}" draggable="false" style="position:absolute;display:block;">`
           :`<div onclick="uploadStrip(${i})" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#555;cursor:pointer;"><div style="font-size:20px;opacity:.4;">＋</div><div style="font-size:10px;">图片${i+1}</div></div>`}
    </div>`;
  }

  // 人物图：z-index:3（高于文字区背景z2，低于文字z5）
  html+=`<div id="pw" data-type="portrait" style="position:absolute;left:0;top:0;width:${portraitW}px;height:${h}px;overflow:visible;pointer-events:none;cursor:default;z-index:3;">
    <div id="pw-inner" style="position:absolute;left:0;top:${portraitY}px;width:${portraitW}px;height:${h-portraitY}px;overflow:visible;cursor:${portraitUrl?'grab':'pointer'};pointer-events:auto;">
    ${portraitUrl?`<img id="pi" src="${portraitUrl}" draggable="false" style="position:absolute;display:block;">`
                :`<div onclick="uploadPortrait()" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#666;cursor:pointer;border:1px dashed #444;"><div style="font-size:18px;opacity:.4;">＋</div><div style="font-size:9px;text-align:center;">人物图<br>（左侧叠加）</div></div>`}
  </div></div>`;

  // 文字区背景（z-index:2，低于人物图z3）
  html+=`<div style="position:absolute;left:0;top:${imgAreaH+topPadH}px;width:${w}px;height:${h-imgAreaH-topPadH}px;background:${bgColor};z-index:2;"></div>`;

  // 英文小标题（z-index:5）
  html+=`<div style="position:absolute;left:0;right:0;top:${Math.round((p.enTitleY||1120)*sc)}px;text-align:center;font-family:'${p.enTitleFont}',serif;font-size:${enTSz}px;font-weight:${p.enTitleWeight};color:${p.enTitleColor};letter-spacing:0.18em;z-index:5;">${esc(p.enTitle)}</div>`;

  // 主中文标题（z-index:5）
  html+=`<div style="position:absolute;left:0;right:0;top:${Math.round((p.mainTitleY||1165)*sc)}px;text-align:center;font-family:'${p.mainTitleFont}',serif;font-size:${mTSz}px;font-weight:${p.mainTitleWeight};color:${p.mainTitleColor};letter-spacing:0.04em;line-height:1.1;z-index:5;">${esc(p.mainTitle)}</div>`;

  // 副标题（z-index:5）
  html+=`<div style="position:absolute;left:0;right:0;top:${Math.round((p.subTitleY||1300)*sc)}px;text-align:center;font-family:'${p.subTitleFont}',serif;font-size:${subSz}px;font-weight:${p.subTitleWeight};color:${p.subTitleColor};letter-spacing:0.08em;z-index:5;">${esc(p.subTitle)}</div>`;

  // 英文段落（z-index:5）
  html+=`<div style="position:absolute;left:0;right:0;top:${Math.round((p.enParaY||1390)*sc)}px;text-align:center;font-family:'${p.enParaFont}',serif;font-size:${enPSz}px;font-weight:${p.enParaWeight};color:${p.enParaColor};letter-spacing:0.05em;line-height:1.75;white-space:pre-line;z-index:5;">${esc(p.enPara)}</div>`;

  el.innerHTML=html;

  // 图片定位
  for(let i=0;i<n;i++){
    if(stripUrls[i]){
      const img=document.getElementById(`si-${i}`);
      if(img){if(img.complete&&img.naturalWidth)updStripPos(i);else img.onload=()=>updStripPos(i);}
      document.getElementById(`sw-${i}`).addEventListener('mousedown',onMD);
    }
  }
  if(portraitUrl){
    const img=document.getElementById('pi');
    if(img){if(img.complete&&img.naturalWidth)updPortraitPos();else img.onload=()=>updPortraitPos();}
    const inner=document.getElementById('pw-inner');
    if(inner)inner.addEventListener('mousedown',onMD_portrait);
  }
}

function updStripPos(i){
  const p=cur();if(!p)return;
  const{w,h}=pSz();const sc=w/1200;const n=p.cols;
  const imgAreaH=Math.round((p.imgAreaH||1100)*sc);
  const stripH=Math.round(imgAreaH/n);
  const s=p.strips[i];const img=document.getElementById(`si-${i}`);if(!img)return;
  const l=iLay(s.nW||img.naturalWidth,s.nH||img.naturalHeight,w,stripH,s.zoom,s.px,s.py);
  img.style.cssText=`position:absolute;display:block;width:${l.width}px;height:${l.height}px;left:${l.left}px;top:${l.top}px;`;
}
function updPortraitPos(){
  const p=cur();if(!p)return;
  const{w,h}=pSz();const sc=w/1200;
  const s=p.portrait;const img=document.getElementById('pi');if(!img)return;
  const pwInner=document.getElementById('pw-inner');if(!pwInner)return;
  const cW=pwInner.clientWidth,cH=pwInner.clientHeight;
  const nW=s.nW||img.naturalWidth,nH=s.nH||img.naturalHeight;
  if(!nW||!nH)return;
  const zoom=s.zoom||1;
  const sc2=Math.max(cW/nW,cH/nH)*zoom;
  const rW=nW*sc2,rH=nH*sc2;
  // px范围 -100~200，映射到 -cW ~ 2*cW 的左偏移
  const maxMoveX=rW-cW;
  // px=50时居中，px=-100时图片右移（向左偏移出画面），px=200时图片左移出右侧
  const extraRange=cW; // 可以额外移动cW的距离（移出画面）
  const totalRange=Math.max(0,maxMoveX)+extraRange*2;
  const leftOffset= -(s.px/100)*totalRange + extraRange;
  const top=-((s.py||50)/100)*Math.max(0,rH-cH);
  img.style.cssText=`position:absolute;display:block;width:${rW}px;height:${rH}px;left:${leftOffset}px;top:${top}px;`;
}

// ══ 拖拽 ══════════════════════════════════════════════════════════
let drag={on:false,type:'',i:-1,sx:0,sy:0,px0:50,py0:50};
function onMD(e){
  const type=this.dataset.type;const i=+(this.dataset.i||0);
  const p=cur();if(!p||e.button!==0)return;
  const hasImg=type==='strip'?p.strips[i]?.imgKey:p.portrait?.imgKey;
  if(!hasImg)return;
  drag={on:true,type,i,sx:e.clientX,sy:e.clientY,
    px0:type==='strip'?p.strips[i].px:p.portrait.px,
    py0:type==='strip'?p.strips[i].py:p.portrait.py};
  e.preventDefault();
}
function onMD_portrait(e){
  const p=cur();if(!p||e.button!==0)return;
  if(!p.portrait?.imgKey)return;
  drag={on:true,type:'portrait',i:0,sx:e.clientX,sy:e.clientY,px0:p.portrait.px,py0:p.portrait.py};
  e.preventDefault();
}
document.addEventListener('mousemove',e=>{
  if(!drag.on)return;const p=cur();if(!p)return;
  const{w,h}=pSz();const sc=w/1200;const n=p.cols;
  if(drag.type==='strip'){
    const s=p.strips[drag.i];
    const imgAreaH=Math.round((n===3?800:1100)*sc);const stripH=Math.round(imgAreaH/n);
    const l0=iLay(s.nW,s.nH,w,stripH,s.zoom,drag.px0,drag.py0);
    const mx=Math.max(0,l0.width-w),my=Math.max(0,l0.height-stripH);
    s.px=mx>0?Math.max(0,Math.min(100,drag.px0-(e.clientX-drag.sx)/mx*100)):50;
    s.py=my>0?Math.max(0,Math.min(100,drag.py0-(e.clientY-drag.sy)/my*100)):50;
    updStripPos(drag.i);
  } else if(drag.type==='portrait') {
    const s=p.portrait;
    const pwInner=document.getElementById('pw-inner');const cW=pwInner?pwInner.clientWidth:200,cH=pwInner?pwInner.clientHeight:400;
    const l0=iLay(s.nW,s.nH,cW,cH,s.zoom,drag.px0,drag.py0);
    const mx=Math.max(0,l0.width-cW),my=Math.max(0,l0.height-cH);
    s.px=mx>0?Math.max(0,Math.min(100,drag.px0-(e.clientX-drag.sx)/mx*100)):50;
    s.py=my>0?Math.max(0,Math.min(100,drag.py0-(e.clientY-drag.sy)/my*100)):50;
    updPortraitPos();
  }
});
document.addEventListener('mouseup',async()=>{if(drag.on){drag.on=false;const p=cur();if(p)await save(p);}});

// ══ AI自动翻译 ════════════════════════════════════════════════════
async function autoTranslate(){
  const p=cur();if(!p)return;
  const btn=document.getElementById('translate-btn');if(!btn)return;
  btn.textContent='翻译中…';btn.disabled=true;
  try{
    const prompt=`把以下中文翻译成英文，用于婚礼场馆宣传海报。格式要求：
1. 英文大标题（对应"${p.mainTitle}"），1行，全大写，字母间有空格，类似"FOSHAN WEDDING VENUE"的风格
2. 英文副标题（对应"${p.subTitle}"），1行
3. 英文段落，3行，每行不超过50字符，首字母大写，用换行分隔

直接输出3个部分，用|||分隔，不要其他内容。`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        messages:[{role:'user',content:prompt}]
      })
    });
    const d=await r.json();
    const text=d.content?.[0]?.text||'';
    const parts=text.split('|||').map(s=>s.trim());
    if(parts.length>=1&&parts[0])p.enTitle=parts[0];
    if(parts.length>=3&&parts[2])p.enPara=parts[2];
    await save(p);await renderPoster();renderRP();
    btn.textContent='✓ 翻译完成';
  }catch(e){
    btn.textContent='翻译失败，重试';
  }
  setTimeout(()=>{if(btn)btn.disabled=false;},1500);
}

// ══ 导出 ══════════════════════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const n=p.cols;
  const topPad=p.topPadH||30;
  const imgAreaH=p.imgAreaH||1100;
  const stripH=Math.round(imgAreaH/n);
  const portraitW=p.portraitW||400;
  const portraitY=p.portraitY||800;
  const bgColor=p.bgColor||'#f0ede8';

  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  // 背景色（顶部留白+文字区统一）
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);

  // 预加载图片
  function loadImg(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}
  const stripUrls=await Promise.all(p.strips.slice(0,n).map(s=>getURL(s.imgKey)));
  const stripImgs=await Promise.all(stripUrls.map(loadImg));
  const portraitUrl=await getURL(p.portrait.imgKey);
  const portraitImg=await loadImg(portraitUrl);

  // 横条图（顶部留30px）
  for(let i=0;i<n;i++){
    const img=stripImgs[i];const s=p.strips[i];const y=topPad+i*stripH;
    ctx.save();ctx.beginPath();ctx.rect(0,y,W,stripH);ctx.clip();
    if(img){
      const zoom=s.zoom||1;const nW=img.naturalWidth,nH=img.naturalHeight;
      const sc2=Math.max(W/nW,stripH/nH)*zoom;
      const rW=nW*sc2,rH=nH*sc2;
      const left=-((s.px||50)/100)*Math.max(0,rW-W);
      const top=y-((s.py||50)/100)*Math.max(0,rH-stripH);
      ctx.drawImage(img,left,top,rW,rH);
    } else {ctx.fillStyle='#2a2a2a';ctx.fillRect(0,y,W,stripH);}
    ctx.restore();
  }

  // 人物图（在文字之前绘制，文字覆盖在上面）
  if(portraitImg){
    const s=p.portrait;const cW=portraitW,cH=H-portraitY;
    ctx.save();ctx.beginPath();ctx.rect(0,0,cW,H);ctx.clip(); // 只裁左右，不裁上下
    const zoom=s.zoom||1;const nW=portraitImg.naturalWidth,nH=portraitImg.naturalHeight;
    const sc2=Math.max(cW/nW,cH/nH)*zoom;
    const rW=nW*sc2,rH=nH*sc2;
    // 和预览一致：px -100~200，extraRange=cW
    const maxMoveX=rW-cW;
    const extraRange=cW;
    const totalRange=Math.max(0,maxMoveX)+extraRange*2;
    const left=-(s.px/100)*totalRange+extraRange;
    const top=portraitY-((s.py||50)/100)*Math.max(0,rH-cH);
    ctx.drawImage(portraitImg,left,top,rW,rH);
    ctx.restore();
  }

  ctx.textAlign='center';ctx.textBaseline='top';

  // 英文小标题
  ctx.fillStyle=p.enTitleColor;
  ctx.font=`${p.enTitleWeight} ${p.enTitleSize}px "${p.enTitleFont}",serif`;
  ctx.letterSpacing='0.18em';
  ctx.fillText(p.enTitle,W/2,p.enTitleY||1140);
  ctx.letterSpacing='0';

  // 主中文标题
  ctx.fillStyle=p.mainTitleColor;
  ctx.font=`${p.mainTitleWeight} ${p.mainTitleSize}px "${p.mainTitleFont}",serif`;
  ctx.fillText(p.mainTitle,W/2,p.mainTitleY||1175);

  // 副标题
  ctx.fillStyle=p.subTitleColor;
  ctx.font=`${p.subTitleWeight} ${p.subTitleSize}px "${p.subTitleFont}",serif`;
  ctx.fillText(p.subTitle,W/2,p.subTitleY||1300);

  // 英文段落（多行，1.75行距）
  ctx.fillStyle=p.enParaColor;
  ctx.font=`${p.enParaWeight} ${p.enParaSize}px "${p.enParaFont}",serif`;
  const lines=(p.enPara||'').split('\n');
  const lh=(p.enParaSize||19)*1.75;
  lines.forEach((line,i)=>ctx.fillText(line,W/2,(p.enParaY||1375)+i*lh));

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.download=(p.name||'poster')+'_横条叠图版_1200x1600.png';
    a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
  },'image/png');
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});
(async()=>{
  await wpCheckAuth();
  try{await openDB();const all=await dbAll('P');projs=all.sort((a,b)=>b.at-a.at);renderList();}
  catch(e){document.getElementById('proj-list').innerHTML='<div style="font-size:10px;color:#e05a5a;padding:8px;">初始化失败</div>';}
})();
</script>
</body>
