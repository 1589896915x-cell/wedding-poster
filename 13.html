<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大图主推版 - 婚礼场馆展示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Pinyon+Script&family=Great+Vibes&family=Sacramento&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.topbar a{color:#888;font-size:18px;text-decoration:none;}
.topbar .lbl{font-size:12px;color:#666;}
.credits{background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;margin-left:auto;}
.logout-btn{padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;}
.main{display:flex;flex:1;overflow:hidden;}
.sb{width:188px;flex-shrink:0;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;}
.sb-head{padding:12px;border-bottom:1px solid #1e1e1e;}
.sb-head h2{font-size:13px;font-weight:500;}
.sb-head p{font-size:10px;color:#555;margin-top:2px;}
.sb-new{margin:10px;padding:7px;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;background:#161616;}
.sb-new:hover{border-color:#666;color:#ccc;}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.pi{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.pi:hover{background:#1a1a1a;}.pi.on{background:#1a1a1a;border-color:#2a2a2a;}
.pi h3{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi p{font-size:9px;color:#555;margin-top:2px;}
.pi-acts{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.pi-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pi-btn:hover{border-color:#555;color:#aaa;}.pi-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-top{height:44px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.pname::placeholder{color:#444;}
.exp-btn{padding:6px 14px;background:#c8392b;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto;}
.exp-btn:hover{background:#a02d22;}
.ed-body{display:flex;flex:1;overflow:hidden;}
.canvas{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
#poster{box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;flex-shrink:0;}
.rp{width:252px;flex-shrink:0;background:#111;border-left:1px solid #1e1e1e;overflow-y:auto;padding:12px 10px;}
.rp-t{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.sec{margin-top:10px;padding-top:9px;border-top:1px solid #1a1a1a;}
.sec-t{font-size:10px;color:#aaa;letter-spacing:.5px;margin-bottom:7px;font-weight:500;}
.lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:5px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.sel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.num{width:56px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.unit{font-size:9px;color:#555;}
.sld{flex:1;accent-color:#c8392b;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;text-align:center;margin-top:3px;font-family:inherit;}
.img-btn:hover{border-color:#555;color:#ccc;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tog-lbl{font-size:9px;color:#888;}
.tog{width:32px;height:18px;background:#2a2a2a;border-radius:9px;position:relative;cursor:pointer;border:none;flex-shrink:0;}
.tog.on{background:#c8392b;}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;}
.tog.on::after{left:16px;}
/* ── 自定义拾色器 ── */
.cp-wrap{position:relative;margin-bottom:4px;}
.cp-preview{display:flex;gap:4px;align-items:center;cursor:pointer;}
.cp-swatch{width:36px;height:26px;border-radius:4px;border:1px solid #2a2a2a;flex-shrink:0;}
.cp-txt{flex:1;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:10px;font-family:inherit;outline:none;}
.cp-panel{position:fixed;z-index:9999;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;width:220px;box-shadow:0 8px 24px rgba(0,0,0,.6);display:none;}
.cp-panel.show{display:block;}
.cp-grad{width:196px;height:120px;border-radius:4px;position:relative;cursor:crosshair;margin-bottom:8px;}
.cp-grad-white{position:absolute;inset:0;border-radius:4px;background:linear-gradient(to right,#fff,transparent);}
.cp-grad-black{position:absolute;inset:0;border-radius:4px;background:linear-gradient(to top,#000,transparent);}
.cp-cursor{position:absolute;width:10px;height:10px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 1px rgba(0,0,0,.4);}
.cp-hue{width:196px;height:12px;border-radius:6px;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);position:relative;cursor:pointer;margin-bottom:6px;}
.cp-alpha{width:196px;height:12px;border-radius:6px;position:relative;cursor:pointer;margin-bottom:8px;background-image:linear-gradient(45deg,#666 25%,transparent 25%),linear-gradient(-45deg,#666 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#666 75%),linear-gradient(-45deg,transparent 75%,#666 75%);background-size:6px 6px;background-position:0 0,0 3px,3px -3px,-3px 0;}
.cp-alpha-bar{position:absolute;inset:0;border-radius:6px;}
.cp-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);box-shadow:0 0 0 1px rgba(0,0,0,.4);pointer-events:none;}
.cp-rgba-row{display:flex;gap:4px;margin-bottom:6px;}
.cp-rgba-row input{flex:1;min-width:0;padding:3px 4px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:3px;color:#ddd;font-size:10px;text-align:center;outline:none;font-family:inherit;}
.cp-rgba-row label{font-size:8px;color:#666;text-align:center;display:block;margin-top:1px;}
.cp-rgba-col{display:flex;flex-direction:column;}
.cp-presets{display:flex;flex-wrap:wrap;gap:4px;}
.cp-preset{width:18px;height:18px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,.15);}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">←</a>
  <span class="lbl">大图主推版</span>
  <span class="credits" id="wp-credits"></span>
  <button class="logout-btn" onclick="wpLogout()">退出</button>
</div>
<div class="main">
  <div class="sb">
    <div class="sb-head"><h2>项目</h2><p>大图主推版</p></div>
    <div class="sb-new" onclick="newProj()">＋ 新建项目</div>
    <div class="sb-list" id="proj-list"></div>
    <div style="padding:8px;border-top:1px solid #1e1e1e;flex-shrink:0;">
      <div class="sb-new" style="margin:0;" onclick="importProjJSON()">↑ 导入备份 JSON</div>
    </div>
  </div>
  <div class="editor">
    <div class="ed-top">
      <input class="pname" id="pname" placeholder="项目名称" oninput="onNameChange()">
      <button class="exp-btn" id="exp-btn" onclick="doExport()">↓ 导出 PNG 1200×1600</button>
    </div>
    <div class="ed-body">
      <div class="canvas"><div id="poster"></div></div>
      <div class="rp" id="rp"><div style="color:#333;font-size:12px;padding:20px 0;text-align:center;">新建或选择项目</div></div>
    </div>
  </div>
</div>
<script>
// ══ Auth ══════════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const el=document.getElementById('wp-credits');if(el)el.textContent='测试模式';return true;}
  const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}
    const lic=d[0];if((lic.credits||0)<=0){location.href='index.html';return false;}
    _lic=lic;updCredits();return true;
  }catch(e){return true;}
}
function updCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost')return true;
  if(!_lic){alert('请先登录');return false;}
  if((_lic.credits||0)<=0){alert('次数已用完，请充值');return false;}
  try{
    const nc=(_lic.credits||0)-1;
    const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});
    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);updCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ══ DB ════════════════════════════════════════════════════════════
let DB=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('hero-v1',1);q.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:{});});};q.onsuccess=e=>{DB=e.target.result;r();};q.onerror=j;});}
const tx=(s,m='readonly')=>DB.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Great Vibes','Dancing Script','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC','Arial'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const BG_KEY=id=>`hero-bg-${id}`;
const LOGO_KEY=id=>`hero-logo-${id}`;

// ══ 默认值 ════════════════════════════════════════════════════════
function defP(name){
  return{
    id:uid(),name,ct:Date.now(),at:Date.now(),
    bg:{imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1},
    vignetteOp:0.45,vignetteSize:600,
    title1:'一家20年餐饮品牌',
    title1Font:'Noto Serif SC',title1Size:110,title1Weight:'700',title1Color:'#ffffff',
    title1X:60,title1Y:80,title1LS:0.02,
    title2:'微婚礼的酒店',
    title2Font:'Noto Serif SC',title2Size:110,title2Weight:'700',title2Color:'#ffffff',
    title2X:60,title2Y:210,title2LS:0.02,
    tagShow:true,
    tagText:'让婚礼省心省力省心省钱',
    tagFont:'Noto Serif SC',tagSize:42,tagWeight:'500',tagColor:'#ffffff',
    tagX:60,tagY:370,tagLS:0.06,
    tagBorderColor:'rgba(255,255,255,0.9)',tagBorderW:4,tagPadH:14,tagPadV:36,tagRadius:999,
    artShow:true,
    artText:'WEDDING Venue',
    artFont:'Dancing Script',artSize:120,artWeight:'400',artColor:'rgba(212,180,120,0.9)',
    artX:60,artY:1057,artLS:0.02,artItalic:true,
    bigWordShow:true,
    bigWord:'一价全包',
    bigWordFont:'Noto Serif SC',bigWordSize:100,bigWordWeight:'700',bigWordColor:'#ffffff',
    bigWordX:60,bigWordY:1094,bigWordLS:0.05,
    svcShow:true,
    svc1:'婚庆策划+婚礼场地',
    svc2:'婚宴酒席+四大金刚',
    svc3:'婚纱礼服+1V1婚礼服务',
    svcFont:'Noto Serif SC',svcSize:38,svcWeight:'400',svcColor:'#ffffff',
    svcX:60,svcY:1281,svcLS:0.04,svcLH:80,
    logoShow:true,
    logo:{imgKey:null,nW:0,nH:0},
    logoW:275,logoX:862,logoY:1413,
    brandEnShow:false,
    brandEn:'BLOOM ART CENTER',
    brandEnFont:'Cormorant Garamond',brandEnSize:26,brandEnWeight:'400',brandEnColor:'#ffffff',
    brandEnX:900,brandEnY:1450,brandEnLS:0.15,
    brandCnShow:false,
    brandCn:'繁景艺术中心',
    brandCnFont:'Noto Serif SC',brandCnSize:26,brandCnWeight:'300',brandCnColor:'#ffffff',
    brandCnX:920,brandCnY:1490,brandCnLS:0.1,
  };
}

// ══ Storage ═══════════════════════════════════════════════════════
const imgCache={};
async function saveImg(key,blob){await dbP('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){try{await dbD('I',key);}catch(e){}if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];try{const b=await dbG('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}catch(e){return null;}}
async function save(p){p.at=Date.now();await dbP('P',p);}

// ══ 项目管理 ══════════════════════════════════════════════════════
let projs=[],curId=null;
async function newProj(){const n=prompt('项目名称：','未命名');if(!n)return;const p=defP(n.trim()||'未命名');await save(p);projs.unshift(p);renderList();openProj(p.id);}
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi ${p.id===curId?'on':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><p>${new Date(p.at).toLocaleDateString('zh-CN')}</p>
    <div class="pi-acts">
      <button class="pi-btn" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pi-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pi-btn" onclick="event.stopPropagation();exportProjJSON('${p.id}')">备份</button>
      <button class="pi-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function openProj(id){curId=id;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;renderList();await renderPoster();renderRP();}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function dupProj(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  const bgb=await dbG('I',BG_KEY(id));if(bgb){await dbP('I',bgb,BG_KEY(nid));np.bg.imgKey=BG_KEY(nid);}
  const lgb=await dbG('I',LOGO_KEY(id));if(lgb){await dbP('I',lgb,LOGO_KEY(nid));np.logo.imgKey=LOGO_KEY(nid);}
  await save(np);projs.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  await delImg(BG_KEY(id));await delImg(LOGO_KEY(id));
  await dbD('P',id);projs=projs.filter(x=>x.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
function exportProjJSON(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const data=JSON.parse(JSON.stringify(p));data.bg.imgKey=null;data.logo.imgKey=null;
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=(p.name||'project')+'_backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function importProjJSON(){
  const fi=document.createElement('input');fi.type='file';fi.accept='.json,application/json';
  fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{const text=await f.text();const data=JSON.parse(text);if(!data.id||!data.name)throw new Error();
    data.id=uid();data.at=Date.now();data.ct=Date.now();data.name=data.name+' (导入)';
    data.bg.imgKey=null;if(data.logo)data.logo.imgKey=null;
    await save(data);projs.unshift(data);renderList();openProj(data.id);}catch(e){alert('导入失败');}
  };fi.click();
}

// ══ 尺寸 ══════════════════════════════════════════════════════════
function pSz(){
  const a=document.querySelector('.canvas');const aH=a.clientHeight-40,aW=a.clientWidth-40;
  let w,h;if(aH*0.75<aW){h=Math.floor(aH);w=Math.floor(h*0.75);}else{w=Math.floor(aW);h=Math.floor(w/0.75);}
  return{w,h};
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ══ 渲染 ══════════════════════════════════════════════════════════
async function renderPoster(){
  const el=document.getElementById('poster');const p=cur();
  if(!p){el.style.cssText='width:300px;height:400px;background:#1a1410;';el.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  el.style.cssText=`width:${w}px;height:${h}px;background:#1a1410;position:relative;overflow:hidden;`;
  const bgUrl=await getURL(p.bg.imgKey);
  const logoUrl=await getURL(p.logo?.imgKey);
  let html='';

  // 背景图
  if(bgUrl){

    html+=`<div style="position:absolute;left:${Math.round((p.brandEnX||900)*sc)}px;top:${Math.round((p.brandEnY||1450)*sc)}px;font-family:'${p.brandEnFont||'Cormorant Garamond'}',serif;font-size:${beSz}px;font-weight:${p.brandEnWeight||'400'};color:${p.brandEnColor||'#fff'};letter-spacing:${p.brandEnLS||0.15}em;z-index:5;white-space:nowrap;">${esc(p.brandEn)}</div>`;

  }

  el.innerHTML=html;
  if(bgUrl){const img=document.getElementById('bg-img');if(img){if(img.complete&&img.naturalWidth)updBgPos();else img.onload=updBgPos;}document.getElementById('bg-wrap').addEventListener('mousedown',onMD);}

function updBgPos(){
  const p=cur();if(!p)return;const{w,h}=pSz();const s=p.bg;const img=document.getElementById('bg-img');if(!img)return;
  const l=iLay(s.nW||img.naturalWidth,s.nH||img.naturalHeight,w,h,s.zoom,s.px,s.py);
  img.style.cssText=`position:absolute;display:block;width:${l.width}px;height:${l.height}px;left:${l.left}px;top:${l.top}px;`;
}

// ══ 拖拽 ══════════════════════════════════════════════════════════
let drag={on:false,sx:0,sy:0,px0:50,py0:50};
function onMD(e){const p=cur();if(!p||e.button!==0||!p.bg.imgKey)return;drag={on:true,sx:e.clientX,sy:e.clientY,px0:p.bg.px,py0:p.bg.py};e.preventDefault();}
document.addEventListener('mousemove',e=>{
  if(!drag.on)return;const p=cur();if(!p)return;const{w,h}=pSz();const s=p.bg;
  const l0=iLay(s.nW,s.nH,w,h,s.zoom,drag.px0,drag.py0);
  const mx=Math.max(0,l0.width-w),my=Math.max(0,l0.height-h);
  s.px=mx>0?Math.max(0,Math.min(100,drag.px0-(e.clientX-drag.sx)/mx*100)):50;
  s.py=my>0?Math.max(0,Math.min(100,drag.py0-(e.clientY-drag.sy)/my*100)):50;
  updBgPos();
});
document.addEventListener('mouseup',async()=>{if(drag.on){drag.on=false;const p=cur();if(p)await save(p);}});

// ══ 上传 ══════════════════════════════════════════════════════════
function uploadBg(){
  const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
  fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;const p=cur();if(!p)return;
    const u=URL.createObjectURL(f);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.bg.nW=img.naturalWidth;p.bg.nH=img.naturalHeight;URL.revokeObjectURL(u);res();};img.src=u;});
    await saveImg(BG_KEY(curId),f);p.bg.imgKey=BG_KEY(curId);p.bg.px=50;p.bg.py=50;p.bg.zoom=1;
    await save(p);await renderPoster();renderRP();};fi.click();
}
function uploadLogo(){
  const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
  fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;const p=cur();if(!p)return;
    const u=URL.createObjectURL(f);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.logo.nW=img.naturalWidth;p.logo.nH=img.naturalHeight;URL.revokeObjectURL(u);res();};img.src=u;});
    await saveImg(LOGO_KEY(curId),f);p.logo.imgKey=LOGO_KEY(curId);
    await save(p);await renderPoster();renderRP();};fi.click();
}
async function removeLogo(){const p=cur();if(!p)return;await delImg(LOGO_KEY(curId));p.logo.imgKey=null;await save(p);await renderPoster();renderRP();}

// ── 拾色器逻辑 ──
let cpState={};
function cpOpen(k){
  // 关闭其他
  document.querySelectorAll('.cp-panel.show').forEach(el=>{if(!el.id.endsWith('_'+k))el.classList.remove('show');});
  const panel=document.getElementById('cpp_'+k);
  if(!panel)return;
  panel.classList.toggle('show');
  if(!panel.classList.contains('show'))return;
  // 定位
  const wrap=document.getElementById('cpw_'+k);
  const rect=wrap.getBoundingClientRect();
  const ph=panel.offsetHeight||260;
  const spaceBelow=window.innerHeight-rect.bottom;
  panel.style.left=Math.min(rect.left,window.innerWidth-230)+'px';
  panel.style.top=(spaceBelow>ph?rect.bottom+4:rect.top-ph-4)+'px';
  // 初始化状态
  const val=document.getElementById('cptxt_'+k).value;
  const rgba=parseColor(val);
  cpState[k]={h:0,s:100,v:100,a:rgba.a};
  const hsv=rgbToHsv(rgba.r,rgba.g,rgba.b);
  cpState[k].h=hsv.h;cpState[k].s=hsv.s;cpState[k].v=hsv.v;
  cpUpdateUI(k);
  // 绑定拖拽
  cpBindGrad(k);cpBindHue(k);cpBindAlpha(k);
}
function parseColor(str){
  if(!str)return{r:255,g:255,b:255,a:1};
  const m=str.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
  if(m)return{r:+m[1],g:+m[2],b:+m[3],a:m[4]!==undefined?+m[4]:1};
  if(str.startsWith('#')){
    let h=str.slice(1);if(h.length===3)h=h.split('').map(x=>x+x).join('');
    return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16),a:1};
  }
  return{r:255,g:255,b:255,a:1};
}
function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=max===0?0:d/max,v=max;
  if(d!==0){if(max===r)h=(g-b)/d%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360;}
  return{h,s:Math.round(s*100),v:Math.round(v*100)};
}
function hsvToRgb(h,s,v){
  s/=100;v/=100;const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
}
function cpUpdateUI(k){
  const st=cpState[k];if(!st)return;
  const {r,g,b}=hsvToRgb(st.h,st.s,st.v);
  const a=st.a;
  const colorStr=a<1?`rgba(${r},${g},${b},${a})`:`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  // 更新预览块和文本
  const sw=document.getElementById('cpsw_'+k);const txt=document.getElementById('cptxt_'+k);
  if(sw)sw.style.background=colorStr;if(txt)txt.value=colorStr;
  // 更新渐变框背景
  const {r:hr,g:hg,b:hb}=hsvToRgb(st.h,100,100);
  const grad=document.getElementById('cpg_'+k);
  if(grad)grad.style.background=`rgb(${hr},${hg},${hb})`;
  // 更新游标位置
  const cur2=document.getElementById('cpc_'+k);
  if(cur2){cur2.style.left=(st.s)+'%';cur2.style.top=(100-st.v)+'%';}
  // 更新色相滑块
  const ht=document.getElementById('cpht_'+k);
  if(ht)ht.style.left=(st.h/360*100)+'%';
  // 更新透明度滑块
  const ab=document.getElementById('cpab_'+k);
  if(ab)ab.style.background=`linear-gradient(to right,rgba(${r},${g},${b},0),rgb(${r},${g},${b}))`;
  const at=document.getElementById('cpat_'+k);
  if(at)at.style.left=(st.a*100)+'%';
  // 更新RGBA输入
  const ri=document.getElementById('cpr_'+k);const gi=document.getElementById('cpgg_'+k);
  const bi=document.getElementById('cpb_'+k);const ai=document.getElementById('cpoa_'+k);
  if(ri)ri.value=r;if(gi)gi.value=g;if(bi)bi.value=b;if(ai)ai.value=a;
  // 保存
  setP(k,colorStr);reRender();
}
function cpBindGrad(k){
  const el=document.getElementById('cpg_'+k);if(!el||el._bound)return;el._bound=true;
  const drag=e=>{const r=el.getBoundingClientRect();const st=cpState[k];
    st.s=Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100));
    st.v=Math.max(0,Math.min(100,(1-(e.clientY-r.top)/r.height)*100));cpUpdateUI(k);};
  el.addEventListener('mousedown',e=>{drag(e);const mu=()=>{document.removeEventListener('mousemove',drag);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',drag);document.addEventListener('mouseup',mu);});
}
function cpBindHue(k){
  const el=document.getElementById('cph_'+k);if(!el||el._bound)return;el._bound=true;
  const drag=e=>{const r=el.getBoundingClientRect();cpState[k].h=Math.max(0,Math.min(360,(e.clientX-r.left)/r.width*360));cpUpdateUI(k);};
  el.addEventListener('mousedown',e=>{drag(e);const mu=()=>{document.removeEventListener('mousemove',drag);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',drag);document.addEventListener('mouseup',mu);});
}
function cpBindAlpha(k){
  const el=document.getElementById('cpa_'+k);if(!el||el._bound)return;el._bound=true;
  const drag=e=>{const r=el.getBoundingClientRect();cpState[k].a=Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*100)/100;cpUpdateUI(k);};
  el.addEventListener('mousedown',e=>{drag(e);const mu=()=>{document.removeEventListener('mousemove',drag);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',drag);document.addEventListener('mouseup',mu);});
}
function cpFromRGBA(k){
  const r=+document.getElementById('cpr_'+k)?.value||0;const g=+document.getElementById('cpgg_'+k)?.value||0;
  const b=+document.getElementById('cpb_'+k)?.value||0;const a=+document.getElementById('cpoa_'+k)?.value??1;
  const hsv=rgbToHsv(r,g,b);const st=cpState[k]||{};
  st.h=hsv.h;st.s=hsv.s;st.v=hsv.v;st.a=a;cpState[k]=st;cpUpdateUI(k);
}
function cpFromText(k,val){
  const rgba=parseColor(val);const hsv=rgbToHsv(rgba.r,rgba.g,rgba.b);
  cpState[k]={h:hsv.h,s:hsv.s,v:hsv.v,a:rgba.a};
  const sw=document.getElementById('cpsw_'+k);if(sw)sw.style.background=val;
  setP(k,val);reRender();
}
function cpApply(k,val){
  const rgba=parseColor(val);const hsv=rgbToHsv(rgba.r,rgba.g,rgba.b);
  cpState[k]={h:hsv.h,s:hsv.s,v:hsv.v,a:rgba.a};cpUpdateUI(k);
}

// ══ 导出 ══════════════════════════════════════════════════════════
function drawTextLS(ctx,text,x,y,letterSpacingEm,align){
  const fs=parseFloat(ctx.font.match(/([\d.]+)px/)?.[1]||16);const ls=letterSpacingEm*fs;
  const chars=text.split('');let totalW=0;
  chars.forEach((ch,i)=>{totalW+=ctx.measureText(ch).width;if(i<chars.length-1)totalW+=ls;});
  let sx=align==='center'?x-totalW/2:align==='right'?x-totalW:x;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
}

async function doExport(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  function loadImg(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}

  // 背景
  ctx.fillStyle='#1a1410';ctx.fillRect(0,0,W,H);
  const bgUrl=await getURL(p.bg.imgKey);const bgImg=await loadImg(bgUrl);
  if(bgImg){
    const s=p.bg;const zoom=s.zoom||1;
    const sc2=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight)*zoom;
    const rW=bgImg.naturalWidth*sc2,rH=bgImg.naturalHeight*sc2;
    const left=-((s.px||50)/100)*Math.max(0,rW-W);const top=-((s.py||50)/100)*Math.max(0,rH-H);
    ctx.drawImage(bgImg,left,top,rW,rH);
  }

  // 暗角
  const vo=p.vignetteOp||0.45;
  const grad=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.15,W/2,H/2,Math.max(W,H)*0.75);
  grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,`rgba(0,0,0,${vo})`);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  ctx.textBaseline='top';
  const sh=()=>{ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=16;ctx.shadowOffsetY=2;};
  const cls=()=>{ctx.shadowBlur=0;ctx.shadowOffsetY=0;};

  // 标题1
  ctx.fillStyle=p.title1Color||'#fff';
  ctx.font=`${p.title1Weight||'700'} ${p.title1Size||110}px "${p.title1Font||'Noto Serif SC'}",serif`;
  sh();drawTextLS(ctx,p.title1,p.title1X||60,p.title1Y||80,p.title1LS||0.02,'left');cls();

  // 标题2
  ctx.fillStyle=p.title2Color||'#fff';
  ctx.font=`${p.title2Weight||'700'} ${p.title2Size||110}px "${p.title2Font||'Noto Serif SC'}",serif`;
  sh();drawTextLS(ctx,p.title2,p.title2X||60,p.title2Y||210,p.title2LS||0.02,'left');cls();

  // 胶囊标签
  if(p.tagShow!==false){
    const tgSz=p.tagSize||42;const tgPH=p.tagPadH||14;const tgPV=p.tagPadV||36;
    const tgBW=p.tagBorderW||2;const tgR=p.tagRadius||999;
    ctx.font=`${p.tagWeight||'400'} ${tgSz}px "${p.tagFont||'Noto Serif SC'}",serif`;
    const ls=(p.tagLS||0.06)*tgSz;const chars=p.tagText.split('');
    let tw=0;chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
    const bW=tw+tgPV*2;const bH=tgSz+tgPH*2;
    const bX=p.tagX||60;const bY=p.tagY||370;
    const r=Math.min(tgR,bH/2);
    ctx.save();ctx.beginPath();
    ctx.moveTo(bX+r,bY);ctx.lineTo(bX+bW-r,bY);ctx.quadraticCurveTo(bX+bW,bY,bX+bW,bY+r);
    ctx.lineTo(bX+bW,bY+bH-r);ctx.quadraticCurveTo(bX+bW,bY+bH,bX+bW-r,bY+bH);
    ctx.lineTo(bX+r,bY+bH);ctx.quadraticCurveTo(bX,bY+bH,bX,bY+bH-r);
    ctx.lineTo(bX,bY+r);ctx.quadraticCurveTo(bX,bY,bX+r,bY);
    ctx.closePath();ctx.strokeStyle=p.tagBorderColor||'rgba(255,255,255,0.9)';ctx.lineWidth=tgBW;ctx.stroke();ctx.restore();
    ctx.fillStyle=p.tagColor||'#fff';sh();drawTextLS(ctx,p.tagText,bX+tgPV,bY+tgPH,p.tagLS||0.06,'left');cls();
  }

  // 艺术字
  if(p.artShow!==false){
    ctx.fillStyle=p.artColor||'rgba(212,180,120,0.9)';
    ctx.font=`${p.artItalic?'italic ':''} ${p.artWeight||'400'} ${p.artSize||120}px "${p.artFont||'Dancing Script'}",cursive`;
    drawTextLS(ctx,p.artText,p.artX||60,p.artY||1010,p.artLS||0.02,'left');
  }

  // 叠加大字
  if(p.bigWordShow!==false){
    ctx.fillStyle=p.bigWordColor||'#fff';
    ctx.font=`${p.bigWordWeight||'700'} ${p.bigWordSize||100}px "${p.bigWordFont||'Noto Serif SC'}",serif`;
    sh();drawTextLS(ctx,p.bigWord,p.bigWordX||60,p.bigWordY||1050,p.bigWordLS||0.05,'left');cls();
  }

  // 服务列表
  if(p.svcShow!==false){
    ctx.fillStyle=p.svcColor||'#fff';
    ctx.font=`${p.svcWeight||'400'} ${p.svcSize||38}px "${p.svcFont||'Noto Serif SC'}",serif`;
    sh();[p.svc1,p.svc2,p.svc3].forEach((s,i)=>{
      if(!s)return;drawTextLS(ctx,s,p.svcX||60,(p.svcY||1190)+i*(p.svcLH||80),p.svcLS||0.04,'left');
    });cls();
  }

  // Logo
  if(p.logoShow!==false){
    const logoUrl=await getURL(p.logo?.imgKey);const logoImg=await loadImg(logoUrl);
    if(logoImg){
      const lW=p.logoW||100;const lH=Math.round(logoImg.naturalHeight/logoImg.naturalWidth*lW);
      ctx.drawImage(logoImg,p.logoX||980,p.logoY||1330,lW,lH);
    }
  }

  // 品牌英文名
  if(p.brandEnShow!==false){
    ctx.fillStyle=p.brandEnColor||'#fff';
    ctx.font=`${p.brandEnWeight||'400'} ${p.brandEnSize||26}px "${p.brandEnFont||'Cormorant Garamond'}",serif`;
    drawTextLS(ctx,p.brandEn,p.brandEnX||900,p.brandEnY||1450,p.brandEnLS||0.15,'left');
  }

  // 品牌中文名
  if(p.brandCnShow!==false){
    ctx.fillStyle=p.brandCnColor||'#fff';
    ctx.font=`${p.brandCnWeight||'300'} ${p.brandCnSize||26}px "${p.brandCnFont||'Noto Serif SC'}",serif`;
    drawTextLS(ctx,p.brandCn,p.brandCnX||920,p.brandCnY||1490,p.brandCnLS||0.1,'left');
  }

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.download=(p.name||'poster')+'_大图主推版_1200x1600.png';
    a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
    btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
  },'image/png');
}
