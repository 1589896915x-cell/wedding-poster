<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横条版 - 婚礼场馆展示模板</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e0e0e;font-family:system-ui,sans-serif;color:#fff;height:100vh;overflow:hidden;display:flex;padding-top:40px;}
.psb{width:190px;flex-shrink:0;background:#161616;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;}
.psb-head{padding:14px 12px 10px;border-bottom:1px solid #2a2a2a;}
.psb-head h2{font-size:13px;font-weight:500;}
.psb-head p{font-size:10px;color:#555;margin-top:2px;}
.psb-new{margin:10px 12px;padding:7px;background:#1e1e1e;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;}
.psb-new:hover{border-color:#666;color:#ccc;}
.proj-list{flex:1;overflow-y:auto;padding:6px 8px;}
.proj-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.proj-item:hover{background:#1e1e1e;}
.proj-item.active{background:#1e1e1e;border-color:#333;}
.proj-item h3{font-size:12px;font-weight:400;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.proj-item .meta{font-size:9px;color:#555;margin-top:2px;display:flex;gap:6px;align-items:center;}
.strips-badge{background:#2a2a2a;padding:1px 5px;border-radius:3px;font-size:9px;color:#888;}
.proj-item-actions{display:flex;gap:4px;margin-top:5px;}
.pa-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pa-btn:hover{border-color:#555;color:#aaa;}
.pa-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:#161616;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.proj-name-in{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.proj-name-in::placeholder{color:#444;}
.sp{flex:1;}
.layout-sw{display:flex;gap:3px;background:#111;padding:3px;border-radius:6px;border:1px solid #2a2a2a;}
.lsw-btn{padding:4px 9px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;background:none;color:#666;}
.lsw-btn.active{background:#2a2a2a;color:#fff;}
.lsw-btn:hover:not(.active){color:#aaa;}
.tbtn{padding:6px 14px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;}
.tbtn-export{background:#c8392b;color:#fff;}
.tbtn-export:hover{background:#a02d22;}
.tbtn-export:disabled{background:#6a1f17;cursor:default;}
.body{display:flex;flex:1;overflow:hidden;}
.canvas-area{flex:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.poster{display:flex;flex-direction:column;overflow:hidden;background:#000;flex-shrink:0;}
.strip{flex:1;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.07);}
.strip:last-child{border-bottom:none;}
.strip-img{position:absolute;pointer-events:none;max-width:none;}
.strip-overlay{position:absolute;inset:0;pointer-events:none;}
.strip-text{position:absolute;display:flex;flex-direction:column;gap:2px;pointer-events:none;}
.strip-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#0a0a0a;color:#333;cursor:pointer;}
.strip-empty span:first-child{font-size:18px;opacity:.4;}
.strip-empty span:last-child{font-size:9px;color:#444;}
/* Right panel */
.rp{width:220px;flex-shrink:0;background:#161616;border-left:1px solid #2a2a2a;overflow-y:auto;padding:12px 10px;}
.rp-title{font-size:10px;font-weight:500;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.rp-strip-btn{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:5px;border:1px solid #2a2a2a;background:none;color:#bbb;font-size:11px;cursor:pointer;width:100%;margin-bottom:4px;text-align:left;font-family:inherit;}
.rp-strip-btn:hover{border-color:#444;background:#1e1e1e;}
.rp-strip-btn.active{border-color:#555;background:#222;color:#fff;}
.rp-strip-num{width:16px;height:16px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.rp-section{margin-top:12px;padding-top:10px;border-top:1px solid #222;}
.rp-sec-title{font-size:9px;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.rp-label{font-size:9px;color:#666;margin-bottom:3px;margin-top:5px;}
.rp-input{width:100%;padding:5px 7px;background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:4px;}
.rp-input:focus{border-color:#555;}
.rp-select{width:100%;padding:5px 7px;background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:4px;}
.rp-row{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.rp-row label{font-size:9px;color:#666;min-width:28px;flex-shrink:0;}
.rp-num{width:54px;padding:4px 6px;background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.rp-num:focus{border-color:#555;}
.rp-unit{font-size:9px;color:#555;}
.rp-slider{flex:1;accent-color:#c8392b;}
.rp-val{font-size:9px;color:#888;min-width:32px;text-align:right;}
.rp-btn-img{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;font-family:inherit;margin-top:4px;display:block;text-align:center;}
.rp-btn-img:hover{border-color:#555;color:#ccc;}
.rp-drag-hint{font-size:9px;color:#444;text-align:center;margin-top:3px;}
.col-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.col-dot{width:20px;height:20px;border-radius:3px;border:1px solid #444;cursor:pointer;flex-shrink:0;}
.col-label{font-size:9px;color:#666;flex:1;}
.no-proj{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;gap:8px;}
.no-proj p{font-size:12px;}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:22px;width:300px;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px;}
.modal-label{font-size:10px;color:#888;margin-bottom:4px;}
.modal-input{width:100%;padding:7px 10px;background:#111;border:1px solid #333;border-radius:5px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:14px;}
.modal-input:focus{border-color:#666;}
.layout-pick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.lp-card{border:1.5px solid #2a2a2a;border-radius:7px;padding:10px 6px;cursor:pointer;text-align:center;background:#111;}
.lp-card:hover{border-color:#555;}
.lp-card.sel{border-color:#c8392b;background:#1a0808;}
.lp-card .lp-icon{display:flex;flex-direction:column;gap:2px;margin:0 auto 6px;width:28px;}
.lp-card .lp-icon span{display:block;background:#444;border-radius:1px;width:100%;}
.lp-card.sel .lp-icon span{background:#c8392b;}
.lp-card p{font-size:10px;color:#888;}
.lp-card.sel p{color:#fff;}
.modal-actions{display:flex;gap:8px;}
.modal-actions button{flex:1;padding:8px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;}
</style>
</head>
<body>

<div style="height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;padding:0 14px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;">
  <a href="index.html" style="font-size:18px;color:#888;text-decoration:none;padding:2px 6px;line-height:1;">←</a>

    <div class="layout-pick">

      </div>
      <div class="lp-card" onclick="pickLayout(4)" id="lp-4">

      </div>
      <div class="lp-card" onclick="pickLayout(5)" id="lp-5">
        <div class="lp-icon" style="height:36px;"><span style="flex:1;"></span><span style="flex:1;"></span><span style="flex:1;"></span><span style="flex:1;"></span><span style="flex:1;"></span></div><p>5块</p>
      </div>

    <div class="modal-actions">
      <button onclick="closeNewModal()" style="background:#2a2a2a;color:#aaa;border:1px solid #333;">取消</button>
      <button onclick="createProject()" style="background:#fff;color:#000;">创建</button>
    </div>
  </div>
</div>

<script>

// ══ WP AUTH ═══════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){
    _lic={credits:999,id:'test'};
    const el=document.getElementById('wp-credits');
    if(el)el.textContent='测试模式';

  try{
    const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();

    if(lic.duration_days&&lic.first_used_at){const exp=new Date(lic.first_used_at);exp.setDate(exp.getDate()+lic.duration_days);if(exp<new Date()){location.href='index.html';return false;}}

function wpUpdCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost'){return true;}
  if(!_lic){alert('请先登录');return false;}
  if((_lic.credits||0)<=0){alert('导出次数已用完，请联系管理员充值');return false;}
  try{
    const newC=(_lic.credits||0)-1;
    const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:newC})});
    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=newC;wpUpdCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);wpUpdCredits();return true;}

function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
// ══════════════════════════════════════════════════════════════════

// ── Fonts ─────────────────────────────────────────────────────────
const FONTS = [
  'Cormorant Garamond','Georgia','Times New Roman','Palatino','Garamond',
  'Noto Serif SC','STSong','STKaiti','STFangsong','Source Han Serif CN',
  'Noto Sans SC','PingFang SC','Microsoft YaHei','SimHei','STHeiti',
  'Arial','Helvetica','Futura','Gill Sans','Trebuchet MS'
];

// ── IndexedDB ─────────────────────────────────────────────────────
const DB_NAME='wedding-v5',DB_VER=1;
const ST_META='projects',ST_IMGS='images';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(ST_META))d.createObjectStore(ST_META,{keyPath:'id'});
      if(!d.objectStoreNames.contains(ST_IMGS))d.createObjectStore(ST_IMGS);
    };
    req.onsuccess=e=>{db=e.target.result;res();};
    req.onerror=rej;
  });
}
function tx(s,m='readonly'){return db.transaction(s,m).objectStore(s);}
function dbGet(s,k){return new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});}
function dbPut(s,v,k){return new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});}
function dbDel(s,k){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});}
function dbAll(s){return new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});}

// ── Defaults ──────────────────────────────────────────────────────
function defStrip(i){
  const names=[
    {en:'FENGWU KYOTO',zh:'凤舞京都'},
    {en:'JING SPACE',zh:'璟空间'},
    {en:'ATLANTIS',zh:'亚特兰蒂斯'},
    {en:"BARBIE'S NIGHT",zh:'芭比之夜'},
    {en:'CASTLE GARDEN',zh:'古堡花园'},
  ];
  const n=names[i]||{en:'TITLE '+(i+1),zh:'标题'+(i+1)};
  return {
    brand:'BLOOM ART CENTER', en:n.en, zh:n.zh,
    imgKey:null, px:50, py:50, zoom:1,
    textRight:5, textTop:50, textAlign:'right',
    opacity:75, overlayColor:'#000000', overlayWidth:58,
  };
}

// 全局共享文字样式默认值
function defStyle(){
  return {
    brandFont:'Cormorant Garamond', brandSize:9, brandWeight:'300', brandColor:'rgba(255,255,255,0.55)',
    enFont:'Cormorant Garamond', enSize:22, enWeight:'600', enColor:'#ffffff',
    zhFont:'Noto Serif SC', zhSize:19, zhWeight:'300', zhColor:'#ffffff',
  };
}

// ── State ─────────────────────────────────────────────────────────
let projects=[],curId=null,selStrip=0,pickedLayout=3;
const imgCache={};
let dragging=false,dragStrip=-1,dragSX=0,dragSY=0,dragPX0=50,dragPY0=50;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function cur(){return projects.find(p=>p.id===curId)||null;}
function ikey(pid,si){return `${pid}-${si}`;}

// ── Storage ───────────────────────────────────────────────────────
async function loadAll(){projects=await dbAll(ST_META);projects.sort((a,b)=>b.at-a.at);}
async function saveProject(p){p.at=Date.now();await dbPut(ST_META,p);}
async function saveImg(key,blob){await dbPut(ST_IMGS,blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbDel(ST_IMGS,key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getImgURL(key){
  if(!key)return null;
  if(imgCache[key])return imgCache[key];
  const blob=await dbGet(ST_IMGS,key);
  if(!blob)return null;
  imgCache[key]=URL.createObjectURL(blob);
  return imgCache[key];
}

// ── Modal ─────────────────────────────────────────────────────────
function openNewModal(){
  pickedLayout=3;document.getElementById('nm-name').value='';
  [3,4,5].forEach(n=>document.getElementById(`lp-${n}`).classList.toggle('sel',n===3));
  document.getElementById('new-modal').classList.add('open');
  setTimeout(()=>document.getElementById('nm-name').focus(),50);
}
function closeNewModal(){document.getElementById('new-modal').classList.remove('open');}
function pickLayout(n){pickedLayout=n;[3,4,5].forEach(x=>document.getElementById(`lp-${x}`).classList.toggle('sel',x===n));}
async function createProject(){
  const name=document.getElementById('nm-name').value.trim()||'未命名';
  const n=pickedLayout;
  const p={id:uid(),name,ct:Date.now(),at:Date.now(),layout:n,
    style:defStyle(),
    strips:Array.from({length:n},(_,i)=>defStrip(i))};
  await saveProject(p);projects.unshift(p);closeNewModal();renderProjList();openProj(p.id);
}
document.getElementById('nm-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProject();});

// ── Layout switch ─────────────────────────────────────────────────
async function switchLayout(n){
  const p=cur();if(!p||p.layout===n)return;
  if(!confirm(`切换为 ${n} 块版面？`))return;
  p.layout=n;
  while(p.strips.length<n)p.strips.push(defStrip(p.strips.length));
  selStrip=Math.min(selStrip,n-1);
  await saveProject(p);renderProjList();updateLayoutSw();await renderPoster();renderRP();
}
function updateLayoutSw(){
  const p=cur();if(!p)return;
  document.querySelectorAll('.lsw-btn').forEach((b,i)=>b.classList.toggle('active',[3,4,5][i]===(p.layout||5)));
}

// ── Project list ──────────────────────────────────────────────────
function renderProjList(){
  const el=document.getElementById('proj-list');
  if(!projects.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projects.map(p=>`
    <div class="proj-item ${p.id===curId?'active':''}" onclick="openProj('${p.id}')">
      <h3>${esc(p.name)}</h3>
      <div class="meta"><span>${new Date(p.at).toLocaleDateString('zh-CN')}</span><span class="strips-badge">${p.layout||5}块</span></div>
      <div class="proj-item-actions">
        <button class="pa-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
        <button class="pa-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
      </div>
    </div>`).join('');
}

function posterSize(){

  if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}
  return{w,h};
}

function stripTextStyle(s,h,n){

    if(urls[i]){
      const img=document.getElementById(`simg-${i}`);
      if(img){

function applyTransform(i,s){
  const img=document.getElementById(`simg-${i}`);if(!img)return;
  const strip=document.getElementById(`strip-${i}`);if(!strip)return;
  const cW=strip.clientWidth,cH=strip.clientHeight;
  if(!cW||!cH)return;
  const nW=img.naturalWidth||cW,nH=img.naturalHeight||cH;
  const zoom=s.zoom||1;
  const baseScale=Math.max(cW/nW,cH/nH)*zoom;
  const rW=nW*baseScale,rH=nH*baseScale;
  const left=(s.px/100)*(cW-rW);
  const top=(s.py/100)*(cH-rH);
  img.style.width=rW+'px';img.style.height=rH+'px';
  img.style.left=left+'px';img.style.top=top+'px';
  img.style.objectFit='';img.style.transform='';
}

function onMD(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey||e.button!==0)return;startDrag(i,e.clientX,e.clientY);e.preventDefault();}
function onTS(e){const i=+this.dataset.i;const p=cur();if(!p||!p.strips[i].imgKey)return;const t=e.touches[0];startDrag(i,t.clientX,t.clientY);e.preventDefault();}
function startDrag(i,cx,cy){dragging=true;dragStrip=i;dragSX=cx;dragSY=cy;const s=cur().strips[i];dragPX0=s.px;dragPY0=s.py;document.getElementById(`strip-${i}`).style.cursor='grabbing';}
document.addEventListener('mousemove',e=>{if(dragging)doMove(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(dragging){doMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
function doMove(cx,cy){
  const p=cur();if(!p)return;
  const{w,h}=posterSize();const n=p.layout||5;const sh=h/n;
  const s=p.strips[dragStrip];
  s.px=Math.max(0,Math.min(100,dragPX0-(cx-dragSX)/(w*(s.zoom||1))*100));
  s.py=Math.max(0,Math.min(100,dragPY0-(cy-dragSY)/(sh*(s.zoom||1))*100));
  applyTransform(dragStrip,s);
  updSlider('sl-px','v-px',Math.round(s.px),'%');
  updSlider('sl-py','v-py',Math.round(s.py),'%');

async function setStyle(key,val){
  const p=cur();if(!p)return;
  if(!p.style)p.style=defStyle();
  p.style[key]=val;

  const n=p.layout||5;

}
function updTxtStyle(i){
  const p=cur();if(!p)return;
  const st=p.style||defStyle();
  const sb=document.getElementById(`sb-${i}`);
  const se=document.getElementById(`se-${i}`);
  const sz=document.getElementById(`sz-${i}`);

  if(se){se.style.fontFamily=`'${st.enFont}',serif`;se.style.fontSize=st.enSize+'px';se.style.fontWeight=st.enWeight||'600';se.style.color=st.enColor;}

}
function overlayBg(s){
  const o=(s.opacity??75)/100;
  const w=(s.overlayWidth??58)/100;
  const c=s.overlayColor||'#000000';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  const p1=Math.round((1-w)*100),p2=Math.round((1-w*0.5)*100);
  return `linear-gradient(to right,rgba(${r},${g},${b},0) 0%,rgba(${r},${g},${b},${(o*0.2).toFixed(2)}) ${p1}%,rgba(${r},${g},${b},${(o*0.8).toFixed(2)}) ${p2}%,rgba(${r},${g},${b},${o.toFixed(2)}) 100%)`;
}

async function exportPNG(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('export-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600,n=p.layout||5;
  const SH=Math.round(H/n);
  const st=p.style||defStyle();
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // 预加载所有图片
  const urls=await Promise.all(p.strips.slice(0,n).map(s=>getImgURL(s.imgKey)));
  function loadImg(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}
  const imgs=await Promise.all(urls.map(loadImg));

  for(let i=0;i<n;i++){
    const s=p.strips[i];
    const y=i*SH;
    const img=imgs[i];
    if(img){
      const zoom=s.zoom||1;
      const nW=img.naturalWidth,nH=img.naturalHeight;
      const baseScale=Math.max(W/nW,SH/nH)*zoom;
      const rW=nW*baseScale,rH=nH*baseScale;
      const left=(s.px/100)*(W-rW);
      const top=(s.py/100)*(SH-rH);
      ctx.save();ctx.beginPath();ctx.rect(0,y,W,SH);ctx.clip();
      ctx.drawImage(img,left,y+top,rW,rH);
      ctx.restore();
    }

    const o=(s.opacity??75)/100;
    const ow=(s.overlayWidth??58)/100;
    const oc=s.overlayColor||'#000000';
    const cr=parseInt(oc.slice(1,3),16),cg=parseInt(oc.slice(3,5),16),cb=parseInt(oc.slice(5,7),16);
    const grad=ctx.createLinearGradient(0,y,W,y);
    grad.addColorStop(0,`rgba(${cr},${cg},${cb},0)`);
    grad.addColorStop(1-ow,`rgba(${cr},${cg},${cb},${(o*0.2).toFixed(2)})`);
    grad.addColorStop(1-ow*0.5,`rgba(${cr},${cg},${cb},${(o*0.8).toFixed(2)})`);
    grad.addColorStop(1,`rgba(${cr},${cg},${cb},${o.toFixed(2)})`);
    ctx.fillStyle=grad;ctx.fillRect(0,y,W,SH);
    if(i<n-1){ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y+SH);ctx.lineTo(W,y+SH);ctx.stroke();}

    // Text
    const align=s.textAlign||'right';
    ctx.textAlign=align;
    const textRight=(s.textRight||5)/100*W;
    const textTop=(s.textTop||50)/100*SH+y;
    const bSz=st.brandSize||9;
    const eSz=st.enSize||22;
    const zSz=st.zhSize||19;
    const totalH=bSz+eSz+zSz+16;
    const startY=textTop-totalH/2;
    const tx=align==='right'?W-textRight:align==='left'?textRight:W/2;

    ctx.font=`${st.brandWeight||300} ${bSz}px "${st.brandFont||'Cormorant Garamond'}",serif`;
    ctx.fillStyle=st.brandColor||'rgba(255,255,255,0.55)';
    ctx.fillText(s.brand,tx,startY+bSz);

    ctx.font=`${st.enWeight||600} ${eSz}px "${st.enFont||'Cormorant Garamond'}",serif`;
    ctx.fillStyle=st.enColor||'#ffffff';
    ctx.fillText(s.en,tx,startY+bSz+eSz+6);

    ctx.font=`${st.zhWeight||300} ${zSz}px "${st.zhFont||'Noto Serif SC'}","STSong",serif`;
    ctx.fillStyle=st.zhColor||'#ffffff';
    ctx.fillText(`「${s.zh}」`,tx,startY+bSz+eSz+zSz+14);
  }

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.download=(p.name||'poster')+`_${n}块_1200x1600.png`;
    a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    btn.textContent='↓ 导出 PNG';btn.disabled=false;
  },'image/png');
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(curId)renderPoster();});
openDB().then(async()=>{await loadAll();renderProjList();});
</script>
