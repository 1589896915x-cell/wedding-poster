<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0e0e0e;color:#fff;height:100vh;overflow:hidden;display:flex;padding-top:40px;}
.psb{width:186px;flex-shrink:0;background:#161616;border-right:1px solid #222;display:flex;flex-direction:column;}
.psb-head{padding:12px 12px 8px;border-bottom:1px solid #222;}

.psb-new:hover{border-color:#555;color:#bbb;}
.proj-list{flex:1;overflow-y:auto;padding:4px 7px;}
.pi{padding:7px 9px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.pi:hover{background:#1c1c1c;}
.pi.on{background:#1c1c1c;border-color:#2e2e2e;}
.pi h3{font-size:11px;font-weight:400;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#666;font-size:10px;cursor:pointer;font-family:inherit;text-align:center;margin-bottom:3px;}

.mi{width:100%;padding:8px 10px;background:#111;border:1px solid #2e2e2e;border-radius:5px;color:#fff;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px;}

.ma{display:flex;gap:8px;}

.tx-edit{pointer-events:none;}

.hint{font-size:9px;color:#c8a96a;background:#1a150a;border:1px solid #3a2c0a;border-radius:4px;padding:4px 7px;margin-bottom:6px;}
</style>

<script>

async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const el=document.getElementById('wp-credits');if(el)el.textContent='测试模式';return true;}

}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ── drawTextLS + iLay ──
function drawTextLS(ctx,text,cx,y,lsEm,align){
  if(!text)return 0;ctx.textBaseline='top';
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
  return tw;
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ── IndexedDB ──
const DB='wedding-hall-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ── 字体 ──
const FONTS_ZH=['Noto Serif SC','Noto Sans SC','STSong','STKaiti','PingFang SC','Microsoft YaHei','SimHei'];
const FONTS_EN=['Cormorant Garamond','Playfair Display','EB Garamond','Italianno','Great Vibes','Dancing Script','Times New Roman','Georgia','Arial'];
const FONTS_ALL=[...FONTS_ZH,...FONTS_EN];
const WTS=[['200','极细 200'],['300','细 300'],['400','常规 400'],['500','中 500'],['700','粗 700'],['900','超粗 900']];

function defProject(){return{
  // 背景图
  imgKey:null,px:50,py:50,zoom:1,nW:0,nH:0,
  // 整体颜色（白底深字 / 暗背景图浅字 等）
  textColor:'#ffffff',
  // ─── 顶部组（截图校准） ────────────────────────────
  // 第1行 英文大字 Wedding（Playfair Display 140px 细300 字间距0 斜体）
  topEN1:'Wedding',
  topEN1Font:'Playfair Display',topEN1Size:140,topEN1Weight:'300',topEN1LS:0,topEN1Italic:true,
  // 第2行 英文小字 Banquet Hall（Great Vibes 60px 常规400 字间距0.01 不斜体）
  topEN2:'Banquet Hall',
  topEN2Font:'Great Vibes',topEN2Size:60,topEN2Weight:'400',topEN2LS:0.01,topEN2Italic:false,
  // 第3行 中文主标题（Noto Serif SC 115px 中500 字间距0.05）
  topZH1:'北京婚礼酒店',
  topZH1Font:'Noto Serif SC',topZH1Size:115,topZH1Weight:'500',topZH1LS:0.05,
  // 第4行 中文副标题（Noto Serif SC 50px 常规400 字间距0.44）
  topZH2:'繁景艺术中心',
  topZH2Font:'Noto Serif SC',topZH2Size:50,topZH2Weight:'400',topZH2LS:0.44,
  // 顶部组位置（截图：整组Y=80，参考X=1140，右对齐）
  topGroupX:1140, topGroupY:80,
  // 行间距（截图：44 / 55 / 50）
  topGap1:44, topGap2:55, topGap3:50,
  topAlign:'right',
  // ─── 底部中文（独立，截图：左对齐 Y=1288 X=106） ──
  botZH:'时尚 ｜ 匠心 ｜ 自然',
  botZHFont:'Noto Serif SC',botZHSize:50,botZHWeight:'700',botZHLS:0.05,
  botZHX:106, botZHY:1288, botZHAlign:'left',
  // ─── 底部英文（独立，截图：左对齐 Y=1331 X=0 Georgia 30px 中500 字间距0.15） ──
  botEN:'Vogue       Artisana       Natural',
  botENFont:'Georgia',botENSize:30,botENWeight:'500',botENLS:0.11,
  botENX:42, botENY:1331, botENAlign:'left',
};}

// ── 状态 ──
let projs=[],curId=null;
const imgCache={};
let _hist=[],_hIdx=-1;
let dragging=false,dragSX=0,dragSY=0,dragPX=50,dragPY=50;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const escH=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const ik=(pid)=>`hall-${pid}`;

// ── History ──
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hIdx+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hIdx=_hist.length-1;}
async function undo(){if(_hIdx<=0)return;_hIdx--;const p=JSON.parse(_hist[_hIdx]);const i=projs.findIndex(x=>x.id===p.id);if(i>=0)projs[i]=p;await dbPut('P',p);renderPoster();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

// ── Storage ──
async function loadAll(){projs=await dbAll('P');projs.sort((a,b)=>b.at-a.at);}
async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'project')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('json-fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await save(p);projs.unshift(p);renderList();openProj(p.id);}catch{alert('JSON格式错误');}fi.value='';};fi.click();}

// ── Modal ──
function openModal(){document.getElementById('m-name').value='';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('m-name').focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function createProj(){const name=document.getElementById('m-name').value.trim()||'未命名';const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject()};await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);}
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

// ── 项目列表 ──
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi${p.id===curId?' on':''}" onclick="openProj('${p.id}')">
    <h3>${escH(p.name)}</h3><div class="meta">${new Date(p.at).toLocaleDateString('zh-CN')}</div>
    <div class="pi-act">
      <button class="pb" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pb" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pb del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function openProj(id){curId=id;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;_hist=[];_hIdx=-1;renderList();renderPoster();renderRP();}
async function dupProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};const b=await dbGet('I',ik(id));if(b){const nk=ik(nid);await dbPut('I',b,nk);np.imgKey=nk;}await save(np);projs.unshift(np);renderList();}
async function delProj(id){if(!confirm('确认删除？'))return;await delImg(ik(id));await dbDel('P',id);projs=projs.filter(x=>x.id!==id);if(curId===id){curId=null;document.getElementById('poster').style.cssText='';document.getElementById('poster').innerHTML='';renderRP();}renderList();}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}

// ── 海报尺寸 ──
function pSz(){const a=document.getElementById('ca');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

// ── 颜色工具 ──
function toHex(c){if(!c)return'#000000';if(c.startsWith('#'))return c;const m=c.match(/[\d.]+/g);if(!m||m.length<3)return'#000000';return'#'+[m[0],m[1],m[2]].map(x=>Math.round(+x).toString(16).padStart(2,'0')).join('');}

let _rt=null;
function scheduleRender(){clearTimeout(_rt);_rt=setTimeout(()=>renderPoster(),100);}

// ═══ 渲染海报 ═══════════════════════════════════════════════════
async function renderPoster(){

      ${url?

        :`<div style="width:100%;height:100%;background:linear-gradient(135deg,#e8e2d8,#d8cfc0);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#a89880;gap:8px;">

          <span style="font-size:${Math.round(14*sc)}px;font-family:'Noto Sans SC',sans-serif;">点击上传背景图（建议3:4竖图）</span>

    <!-- 顶部文字组（z-index:3） -->
    <div style="position:absolute;${topAlignCSS};top:${en1Y}px;
        font-family:'${p.topEN1Font}',serif;font-size:${en1Fs}px;font-weight:${p.topEN1Weight};
        color:${p.textColor};letter-spacing:${p.topEN1LS}em;line-height:1;

        style="outline:none;cursor:text;"

        style="outline:none;cursor:text;"
        oninput="setP('topEN2',this.textContent)" onblur="setP('topEN2',this.textContent)">${escH(p.topEN2)}</span>
    </div>
    <div style="position:absolute;${topAlignCSS};top:${zh1Y}px;
        font-family:'${p.topZH1Font}',serif;font-size:${zh1Fs}px;font-weight:${p.topZH1Weight};
        color:${p.textColor};letter-spacing:${p.topZH1LS}em;margin-right:-${p.topZH1LS}em;
        line-height:1;text-align:${topTextAlign};z-index:3;white-space:nowrap;">
      <span class="tx-edit" contenteditable="true" spellcheck="false"
        style="outline:none;cursor:text;"

        font-family:'${p.topZH2Font}',serif;font-size:${zh2Fs}px;font-weight:${p.topZH2Weight};

    <div style="position:absolute;${bzAlignCSS};top:${bzY}px;

      <span class="tx-edit" contenteditable="true" spellcheck="false"
        style="outline:none;cursor:text;"

    <div style="position:absolute;${beAlignCSS};top:${beY}px;
        font-family:'${p.botENFont}',serif;font-size:${botEnFs}px;font-weight:${p.botENWeight};
        color:${p.textColor};letter-spacing:${p.botENLS}em;
        line-height:1;text-align:${beTextAlign};z-index:3;white-space:pre;">
      <span class="tx-edit" contenteditable="true" spellcheck="false"
        style="outline:none;cursor:text;"
        oninput="setP('botEN',this.textContent)" onblur="setP('botEN',this.textContent)">${escH(p.botEN)}</span>

// ── 拖拽 ──
function onMD(e){const p=cur();if(!p||!p.imgKey||e.button!==0)return;dragging=true;dragSX=e.clientX;dragSY=e.clientY;dragPX=p.px;dragPY=p.py;e.currentTarget.style.cursor='grabbing';e.preventDefault();}
function onTS(e){const p=cur();if(!p||!p.imgKey)return;dragging=true;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=p.px;dragPY=p.py;e.preventDefault();}
document.addEventListener('mousemove',async e=>{
  if(!dragging)return;const p=cur();if(!p)return;
  const{w,h}=pSz();
  p.px=Math.max(0,Math.min(100,dragPX-(e.clientX-dragSX)/w*100));
  p.py=Math.max(0,Math.min(100,dragPY-(e.clientY-dragSY)/h*100));
  const sx=document.getElementById('sl-px'),sy=document.getElementById('sl-py');
  const nx=document.getElementById('ni-px'),ny=document.getElementById('ni-py');
  if(sx)sx.value=p.px;if(sy)sy.value=p.py;if(nx)nx.value=Math.round(p.px);if(ny)ny.value=Math.round(p.py);
  renderPoster();
});
document.addEventListener('touchmove',async e=>{if(!dragging)return;const p=cur();if(!p)return;const{w,h}=pSz();p.px=Math.max(0,Math.min(100,dragPX-(e.touches[0].clientX-dragSX)/w*100));p.py=Math.max(0,Math.min(100,dragPY-(e.touches[0].clientY-dragSY)/h*100));renderPoster();},{passive:false});
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});

// ── 上传 ──
function uploadImg(){const fi=document.getElementById('fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;const img=new Image();const url=URL.createObjectURL(file);img.onload=async()=>{const key=ik(curId);await saveImg(key,file);p.imgKey=key;p.nW=img.naturalWidth;p.nH=img.naturalHeight;p.px=50;p.py=50;p.zoom=1;URL.revokeObjectURL(url);pushH();await save(p);renderPoster();renderRP();};img.src=url;fi.value='';};fi.click();}

// ── Setters ──
async function setP(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);scheduleRender();}
async function setPN(k,v){const p=cur();if(!p)return;pushH();p[k]=+v;await save(p);renderPoster();}
async function setPB(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);renderPoster();}
async function setImgP(k,v){const p=cur();if(!p)return;p[k]=+v;renderPoster();await save(p);}

// ═══ 导出 PNG 1200×1600 ═════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;
  if(!await checkQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const W=1200,H=1600;
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // 背景图
    if(p.imgKey){
      const url=await getURL(p.imgKey);
      const img=await new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=url;});
      if(img){
        const l=iLay(p.nW||img.naturalWidth,p.nH||img.naturalHeight,W,H,p.zoom,p.px,p.py);
        ctx.drawImage(img,l.left,l.top,l.width,l.height);
      } else {
        ctx.fillStyle='#f0ece6';ctx.fillRect(0,0,W,H);
      }
    } else {
      ctx.fillStyle='#f0ece6';ctx.fillRect(0,0,W,H);
    }

    // 通用：右/左/中对齐绘制
    function drawLine(text,font,size,weight,ls,italic,refX,y,align,color){
      if(!text)return;
      ctx.save();
      ctx.font=`${italic?'italic ':''}${weight} ${size}px '${font}',serif`;
      ctx.fillStyle=color;
      ctx.textBaseline='top';
      const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):size;const lsP=(ls||0)*fs;
      const chars=[...text];let tw=0;
      chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=lsP;});
      let sx;
      if(align==='right') sx=refX-tw;
      else if(align==='center') sx=W/2-tw/2;
      else sx=refX;
      chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?lsP:0);});
      ctx.restore();
    }

    // 顶部组
    {
      const y0=p.topGroupY;
      const en1Y=y0;
      const en2Y=en1Y+p.topEN1Size+p.topGap1;
      const zh1Y=en2Y+p.topEN2Size+p.topGap2;
      const zh2Y=zh1Y+p.topZH1Size+p.topGap3;
      const refX=p.topGroupX;
      const al=p.topAlign||'right';
      drawLine(p.topEN1,p.topEN1Font,p.topEN1Size,p.topEN1Weight,p.topEN1LS,p.topEN1Italic,refX,en1Y,al,p.textColor);
      drawLine(p.topEN2,p.topEN2Font,p.topEN2Size,p.topEN2Weight,p.topEN2LS,p.topEN2Italic,refX,en2Y,al,p.textColor);
      drawLine(p.topZH1,p.topZH1Font,p.topZH1Size,p.topZH1Weight,p.topZH1LS,false,refX,zh1Y,al,p.textColor);
      drawLine(p.topZH2,p.topZH2Font,p.topZH2Size,p.topZH2Weight,p.topZH2LS,false,refX,zh2Y,al,p.textColor);
    }

    // 底部组（中英文独立位置）
    {
      drawLine(p.botZH,p.botZHFont,p.botZHSize,p.botZHWeight,p.botZHLS,false,p.botZHX,p.botZHY,p.botZHAlign||'left',p.textColor);
      drawLine(p.botEN,p.botENFont,p.botENSize,p.botENWeight,p.botENLS,false,p.botENX,p.botENY,p.botENAlign||'left',p.textColor);
    }

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    },'image/png');

  }catch(err){console.error(err);alert('导出失败：'+err.message);}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}
