function drawTextLS(ctx,text,cx,y,lsEm,align){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{ctx.fillText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function drawTextLSstk(ctx,text,cx,y,lsEm,align,strokeWidth){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;ctx.lineWidth=strokeWidth;ctx.lineJoin='round';chars.forEach((c,i)=>{ctx.strokeText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function iLay(nW,nH,cW,cH,zoom,px,py){if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};}
function toHex(c){if(!c)return'#ffffff';if(c.startsWith('#'))return c;const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(m)return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');return'#ffffff';}

function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ═══ Per-line text style: ROOT SPEC ═══════════════════════════════════
// Each editable line carries: text, font, weight, italic, size, color, ls,

function defLine(text,opts){return Object.assign({
  text:text||'',font:'Noto Sans SC',weight:'400',italic:false,
  size:36,color:'#ffffff',ls:0.02,
  strokeColor:'#000000',strokeWidth:0,

const FONT_OPTS=['Noto Sans SC','Noto Serif SC','Ma Shan Zheng','ZCOOL XiaoWei','Cormorant Garamond','Dancing Script','Great Vibes','Pacifico','STSong','SimSun','Microsoft YaHei','KaiTi'];
const WEIGHT_OPTS=[['300','细 300'],['400','常规 400'],['500','中等 500'],['700','粗 700'],['900','超粗 900']];
function applyLineCSS(line,sizePx){
  const sty=[`font-family:'${line.font}',sans-serif`,`font-size:${sizePx}px`,`font-weight:${line.weight}`,`color:${line.color}`,`letter-spacing:${line.ls}em`,`line-height:1`];
  if(line.italic)sty.push('font-style:italic');
  if(line.strokeWidth>0)sty.push(`-webkit-text-stroke:${line.strokeWidth}px ${line.strokeColor}`);
  if(line.glowBlur>0)sty.push(`text-shadow:0 0 ${line.glowBlur}px ${line.glowColor},0 0 ${line.glowBlur*1.6}px ${line.glowColor}`);
  return sty.join(';');
}
function canvasDrawLine(ctx,line,cx,y,sizePx){
  if(!line.text)return;
  const styleStr=line.italic?'italic ':'';
  ctx.font=`${styleStr}${line.weight} ${sizePx}px '${line.font}',sans-serif`;
  if(line.glowBlur>0){ctx.shadowColor=line.glowColor;ctx.shadowBlur=line.glowBlur*(sizePx/line.size||1);ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;}else{ctx.shadowBlur=0;}
  if(line.strokeWidth>0){ctx.strokeStyle=line.strokeColor;drawTextLSstk(ctx,line.text,cx,y,line.ls,'center',line.strokeWidth*2*(sizePx/line.size||1));}
  ctx.fillStyle=line.color;
  drawTextLS(ctx,line.text,cx,y,line.ls,'center');
  ctx.shadowBlur=0;
}

// Cute SVG five-pointed star — rounded with Q-curves at all 10 vertices, dual highlights
const STAR_PATH='M 56.91 16.13 L 61.52 21.54 Q 66.46 27.35 73.50 30.25 L 80.08 32.96 Q 89.94 37.02 84.35 46.11 L 80.62 52.16 Q 76.63 58.65 76.05 66.25 L 75.50 73.34 Q 74.69 83.98 64.32 81.47 L 57.41 79.79 Q 50.00 78.00 42.59 79.79 L 35.68 81.47 Q 25.31 83.98 24.50 73.34 L 23.95 66.25 Q 23.37 58.65 19.38 52.16 L 15.65 46.11 Q 10.06 37.02 19.92 32.96 L 26.50 30.25 Q 33.54 27.35 38.48 21.54 L 43.09 16.13 Q 50.00 8.00 56.91 16.13 Z';
const STAR_CHAR_MAP={emoji_star:'⭐',unicode_star:'★',unicode_outline:'☆',emoji_sparkle:'✨',emoji_glow:'🌟',emoji_flower:'🌸'};
function cuteStarSVG(size,fillColor){
  const sz=Math.round(size);
  return `<svg viewBox="0 0 100 100" width="${sz}" height="${sz}" style="display:inline-block;vertical-align:middle;flex-shrink:0;">
    <path d="${STAR_PATH}" fill="${fillColor||'#FFD700'}" stroke="rgba(120,80,20,0.45)" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="38" cy="36" rx="7" ry="4" fill="rgba(255,255,255,0.85)" transform="rotate(-22 38 36)"/>
    <circle cx="62" cy="58" r="2.5" fill="rgba(255,255,255,0.55)"/>
  </svg>`;
}
// Canvas: traverse the same Q-curves to draw a matching path
function canvasDrawCuteStar(ctx,cx,cy,size,fillColor){
  const sc=size/100;
  const ox=cx-size/2,oy=cy-size/2;
  // segments parsed from STAR_PATH (M then 10 × {L Q})
  const M=[56.91,16.13];
  const segs=[
    [[61.52,21.54],[66.46,27.35],[73.50,30.25]],
    [[80.08,32.96],[89.94,37.02],[84.35,46.11]],
    [[80.62,52.16],[76.63,58.65],[76.05,66.25]],
    [[75.50,73.34],[74.69,83.98],[64.32,81.47]],
    [[57.41,79.79],[50.00,78.00],[42.59,79.79]],
    [[35.68,81.47],[25.31,83.98],[24.50,73.34]],
    [[23.95,66.25],[23.37,58.65],[19.38,52.16]],
    [[15.65,46.11],[10.06,37.02],[19.92,32.96]],
    [[26.50,30.25],[33.54,27.35],[38.48,21.54]],
    [[43.09,16.13],[50.00, 8.00],[56.91,16.13]],
  ];
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox+M[0]*sc,oy+M[1]*sc);
  segs.forEach(([L,Qc,Qe])=>{
    ctx.lineTo(ox+L[0]*sc,oy+L[1]*sc);
    ctx.quadraticCurveTo(ox+Qc[0]*sc,oy+Qc[1]*sc,ox+Qe[0]*sc,oy+Qe[1]*sc);
  });
  ctx.closePath();
  ctx.fillStyle=fillColor||'#FFD700';
  ctx.fill();
  ctx.lineJoin='round';
  ctx.lineWidth=3*sc;
  ctx.strokeStyle='rgba(120,80,20,0.45)';
  ctx.stroke();
  // Big highlight ellipse (rotated -22°)
  ctx.translate(ox+38*sc,oy+36*sc);
  ctx.rotate(-22*Math.PI/180);
  ctx.beginPath();
  ctx.ellipse(0,0,7*sc,4*sc,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fill();
  ctx.restore();
  // Small highlight dot
  ctx.save();
  ctx.beginPath();
  ctx.arc(ox+62*sc,oy+58*sc,2.5*sc,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fill();
  ctx.restore();
}

function renderList(){const el=document.getElementById('pl');if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px;">暂无项目</div>';return;}el.innerHTML=projs.map(p=>`<div class="pi${p.id===curId?' on':''}" onclick="openProj('${p.id}')"><h3>${esc(p.name)}</h3><div class="mt">${new Date(p.at).toLocaleDateString('zh-CN')}</div><div class="pa"><button class="pb2" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button><button class="pb2" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button><button class="pb2 del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button></div></div>`).join('');}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function openProj(id){curId=id;const p=cur();if(!p)return;document.getElementById('pname').value=p.name;_hist=[];_hi=-1;renderList();await render();renderRP();}
async function dupProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};for(const s of['top','bot']){const b=await dbGet('I',ik(id,s));if(b){await dbPut('I',b,ik(nid,s));np[s+'Img'].imgKey=ik(nid,s);}}await save(np);projs.unshift(np);renderList();}
async function delProj(id){if(!confirm('确认删除？'))return;for(const s of['top','bot'])await delImg(ik(id,s));await dbDel('P',id);projs=projs.filter(p=>p.id!==id);if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}renderList();}
async function onNC(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
function pSz(){const a=document.getElementById('ca');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

async function render(){
  const poster=document.getElementById('poster');const p=cur();if(!p){poster.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  poster.style.cssText=`width:${w}px;height:${h}px;background:#111;position:relative;overflow:hidden;flex-shrink:0;box-shadow:0 20px 60px rgba(0,0,0,.6);`;
  const split=Math.round(p.split*sc),gap=Math.round((p.gap||0)*sc),botY=split+gap;
  const topURL=await getURL(p.topImg.imgKey),botURL=await getURL(p.botImg.imgKey);
  const ti=p.topImg,bi=p.botImg;
  const tl=topURL?iLay(ti.nW,ti.nH,w,split,ti.zoom,ti.px,ti.py):{left:0,top:0,width:w,height:split};
  const bl=botURL?iLay(bi.nW,bi.nH,w,h-botY,bi.zoom,bi.px,bi.py):{left:0,top:0,width:w,height:h-botY};
  const oH=Math.round(p.overlayH*sc);
  const oY=split-oH/2+Math.round((p.overlayOffY||0)*sc);
  let html=`
    <div id="slot-top" data-s="top" style="position:absolute;left:0;top:0;width:${w}px;height:${split}px;overflow:hidden;cursor:${topURL?'grab':'pointer'};">
      ${topURL?`<img id="img-top" src="${topURL}" draggable="false" style="position:absolute;left:${tl.left}px;top:${tl.top}px;width:${tl.width}px;height:${tl.height}px;pointer-events:none;">`:`<div onclick="uploadImg('top')" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a2a1a;color:#555;flex-direction:column;gap:8px;cursor:pointer;"><span style="font-size:28px;opacity:.5;">＋</span><span style="font-size:10px;">上传顶部图片</span></div>`}
    </div>
    <div id="slot-bot" data-s="bot" style="position:absolute;left:0;top:${botY}px;width:${w}px;height:${h-botY}px;overflow:hidden;cursor:${botURL?'grab':'pointer'};">
      ${botURL?`<img id="img-bot" src="${botURL}" draggable="false" style="position:absolute;left:${bl.left}px;top:${bl.top}px;width:${bl.width}px;height:${bl.height}px;pointer-events:none;">`:`<div onclick="uploadImg('bot')" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a2a1a;color:#555;flex-direction:column;gap:8px;cursor:pointer;"><span style="font-size:28px;opacity:.5;">＋</span><span style="font-size:10px;">上传底部图片</span></div>`}
    </div>`;
  const bgStyle=p.overlayBgEnabled?`background:${p.overlayBg||'rgba(0,0,0,0.25)'};`:'';
  html+=`<div style="position:absolute;left:0;top:${oY}px;width:100%;height:${oH}px;${bgStyle}display:flex;flex-direction:column;align-items:center;justify-content:center;gap:${Math.round((p.gap2||14)*sc)}px;pointer-events:none;">`;
  html+=`<div contenteditable="true" spellcheck="false" style="${applyLineCSS(p.scriptLine,Math.round(p.scriptLine.size*sc))};line-height:1;outline:none;cursor:text;pointer-events:auto;text-align:center;" oninput="setLineText('scriptLine',this.textContent)" onblur="setLineText('scriptLine',this.textContent)">${esc(p.scriptLine.text)}</div>`;
  html+=`<div contenteditable="true" spellcheck="false" style="${applyLineCSS(p.titleLine,Math.round(p.titleLine.size*sc))};line-height:1.3;outline:none;cursor:text;pointer-events:auto;text-align:center;padding:0 ${Math.round(24*sc)}px;white-space:pre-wrap;" oninput="setLineText('titleLine',this.textContent)" onblur="setLineText('titleLine',this.textContent)">${esc(p.titleLine.text)}</div>`;
  if(p.showRating){
    const nStars=Math.max(1,Math.min(7,p.stars||5));
    const starSz=Math.round((p.starSize||45)*sc);
    const ss=p.starStyle||'cute';
    html+=`<div style="display:flex;align-items:center;justify-content:center;gap:${Math.round(8*sc)}px;flex-wrap:wrap;">`;
    html+=`<span contenteditable="true" spellcheck="false" style="${applyLineCSS(p.ratingLine,Math.round(p.ratingLine.size*sc))};outline:none;cursor:text;pointer-events:auto;" oninput="setLineText('ratingLine',this.textContent)">${esc(p.ratingLine.text)}</span>`;
    if(ss==='cute'){
      let svgHTML='<span style="display:inline-flex;align-items:center;gap:'+Math.round(4*sc)+'px;">';
      for(let i=0;i<nStars;i++)svgHTML+=cuteStarSVG(starSz,p.starColor||'#FFD700');
      svgHTML+='</span>';
      html+=svgHTML;
    }else{
      const ch=STAR_CHAR_MAP[ss]||'⭐';
      const stars=ch.repeat(nStars);
      html+=`<span style="font-size:${starSz}px;color:${p.starColor||'#FFD700'};letter-spacing:2px;line-height:1;${p.ratingLine.glowBlur>0?`text-shadow:0 0 ${p.ratingLine.glowBlur}px ${p.ratingLine.glowColor};`:''}">${stars}</span>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  poster.innerHTML=html;
  ['top','bot'].forEach(s=>{const el=document.getElementById(`slot-${s}`);if(el){el.addEventListener('mousedown',onMD);el.addEventListener('touchstart',onTS,{passive:false});}});
}

function onMD(e){const s=this.dataset.s;const p=cur();const img=p?p[s+'Img']:null;if(!img||!img.imgKey||e.button!==0||e.target.contentEditable==='true')return;dragging=true;dragSlot=s;dragSX=e.clientX;dragSY=e.clientY;dragPX=img.px;dragPY=img.py;this.style.cursor='grabbing';e.preventDefault();}
function onTS(e){const s=this.dataset.s;const p=cur();const img=p?p[s+'Img']:null;if(!img||!img.imgKey||e.target.contentEditable==='true')return;dragging=true;dragSlot=s;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=img.px;dragPY=img.py;e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!dragging)return;moveDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(!dragging)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
function moveDrag(cx,cy){const p=cur();if(!p)return;const img=p[dragSlot+'Img'];const{w,h}=pSz();const sc=w/1200;const split=Math.round(p.split*sc);const bH=dragSlot==='top'?split:h-split;img.px=Math.max(0,Math.min(100,dragPX-(cx-dragSX)/(w*(img.zoom||1))*100));img.py=Math.max(0,Math.min(100,dragPY-(cy-dragSY)/(bH*(img.zoom||1))*100));const el=document.getElementById(`img-${dragSlot}`);if(el){const l=iLay(img.nW,img.nH,w,bH,img.zoom,img.px,img.py);el.style.left=l.left+'px';el.style.top=l.top+'px';el.style.width=l.width+'px';el.style.height=l.height+'px';}}
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const el=document.getElementById(`slot-${dragSlot}`);if(el)el.style.cursor='grab';const p=cur();if(p){pushH();await save(p);}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});
function uploadImg(slot){const fi=document.getElementById('fi');fi.onchange=async e=>{const f=e.target.files[0];if(!f)return;const p=cur();if(!p)return;const img=new Image();const url=URL.createObjectURL(f);img.onload=async()=>{const key=ik(curId,slot);await saveImg(key,f);p[slot+'Img']={imgKey:key,px:50,py:50,zoom:1,nW:img.naturalWidth,nH:img.naturalHeight};URL.revokeObjectURL(url);pushH();await save(p);await render();renderRP();};img.src=url;fi.value='';};fi.click();}

async function setP(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);await render();renderRP();}
async function setPN(k,v){const p=cur();if(!p)return;pushH();p[k]=+v;await save(p);await render();}
async function setLineText(lineKey,v){const p=cur();if(!p)return;pushH();p[lineKey].text=v;await save(p);}
async function setLineProp(lineKey,k,v){const p=cur();if(!p)return;pushH();p[lineKey][k]=v;await save(p);await render();}
async function setLinePropN(lineKey,k,v){const p=cur();if(!p)return;pushH();p[lineKey][k]=+v;await save(p);await render();}
async function setImgP(slot,k,v){const p=cur();if(!p)return;p[slot+'Img'][k]=+v;const{w,h}=pSz();const sc=w/1200;const split=Math.round(p.split*sc);const bH=slot==='top'?split:h-split;const img=p[slot+'Img'];const el=document.getElementById(`img-${slot}`);if(el){const l=iLay(img.nW,img.nH,w,bH,img.zoom,img.px,img.py);el.style.left=l.left+'px';el.style.top=l.top+'px';el.style.width=l.width+'px';el.style.height=l.height+'px';}await save(p);}

async function doExport(){
  const p=cur();if(!p)return;if(!await checkQuota())return;
  const btn=document.getElementById('xbtn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const W=1200,H=1600;const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
    const split=p.split,gap=p.gap||0,botY=split+gap;
    async function loadImg(key){const url=await getURL(key);if(!url)return null;return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=url;});}
    const ti=await loadImg(p.topImg.imgKey),bi=await loadImg(p.botImg.imgKey);
    if(ti){ctx.save();ctx.beginPath();ctx.rect(0,0,W,split);ctx.clip();const l=iLay(p.topImg.nW||ti.naturalWidth,p.topImg.nH||ti.naturalHeight,W,split,p.topImg.zoom,p.topImg.px,p.topImg.py);ctx.drawImage(ti,l.left,l.top,l.width,l.height);ctx.restore();}
    if(bi){ctx.save();ctx.beginPath();ctx.rect(0,botY,W,H-botY);ctx.clip();const l=iLay(p.botImg.nW||bi.naturalWidth,p.botImg.nH||bi.naturalHeight,W,H-botY,p.botImg.zoom,p.botImg.px,p.botImg.py);ctx.drawImage(bi,l.left,botY+l.top,l.width,l.height);ctx.restore();}
    const oH=p.overlayH,oY=split-oH/2+(p.overlayOffY||0);
    if(p.overlayBgEnabled){const bgStr=p.overlayBg||'rgba(0,0,0,0.25)';const m=bgStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);if(m){ctx.save();ctx.globalAlpha=m[4]!==undefined?parseFloat(m[4]):1;ctx.fillStyle=`rgb(${m[1]},${m[2]},${m[3]})`;ctx.fillRect(0,oY,W,oH);ctx.restore();}}
    const ln1=p.scriptLine,ln2=p.titleLine,ln3=p.ratingLine;
    const lines2=(ln2.text||'').split('\n');const h2=ln2.size*1.3*lines2.length;
    const h1=ln1.size;
    const h3=p.showRating?Math.max(ln3.size,p.starSize||45)*1.2:0;
    const gap2=p.gap2||14;
    const totalH=h1+gap2+h2+(p.showRating?gap2+h3:0);
    let curY=oY+(oH-totalH)/2;
    canvasDrawLine(ctx,ln1,W/2,curY,ln1.size);
    curY+=h1+gap2;
    // title preview line-height:1.3 → each line text top = lineBoxTop + 0.15*size
    lines2.forEach((line,li)=>{const ln={...ln2,text:line};canvasDrawLine(ctx,ln,W/2,curY+li*ln2.size*1.3+ln2.size*0.15,ln2.size);});
    curY+=h2;
    if(p.showRating){
      curY+=gap2;
      ctx.save();
      ctx.font=`${ln3.italic?'italic ':''}${ln3.weight} ${ln3.size}px '${ln3.font}',sans-serif`;
      const textM=ctx.measureText(ln3.text);
      const nStars=Math.max(1,Math.min(7,p.stars||5));
      const starSz=p.starSize||45;
      const ss=p.starStyle||'cute';
      const isCute=ss==='cute';
      let starsW;
      let starsChar='';
      if(isCute){
        starsW=nStars*starSz+(nStars-1)*4;
      }else{
        starsChar=(STAR_CHAR_MAP[ss]||'⭐').repeat(nStars);
        ctx.font=`${starSz}px sans-serif`;
        starsW=ctx.measureText(starsChar).width;
      }
      const totalW=textM.width+8+starsW;
      const xStart=W/2-totalW/2;
      const ln3T={...ln3};
      canvasDrawLine(ctx,ln3T,xStart+textM.width/2,curY,ln3.size);
      const starsY=curY+(ln3.size-starSz)/2;
      if(isCute){
        let sx=xStart+textM.width+8;
        for(let i=0;i<nStars;i++){
          canvasDrawCuteStar(ctx,sx+starSz/2,starsY+starSz/2,starSz,p.starColor||'#FFD700');
          sx+=starSz+4;
        }
      }else{
        ctx.font=`${starSz}px sans-serif`;
        ctx.fillStyle=p.starColor||'#FFD700';
        if(ln3.glowBlur>0){ctx.shadowColor=ln3.glowColor;ctx.shadowBlur=ln3.glowBlur;}
        ctx.textBaseline='top';ctx.textAlign='left';
        ctx.fillText(starsChar,xStart+textM.width+8,starsY);
        ctx.shadowBlur=0;
      }
      ctx.restore();
    }
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}
window.addEventListener('resize',()=>{if(curId)render();});
(async()=>{await wpCheckAuth();await openDB();await loadAll();renderList();})();
</script>
