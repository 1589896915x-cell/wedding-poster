*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0e0e0e;color:#fff;height:100vh;overflow:hidden;display:flex;padding-top:40px;}
/* ── 左侧项目栏 ── */
.psb{width:186px;flex-shrink:0;background:#161616;border-right:1px solid #222;display:flex;flex-direction:column;}
.psb-head{padding:12px 12px 8px;border-bottom:1px solid #222;}

.psb-head p{font-size:9px;color:#444;margin-top:2px;}
.psb-new{margin:8px 10px;padding:6px;background:#1c1c1c;border:1px dashed #2e2e2e;border-radius:5px;color:#666;font-size:10px;cursor:pointer;text-align:center;}
.psb-new:hover{border-color:#555;color:#bbb;}
.proj-list{flex:1;overflow-y:auto;padding:4px 7px;}
.pi{padding:7px 9px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.pi:hover{background:#1c1c1c;}
.pi.on{background:#1c1c1c;border-color:#2e2e2e;}
.pi h3{font-size:11px;font-weight:400;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi .meta{font-size:9px;color:#444;margin-top:2px;}
.pi-act{display:flex;gap:3px;margin-top:4px;}
.pb{padding:2px 6px;background:none;border:1px solid #222;border-radius:3px;color:#555;font-size:9px;cursor:pointer;font-family:inherit;}
.pb:hover{border-color:#555;color:#aaa;}
.pb.del:hover{border-color:#b00;color:#f44;}
/* ── 编辑区 ── */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:#161616;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:240px;}
.pname::placeholder{color:#333;}
.sp{flex:1;}
.exp-btn{padding:6px 16px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:#c8392b;color:#fff;}
.exp-btn:hover{background:#a02d22;}

.body-wrap{display:flex;flex:1;overflow:hidden;}
.ca{flex:1;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;}

.lbl{font-size:9px;color:#555;margin-bottom:2px;margin-top:6px;}
.fi{width:100%;padding:5px 7px;background:#111;border:1px solid #222;border-radius:4px;color:#ccc;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}

// ═══ drawTextLS + iLay ═══════════════════════════════════════════
function drawTextLS(ctx,text,cx,y,lsEm,align){
  if(!text)return 0;ctx.textBaseline='top';
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
  return tw;
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ═══ IndexedDB ═══════════════════════════════════════════════════
const DB='wedding-venuetable-v1';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

function hexToRgb(h){const hex=(h||'#000').replace('#','');return{r:parseInt(hex.slice(0,2),16)||0,g:parseInt(hex.slice(2,4),16)||0,b:parseInt(hex.slice(4,6),16)||0};}

// ═══ 布局计算 ════════════════════════════════════════════════════
// 根据厅数和内容动态算行高
function calcRowH(p,sc){
  // 行高 = 最多行数的文字高度 + 上下padding
  const tableLines=3;  // 桌数一般3行
  const descLines=3;   // 描述一般3行
  const maxLines=Math.max(tableLines,descLines);
  const descFs=Math.round(p.descSize*sc);
  const descLH=p.descLineH||1.7;
  return Math.round(p.rowPadY*2*sc) + Math.round(maxLines*descFs*descLH);
}

// 列X坐标（1200基准）
function calcCols(p){
  const mx=p.marginX||52;
  const totalW=1200-mx*2; // 1096
  const g=p.colGap||16;
  const c1=p.col1W||250;
  const c2=p.col2W||230;
  const c3=p.col3W||330;
  const c4=totalW-c1-c2-c3-g*3;
  return{
    x1:mx,                        // 场地名起点
    x2:mx+c1+g,                   // 桌数起点
    x3:mx+c1+g+c2+g,              // 介绍起点
    x4:mx+c1+g+c2+g+c3+g,         // 图片起点
    w1:c1,w2:c2,w3:c3,w4:Math.max(c4,100),
  };
}

// ═══ 拖拽（图片内部裁切） ════════════════════════════════════════
function onMD(e,vi){const p=cur();const v=p?.venues[vi];if(!v||!v.imgKey||e.button!==0)return;dragging=true;dragV=vi;dragSX=e.clientX;dragSY=e.clientY;dragPX=v.px;dragPY=v.py;e.currentTarget.style.cursor='grabbing';if(selVenue!==vi){selVenue=vi;renderRP();}e.preventDefault();}
function onTS(e,vi){const p=cur();const v=p?.venues[vi];if(!v||!v.imgKey)return;dragging=true;dragV=vi;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=v.px;dragPY=v.py;if(selVenue!==vi){selVenue=vi;renderRP();}e.preventDefault();}
document.addEventListener('mousemove',async e=>{
  if(!dragging)return;const p=cur();if(!p)return;
  const v=p.venues[dragV];
  const{w}=pSz();const sc=w/1200;
  const cols=calcCols(p);
  const _autoImgW=Math.round(cols.w4*sc);
  const imgW=p.imgW&&p.imgW>0?Math.round(p.imgW*sc):_autoImgW;
  const imgH=p.imgH&&p.imgH>0?Math.round(p.imgH*sc):_autoImgW*0.65;
  v.px=Math.max(0,Math.min(100,dragPX-(e.clientX-dragSX)/imgW*100));
  v.py=Math.max(0,Math.min(100,dragPY-(e.clientY-dragSY)/imgH*100));
  const sx=document.getElementById('sl-vpx'),sy=document.getElementById('sl-vpy');
  const nx=document.getElementById('ni-vpx'),ny=document.getElementById('ni-vpy');
  if(sx)sx.value=v.px;if(sy)sy.value=v.py;if(nx)nx.value=Math.round(v.px);if(ny)ny.value=Math.round(v.py);
  renderPoster();
});
document.addEventListener('touchmove',async e=>{if(!dragging)return;const p=cur();if(!p)return;const{w}=pSz();const sc=w/1200;const cols=calcCols(p);const imgW=Math.round(cols.w4*sc);const v=p.venues[dragV];v.px=Math.max(0,Math.min(100,dragPX-(e.touches[0].clientX-dragSX)/imgW*100));v.py=Math.max(0,Math.min(100,dragPY-(e.touches[0].clientY-dragSX)/imgW*100));renderPoster();},{passive:false});

document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});

// ═══ 上传图片 ════════════════════════════════════════════════════
function uploadImg(vi){const fi=document.getElementById('fi');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;const img=new Image();const url=URL.createObjectURL(file);img.onload=async()=>{const key=ik(curId,vi);await saveImg(key,file);const v=p.venues[vi];v.imgKey=key;v.nW=img.naturalWidth;v.nH=img.naturalHeight;v.px=50;v.py=50;v.zoom=1;URL.revokeObjectURL(url);pushH();await save(p);renderPoster();renderRP();};img.src=url;fi.value='';};fi.click();}

// ═══ Setters ════════════════════════════════════════════════════
async function setP(k,v){const p=cur();if(!p)return;pushH();p[k]=v;await save(p);scheduleRender();}
async function setPN(k,v){const p=cur();if(!p)return;pushH();p[k]=+v;await save(p);renderPoster();}
async function setVP(vi,k,v){const p=cur();if(!p)return;pushH();p.venues[vi][k]=v;await save(p);}
async function setVPDesc(vi,field,el){const p=cur();if(!p)return;pushH();const raw=el.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');p.venues[vi][field]=raw;await save(p);}
async function setVPTA(vi,field,val){const p=cur();if(!p)return;pushH();p.venues[vi][field]=val;await save(p);scheduleRender();}
async function setImgP(k,v){const p=cur();if(!p)return;p.venues[selVenue][k]=+v;renderPoster();await save(p);}
async function setVenueCount(n){
  const p=cur();if(!p)return;pushH();p.venueCount=n;
  // 切换厅数时同步布局默认值
  const LD=LAYOUT_DEFAULTS[n]||LAYOUT_DEFAULTS[6];
  p.rowPadY=LD.rowPadY;p.col1W=LD.col1W;p.col2W=LD.col2W;p.col3W=LD.col3W;
  p.zhSize=LD.zhSize;p.enSize=LD.enSize;p.tableSize=LD.tableSize;p.descSize=LD.descSize;
  p.headerY=LD.headerY;p.headerH2=LD.headerH2;
  p.imgW=LD.imgW||0;p.imgH=LD.imgH||0;p.imgOffsetX=LD.imgOffsetX||0;p.imgOffsetY=LD.imgOffsetY||0;
  await save(p);renderPoster();renderRP();
}
function selV(i){selVenue=i;renderRP();}

// ═══ 导出 PNG 1200×1600 ══════════════════════════════════════════
async function doExport(){
  const p=cur();if(!p)return;
  if(!await checkQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const W=1200,H=1600;
    const cnt=p.venueCount||6;
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // 背景
    ctx.fillStyle=p.bgColor||'#ffffff';ctx.fillRect(0,0,W,H);

    async function loadImgEl(key){const url=await getURL(key);if(!url)return null;return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}

    const mx=p.marginX||52;
    const totalW=W-mx*2;
    const cols=calcCols(p);

    // ── 中文主标题 ──
    ctx.save();
    ctx.font=`${p.mainTitleWeight} ${p.mainTitleSize}px '${p.mainTitleFont}',serif`;
    ctx.fillStyle=p.mainTitleColor;
    ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=4;
    drawTextLS(ctx,p.mainTitleZH||'',p.mainTitleX,p.mainTitleY,p.mainTitleLS||0.02,'left');
    ctx.shadowBlur=0;ctx.restore();

    // ── 英文副标题（右上角，多行） ──
    {
      const lines=(p.mainTitleEN||'').split('\n');
      const fs=p.mainTitleENSize;const lh=fs*1.2;
      ctx.save();
      ctx.font=`${p.mainTitleENWeight} ${fs}px '${p.mainTitleENFont}',serif`;
      ctx.fillStyle=p.mainTitleENColor;
      ctx.textBaseline='top';
      lines.forEach((line,li)=>{
        const lw=drawTextLS(ctx,'',W-mx,p.mainTitleENY+li*lh,p.mainTitleENLS||0.08,'right');
        // 右对齐
        const m=ctx.font.match(/([\d.]+)px/);const fss=m?parseFloat(m[1]):fs;const ls=(p.mainTitleENLS||0.08)*fss;
        const chars=[...line];let tw=0;
        chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
        let sx=W-mx-tw;
        chars.forEach((ch,i)=>{ctx.fillText(ch,sx,p.mainTitleENY+li*lh);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
      });
      ctx.restore();
    }

    // ── 表头 ──
    const hY=p.headerY,hH=p.headerH2;
    const hlt=p.headerLineThick||2;
    ctx.fillStyle=p.headerLineColor||'#1a1a1a';
    ctx.fillRect(mx,hY,totalW,hlt);
    // 表头标签
    const hlfs=p.headerLabelSize;
    ctx.save();
    ctx.font=`${p.headerLabelWeight} ${hlfs}px '${p.headerLabelFont}',sans-serif`;
    ctx.fillStyle=p.headerLabelColor;
    const labelY=hY+hlt+(hH-hlt-hlfs)/2;
    drawTextLS(ctx,'场地',cols.x1,labelY,p.headerLabelLS||0.05,'left');
    drawTextLS(ctx,'桌数｜面积',cols.x2,labelY,p.headerLabelLS||0.05,'left');
    drawTextLS(ctx,'宴会厅介绍',cols.x3,labelY,p.headerLabelLS||0.05,'left');
    drawTextLS(ctx,'现场图片',cols.x4,labelY,p.headerLabelLS||0.05,'left');
    ctx.restore();
    ctx.fillStyle=p.headerLineColor||'#1a1a1a';
    ctx.fillRect(mx,hY+hH,totalW,hlt);

    // ── 各厅行 ──
    let vY=hY+hH+hlt;
    const rowPadY=p.rowPadY||28;
    const zhFs=p.zhSize,enFs=p.enSize,tableFs=p.tableSize,descFs=p.descSize;
    const tableLH=p.tableLineH||1.7;
    const descLH=p.descLineH||1.7;
    const lineRlt=p.rowLineThick||1;

    for(let i=0;i<cnt;i++){
      const v=p.venues[i];
      const tableLines=(v.tables||'').split('\n');
      const descLines=(v.desc||'').split('\n');
      const maxLines=Math.max(tableLines.length,descLines.length);
      const nameH=zhFs+6+enFs;
      const txtH=Math.max(nameH,Math.round(maxLines*descFs*descLH));
      const rH=txtH+rowPadY*2;
      // 图片尺寸：优先使用用户设定值，0=自动
      const imgH=p.imgH&&p.imgH>0?p.imgH:(rH-rowPadY*2);
      const imgW=p.imgW&&p.imgW>0?p.imgW:cols.w4;

      // 行分隔线
      ctx.fillStyle=p.rowLineColor||'#cccccc';
      ctx.fillRect(mx,vY,totalW,lineRlt);

      const textY=vY+rowPadY;
      const nameOffY=Math.round((txtH-nameH)/2);

      // 中文场地名
      ctx.save();
      ctx.font=`${p.zhWeight} ${zhFs}px '${p.zhFont}',serif`;
      ctx.fillStyle=p.zhColor;
      drawTextLS(ctx,v.zh||'',cols.x1,textY+nameOffY,p.zhLS||0.02,'left');
      ctx.restore();
      // 英文场地名
      ctx.save();
      ctx.font=`${p.enWeight} ${enFs}px '${p.enFont}',serif`;
      ctx.fillStyle=p.enColor;
      drawTextLS(ctx,v.en||'',cols.x1,textY+nameOffY+zhFs+6,p.enLS||0.12,'left');
      ctx.restore();

      // 桌数面积（多行，垂直居中）
      const tableBlockH=tableLines.length*tableFs*tableLH;
      const tableStartY=textY+(txtH-tableBlockH)/2;
      ctx.save();
      ctx.font=`${p.tableWeight} ${tableFs}px '${p.tableFont}',sans-serif`;
      ctx.fillStyle=p.tableColor;
      tableLines.forEach((line,li)=>{
        drawTextLS(ctx,line,cols.x2,tableStartY+li*tableFs*tableLH,p.tableLS||0.02,'left');
      });
      ctx.restore();

      // 介绍文字（多行，垂直居中）
      const descBlockH=descLines.length*descFs*descLH;
      const descStartY=textY+(txtH-descBlockH)/2;
      ctx.save();
      ctx.font=`${p.descWeight} ${descFs}px '${p.descFont}',sans-serif`;
      ctx.fillStyle=p.descColor;
      descLines.forEach((line,li)=>{
        drawTextLS(ctx,line,cols.x3,descStartY+li*descFs*descLH,p.descLS||0.02,'left');
      });
      ctx.restore();

      // 图片
      const imgEl=await loadImgEl(v.imgKey);
      ctx.save();
      ctx.beginPath();
      const imgDrawX=cols.x4+(p.imgOffsetX||0);
      const imgDrawY=textY+(p.imgOffsetY||0);
      ctx.roundRect(imgDrawX,imgDrawY,imgW,imgH,p.imgRadius||8);
      ctx.clip();
      if(imgEl){
        const l=iLay(v.nW||imgEl.naturalWidth,v.nH||imgEl.naturalHeight,imgW,imgH,v.zoom,v.px,v.py);
        ctx.drawImage(imgEl,imgDrawX+l.left,imgDrawY+l.top,l.width,l.height);
      } else {
        ctx.fillStyle='#f0ece6';ctx.fillRect(imgDrawX,imgDrawY,imgW,imgH);
        ctx.fillStyle='#b8a080';ctx.font=`400 20px 'Noto Sans SC',sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('图片',imgDrawX+imgW/2,imgDrawY+imgH/2);ctx.textAlign='left';
      }
      ctx.restore();

      // 最后一行底线
      if(i===cnt-1){
        ctx.fillStyle=p.rowLineColor||'#cccccc';
        ctx.fillRect(mx,vY+rH,totalW,lineRlt);
      }

      vY+=rH;
    }

    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    },'image/png');

  }catch(err){console.error(err);alert('导出失败：'+err.message);}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});
(async()=>{await wpCheckAuth();await openDB();await loadAll();renderList();})();
</script>
</body>
