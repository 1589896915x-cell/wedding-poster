name: Sync Templates to Supabase

on:
  push:
    branches: [main]
    paths:
      - '[0-9]*.html'
      - 'template-*.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync changed templates to Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^([0-9]+|template-.+)\.html$' || \
                    git show --name-only --format="" HEAD | grep -E '^([0-9]+|template-.+)\.html$')

          if [ -z "$CHANGED" ]; then
            echo "No template files changed."
            exit 0
          fi

          for FILE in $CHANGED; do
            if [ ! -f "$FILE" ]; then continue; fi

            RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${FILE}"
            SLUG=$(echo "$FILE" | sed 's/\.html//' | sed 's/template-//')
            NAME="模板${SLUG}"

            EXISTING=$(curl -s \
              "${SB_URL}/rest/v1/templates?url=eq.${RAW_URL}&select=id" \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}")

            EXISTING_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null)

            if [ -n "$EXISTING_ID" ]; then
              curl -s -o /dev/null -w "Updated %{http_code}\n" \
                "${SB_URL}/rest/v1/templates?id=eq.${EXISTING_ID}" \
                -X PATCH \
                -H "apikey: ${SB_KEY}" \
                -H "Authorization: Bearer ${SB_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"url\":\"${RAW_URL}\"}"
            else
              curl -s -o /dev/null -w "Created %{http_code}\n" \
                "${SB_URL}/rest/v1/templates" \
                -X POST \
                -H "apikey: ${SB_KEY}" \
                -H "Authorization: Bearer ${SB_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"name\":\"${NAME}\",\"url\":\"${RAW_URL}\",\"is_active\":true,\"sort_order\":${SLUG}}"
            fi
          done
          echo "All done."
