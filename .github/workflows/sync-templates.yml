name: Sync Templates to Supabase

on:
  push:
    branches: [main]
    paths:
      - '[0-9]*.html'
      - 'template-*.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync changed templates to Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^([0-9]+|template-.+)\.html$' || \
                    git show --name-only --format="" HEAD | grep -E '^([0-9]+|template-.+)\.html$')

          if [ -z "$CHANGED" ]; then
            echo "No template files changed."
            exit 0
          fi

          echo "Changed: $CHANGED"

          for FILE in $CHANGED; do
            if [ ! -f "$FILE" ]; then
              echo "Skipping deleted: $FILE"
              continue
            fi

            PAGES_URL="https://${GITHUB_USER}.github.io/${GITHUB_REPO_NAME}/${FILE}"
            SLUG=$(echo "$FILE" | sed 's/\.html//' | sed 's/template-//')
            NAME="模板${SLUG}"

            echo "Syncing: $FILE -> $PAGES_URL"

            EXISTING=$(curl -s \
              "${SB_URL}/rest/v1/templates?url=eq.${PAGES_URL}&select=id" \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}")

            EXISTING_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null)

            if [ -n "$EXISTING_ID" ]; then
              echo "  Updating id=$EXISTING_ID"
              curl -s -o /dev/null -w "  HTTP %{http_code}\n" \
                "${SB_URL}/rest/v1/templates?id=eq.${EXISTING_ID}" \
                -X PATCH \
                -H "apikey: ${SB_KEY}" \
                -H "Authorization: Bearer ${SB_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"url\":\"${PAGES_URL}\"}"
            else
              echo "  Creating: $NAME"
              curl -s -o /dev/null -w "  HTTP %{http_code}\n" \
                "${SB_URL}/rest/v1/templates" \
                -X POST \
                -H "apikey: ${SB_KEY}" \
                -H "Authorization: Bearer ${SB_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"name\":\"${NAME}\",\"url\":\"${PAGES_URL}\",\"is_active\":true,\"sort_order\":${SLUG}}"
            fi
          done

          echo "All done."
