name: Keep Supabase Alive

# 作用：防止 Supabase 免费版项目因「连续 7 天无数据库活动」被自动暂停。
# 原理：按计划定时对数据库发一条只读查询，每次都会重置那个 7 天计时器。

on:
  schedule:
    # 每周一、三、五 的 UTC 06:00（北京时间 14:00）各跑一次。
    # 最长间隔 3 天（周五到周一），安全低于 7 天阈值，留足缓冲。
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:   # 同时允许在 GitHub 网页 Actions 页手动点击运行（用来测试）

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          # 这是公开的 anon key（本来就嵌在前端代码里给浏览器用的），放这里没有安全风险。
          KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo"
        run: |
          echo "开始 ping Supabase，时间 $(date -u)"
          CODE=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            "https://kyemjxgdmkupfkntflzh.supabase.co/rest/v1/templates?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "HTTP 状态码：$CODE"
          echo "返回内容：$(cat /tmp/out.txt)"
          if [ "$CODE" != "200" ]; then
            echo "::error::Ping 失败，状态码 $CODE（项目可能仍处于暂停状态，请先在 Supabase 后台恢复）"
            exit 1
          fi
          echo "✅ Ping 成功，Supabase 7 天计时器已重置"
