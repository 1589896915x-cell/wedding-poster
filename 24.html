async function wpCheckAuth(){if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const e=document.getElementById('credits');if(e)e.textContent='测试模式';return true;}const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}try{const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}const lic=d[0];if((lic.credits||0)<=0||(lic.expires_at&&new Date(lic.expires_at)<new Date())){location.href='index.html';return false;}_lic=lic;updC();return true;}catch{return true;}}

function drawTextLS(ctx,text,cx,y,lsEm,align){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{ctx.fillText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function drawTextLSstk(ctx,text,cx,y,lsEm,align,strokeColor,strokeWidth){if(!text)return;ctx.textBaseline='top';const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;const chars=[...text];let tw=0;chars.forEach((c,i)=>{tw+=ctx.measureText(c).width;if(i<chars.length-1)tw+=ls;});let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;chars.forEach((c,i)=>{if(strokeColor&&strokeWidth>0){ctx.lineWidth=strokeWidth;ctx.strokeStyle=strokeColor;ctx.lineJoin='round';ctx.miterLimit=2;ctx.strokeText(c,sx,y);}ctx.fillText(c,sx,y);sx+=ctx.measureText(c).width+(i<chars.length-1?ls:0);});}
function iLay(nW,nH,cW,cH,zoom,px,py){if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};const s=Math.max(cW/nW,cH/nH)*(zoom||1);const rW=nW*s,rH=nH*s;return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};}
function toHex(c){if(!c)return'#000000';if(c.startsWith('#'))return c.length===4?'#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3]:c.slice(0,7);const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(m)return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');return'#000000';}
const FONT_OPTS=['Noto Sans SC','Noto Serif SC','Ma Shan Zheng','ZCOOL XiaoWei','Cormorant Garamond','Dancing Script','Great Vibes','Pacifico','STSong','SimSun','Microsoft YaHei','KaiTi'];
const WEIGHT_OPTS=[['300','细'],['400','常规'],['500','中等'],['700','粗'],['900','超粗']];
function defLine(text,opts){return Object.assign({text:text||'',font:'Noto Sans SC',weight:'400',italic:false,size:36,color:'#1a1a1a',ls:0.02,strokeColor:'#000000',strokeWidth:0,glowColor:'#ffffff',glowBlur:0},opts||{});}
function applyLineCSS(line,sizePx){const shadows=[];if(line.glowBlur>0&&line.glowColor)shadows.push(`0 0 ${line.glowBlur}px ${line.glowColor}`);return `font-family:'${line.font||'Noto Sans SC'}',sans-serif;font-size:${sizePx}px;line-height:1;font-weight:${line.weight||'400'};font-style:${line.italic?'italic':'normal'};color:${line.color||'#000'};letter-spacing:${line.ls||0}em;${(line.strokeWidth>0&&line.strokeColor)?`-webkit-text-stroke:${line.strokeWidth}px ${line.strokeColor};`:''}${shadows.length?`text-shadow:${shadows.join(',')};`:''}`;}
function lineControls(lineKey,label,line,sizeMin,sizeMax){
  const fOpts=FONT_OPTS.map(f=>`<option value="${f}"${(line.font||'Noto Sans SC')===f?' selected':''}>${f}</option>`).join('');
  const wOpts=WEIGHT_OPTS.map(([v,l])=>`<option value="${v}"${(line.weight||'400')===v?' selected':''}>${l} ${v}</option>`).join('');
  return `<div class="lineCard"><div class="lt">${label}</div>
    <input class="fi" type="text" value="${esc(line.text||'')}" oninput="setLineProp('${lineKey}','text',this.value)">
    <div class="lb">字体</div><select class="sl" onchange="setLineProp('${lineKey}','font',this.value)">${fOpts}</select>
    <div class="rw"><label>字号</label><input class="nm" type="number" min="${sizeMin}" max="${sizeMax}" value="${line.size||36}" oninput="setLineProp('${lineKey}','size',+this.value)"><span class="ut">px</span></div>
    <div class="lb">字重</div><select class="sl" onchange="setLineProp('${lineKey}','weight',this.value)">${wOpts}</select>
    <div class="rw"><label>斜体</label><select class="sl" style="flex:1;" onchange="setLineProp('${lineKey}','italic',this.value==='true')"><option value="false"${!line.italic?' selected':''}>否</option><option value="true"${line.italic?' selected':''}>是</option></select></div>
    <div class="lb">颜色</div><div class="cp"><div class="cd" style="background:${toHex(line.color||'#000')};" onclick="this.nextElementSibling.click()"></div><input type="color" value="${toHex(line.color||'#000')}" style="display:none" onchange="setLineProp('${lineKey}','color',this.value);this.previousElementSibling.style.background=this.value"></div>
    <div class="rw"><label>字间距</label><input class="sld" type="range" min="-0.05" max="0.4" step="0.01" value="${line.ls||0}" oninput="setLineProp('${lineKey}','ls',+this.value);this.nextElementSibling.textContent=this.value+'em'"><span class="vl">${line.ls||0}em</span></div>
    <div class="lb">描边色</div><div class="cp"><div class="cd" style="background:${toHex(line.strokeColor||'#000')};" onclick="this.nextElementSibling.click()"></div><input type="color" value="${toHex(line.strokeColor||'#000')}" style="display:none" onchange="setLineProp('${lineKey}','strokeColor',this.value);this.previousElementSibling.style.background=this.value"></div>
    <div class="rw"><label>描边粗</label><input class="sld" type="range" min="0" max="6" step="0.5" value="${line.strokeWidth||0}" oninput="setLineProp('${lineKey}','strokeWidth',+this.value);this.nextElementSibling.textContent=this.value+'px'"><span class="vl">${line.strokeWidth||0}px</span></div>
    <div class="lb">发光色</div><div class="cp"><div class="cd" style="background:${toHex(line.glowColor||'#fff')};" onclick="this.nextElementSibling.click()"></div><input type="color" value="${toHex(line.glowColor||'#fff')}" style="display:none" onchange="setLineProp('${lineKey}','glowColor',this.value);this.previousElementSibling.style.background=this.value"></div>
    <div class="rw"><label>发光强</label><input class="sld" type="range" min="0" max="40" value="${line.glowBlur||0}" oninput="setLineProp('${lineKey}','glowBlur',+this.value);this.nextElementSibling.textContent=this.value"><span class="vl">${line.glowBlur||0}</span></div>
  </div>`;
}
function canvasDrawLine(ctx,line,cx,y,sizePx,align){const it=line.italic?'italic ':'';const w=line.weight||'400';ctx.font=`${it}${w} ${sizePx}px '${line.font||'Noto Sans SC'}',sans-serif`;ctx.textBaseline='top';if(line.glowBlur>0&&line.glowColor){ctx.shadowColor=line.glowColor;ctx.shadowBlur=line.glowBlur;}else{ctx.shadowBlur=0;ctx.shadowColor='transparent';}ctx.fillStyle=line.color||'#000';drawTextLSstk(ctx,line.text||'',cx,y,line.ls||0,align||'left',line.strokeColor,line.strokeWidth||0);ctx.shadowBlur=0;ctx.shadowColor='transparent';}
const DB='wedding-process-c-v2';let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});
let projs=[],curId=null;const imgCache={};

async function save(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){if(!key)return;await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}

async function createProj(){const name=document.getElementById('mn').value.trim()||'未命名';const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject()};await save(p);projs.unshift(p);closeModal();renderList();openProj(p.id);}
document.getElementById('mn').addEventListener('keydown',e=>{if(e.key==='Enter')createProj();});

function onMD(e){const i=+this.dataset.i;const p=cur();if(!p||!p.steps[i].imgKey||e.button!==0)return;dragging=true;dragStep=i;dragSX=e.clientX;dragSY=e.clientY;dragPX=p.steps[i].px;dragPY=p.steps[i].py;this.style.cursor='grabbing';e.preventDefault();}
function onTS(e){const i=+this.dataset.i;const p=cur();if(!p||!p.steps[i].imgKey)return;dragging=true;dragStep=i;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;dragPX=p.steps[i].px;dragPY=p.steps[i].py;e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!dragging)return;moveDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(!dragging)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
function moveDrag(cx,cy){const p=cur();if(!p)return;const{w}=pSz();const sc=w/1200;const s=p.steps[dragStep];const photoW=p.photoW||320;const photoH=PH-4;s.px=Math.max(0,Math.min(100,dragPX-(cx-dragSX)/(photoW*sc*(s.zoom||1))*100));s.py=Math.max(0,Math.min(100,dragPY-(cy-dragSY)/(photoH*sc*(s.zoom||1))*100));const el=document.getElementById(`simg-${dragStep}`);if(el){const l=iLay(s.nW,s.nH,photoW*sc,photoH*sc,s.zoom,s.px,s.py);el.style.left=l.left+'px';el.style.top=l.top+'px';el.style.width=l.width+'px';el.style.height=l.height+'px';}}
document.addEventListener('mouseup',async()=>{if(!dragging)return;dragging=false;const el=document.getElementById(`photo-${dragStep}`);if(el)el.style.cursor='grab';const p=cur();if(p){pushH();await save(p);}});
document.addEventListener('touchend',async()=>{if(!dragging)return;dragging=false;const p=cur();if(p){pushH();await save(p);}});

async function removeStepImg(i){const p=cur();if(!p)return;await delImg(ik(curId,i));p.steps[i].imgKey=null;p.steps[i].nW=0;p.steps[i].nH=0;pushH();await save(p);await render();renderRP();}

      CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();};

    const dg=ctx.createLinearGradient(W/2-80,0,W/2+80,0);dg.addColorStop(0,'rgba(0,0,0,0)');dg.addColorStop(.5,p.subtitleLine.color||'#b87090');dg.addColorStop(1,'rgba(0,0,0,0)');

      ctx.beginPath();ctx.roundRect(PX,pY,PW,PH,PH/2);ctx.fillStyle=p.pillColor||'#fff0f8';ctx.fill();
      ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      ctx.strokeStyle=pillBorder;ctx.lineWidth=bwEx;ctx.stroke();
      ctx.beginPath();ctx.arc(PX+ICX,pY+PH/2,ICR,0,Math.PI*2);ctx.fillStyle=p.iconBg||'#ffe4f0';ctx.fill();
      ctx.strokeStyle=pillBorder;ctx.lineWidth=bwEx;ctx.stroke();
      ctx.font='32px sans-serif';ctx.fillStyle='#000';ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText(s.icon||'✦',PX+ICX,pY+PH/2);
      canvasDrawLine(ctx,s.labelLine,PX+TXS,pY+38,s.labelLine.size||40,'left');
      canvasDrawLine(ctx,s.descLine,PX+TXS,pY+96,s.descLine.size||30,'left');
      // Photo zone embedded in pill
      const photoW=p.photoW||320;
      const photoH=PH-4;
      const phoX=PX+PW-2-photoW,phoY=pY+2;
      const phLeftR=14,phRightR=photoH/2;
      function photoPath(){
        ctx.beginPath();
        ctx.moveTo(phoX+phLeftR,phoY);
        ctx.lineTo(phoX+photoW-phRightR,phoY);
        ctx.arcTo(phoX+photoW,phoY,phoX+photoW,phoY+phRightR,phRightR);
        ctx.lineTo(phoX+photoW,phoY+photoH-phRightR);
        ctx.arcTo(phoX+photoW,phoY+photoH,phoX+photoW-phRightR,phoY+photoH,phRightR);
        ctx.lineTo(phoX+phLeftR,phoY+photoH);
        ctx.arcTo(phoX,phoY+photoH,phoX,phoY+photoH-phLeftR,phLeftR);
        ctx.lineTo(phoX,phoY+phLeftR);
        ctx.arcTo(phoX,phoY,phoX+phLeftR,phoY,phLeftR);
        ctx.closePath();
      }
      const url=await getURL(s.imgKey);
      if(url){
        const img=await new Promise(r=>{const im=new Image();im.onload=()=>r(im);im.onerror=()=>r(null);im.src=url;});
        if(img){const l=iLay(s.nW||img.naturalWidth,s.nH||img.naturalHeight,photoW,photoH,s.zoom,s.px,s.py);ctx.save();photoPath();ctx.clip();ctx.drawImage(img,phoX+l.left,phoY+l.top,l.width,l.height);ctx.restore();}
      }else{
        ctx.save();photoPath();ctx.fillStyle='rgba(212,160,184,0.12)';ctx.fill();ctx.strokeStyle=pillBorder;ctx.lineWidth=1.5;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);ctx.restore();
        // "+" and "上传图片" placeholder
        ctx.save();
        ctx.fillStyle='#d4a0b8';ctx.textAlign='center';ctx.textBaseline='middle';
        const cxPh=phoX+photoW/2,cyPh=phoY+photoH/2;
        ctx.globalAlpha=0.5;ctx.font='22px sans-serif';ctx.fillText('＋',cxPh,cyPh-10);
        ctx.globalAlpha=1;ctx.font='10px sans-serif';ctx.fillText('上传图片',cxPh,cyPh+14);
        ctx.restore();
      }
    }
    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download=(p.name||'poster')+'_1200x1600.png';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);},'image/png');
  }catch(err){console.error(err);alert('导出失败');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}
window.addEventListener('resize',()=>{if(curId)render();});
(async()=>{await wpCheckAuth();await openDB();await loadAll();renderList();})();
</script>
