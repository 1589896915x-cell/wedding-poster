<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>全图覆盖版 - 婚礼场馆展示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:#111;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:40px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;}
.topbar a{color:#888;font-size:18px;text-decoration:none;}
.topbar .lbl{font-size:12px;color:#666;}
.credits{background:#1e1e1e;padding:3px 10px;border-radius:4px;font-size:11px;color:#c8a96a;margin-left:auto;}
.logout-btn{padding:4px 12px;border:1px solid #2a2a2a;border-radius:4px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;}
.main{display:flex;flex:1;overflow:hidden;}
.sb{width:188px;flex-shrink:0;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;}
.sb-head{padding:12px;border-bottom:1px solid #1e1e1e;}
.sb-head h2{font-size:13px;font-weight:500;}
.sb-head p{font-size:10px;color:#555;margin-top:2px;}
.sb-new{margin:10px;padding:7px;border:1px dashed #333;border-radius:6px;color:#888;font-size:11px;cursor:pointer;text-align:center;background:#161616;}
.sb-new:hover{border-color:#666;color:#ccc;}
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.pi{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;}
.pi:hover{background:#1a1a1a;}.pi.on{background:#1a1a1a;border-color:#2a2a2a;}
.pi h3{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi p{font-size:9px;color:#555;margin-top:2px;}
.pi-acts{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.pi-btn{padding:2px 7px;background:none;border:1px solid #2a2a2a;border-radius:3px;color:#666;font-size:9px;cursor:pointer;}
.pi-btn:hover{border-color:#555;color:#aaa;}.pi-btn.del:hover{border-color:#c00;color:#f55;}
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ed-top{height:44px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;}
.pname{background:none;border:none;outline:none;color:#fff;font-size:13px;font-weight:500;font-family:inherit;flex:1;max-width:220px;}
.pname::placeholder{color:#444;}
.exp-btn{padding:6px 14px;background:#c8392b;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto;}
.exp-btn:hover{background:#a02d22;}
.ed-body{display:flex;flex:1;overflow:hidden;}
.canvas{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px;}
#poster{box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;flex-shrink:0;}
.rp{width:252px;flex-shrink:0;background:#111;border-left:1px solid #1e1e1e;overflow-y:auto;padding:12px 10px;}
.rp-t{font-size:10px;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.sec{margin-top:10px;padding-top:9px;border-top:1px solid #1a1a1a;}
.sec-t{font-size:10px;color:#aaa;letter-spacing:.5px;margin-bottom:7px;font-weight:500;}
.lbl{font-size:9px;color:#666;margin-bottom:2px;margin-top:5px;}
.fi{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.fi:focus{border-color:#555;}
.sel{width:100%;padding:5px 7px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;margin-bottom:3px;}
.row{display:flex;gap:5px;align-items:center;margin-bottom:4px;}
.num{width:56px;padding:4px 6px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-size:11px;font-family:inherit;outline:none;text-align:center;}
.unit{font-size:9px;color:#555;}
.sld{flex:1;accent-color:#c8392b;}
.img-btn{width:100%;padding:6px;border:1px dashed #2a2a2a;border-radius:4px;background:none;color:#888;font-size:10px;cursor:pointer;text-align:center;margin-top:3px;font-family:inherit;}
.img-btn:hover{border-color:#555;color:#ccc;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.toggle-lbl{font-size:9px;color:#888;}
.toggle{width:32px;height:18px;background:#2a2a2a;border-radius:9px;position:relative;cursor:pointer;border:none;flex-shrink:0;}
.toggle.on{background:#c8392b;}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;}
.toggle.on::after{left:16px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">←</a>
  <span class="lbl">全图覆盖版</span>

  </div>

</div>
<script>
// ══ Auth ══════════════════════════════════════════════════════════
const SB_URL='https://kyemjxgdmkupfkntflzh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5ZW1qeGdkbWt1cGZrbnRmbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI1OTcsImV4cCI6MjA5MTYxODU5N30.rJ-dxDkaxI5-aM_FAew9p1aD33I1H7h_HK9NGboUjvo';
let _lic=null;
async function wpCheckAuth(){
  if(location.protocol==='file:'||location.hostname==='localhost'){_lic={credits:999,id:'test'};const el=document.getElementById('wp-credits');if(el)el.textContent='测试模式';return true;}
  const code=localStorage.getItem('wp-license');if(!code){location.href='index.html';return false;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/licenses?code=eq.${encodeURIComponent(code)}&select=*`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();if(!d||!d[0]||!d[0].is_active){location.href='index.html';return false;}
    const lic=d[0];if((lic.credits||0)<=0){location.href='index.html';return false;}
    _lic=lic;updCredits();return true;
  }catch(e){return true;}
}
function updCredits(){const el=document.getElementById('wp-credits');if(el&&_lic)el.textContent=`剩余 ${_lic.credits||0} 次`;}
async function wpCheckExportQuota(){
  if(location.protocol==='file:'||location.hostname==='localhost')return true;
  if(!_lic){alert('请先登录');return false;}
  if((_lic.credits||0)<=0){alert('次数已用完，请充值');return false;}
  try{
    const nc=(_lic.credits||0)-1;
    const r=await fetch(`${SB_URL}/rest/v1/licenses?id=eq.${_lic.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({credits:nc})});
    const d=await r.json();if(d&&d[0])_lic=d[0];else _lic.credits=nc;updCredits();return true;
  }catch(e){_lic.credits=Math.max(0,(_lic.credits||0)-1);updCredits();return true;}
}
function wpLogout(){localStorage.removeItem('wp-license');location.href='index.html';}

// ══ DB ════════════════════════════════════════════════════════════
let DB=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open('fullbg-v1',1);q.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:{});});};q.onsuccess=e=>{DB=e.target.result;r();};q.onerror=j;});}
const tx=(s,m='readonly')=>DB.transaction(s,m).objectStore(s);
const dbG=(s,k)=>new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbP=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?tx(s,'readwrite').put(v,k):tx(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbD=(s,k)=>new Promise((r,j)=>{const t=DB.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

// ══ 常量 ══════════════════════════════════════════════════════════
const FONTS=['Noto Serif SC','Noto Sans SC','Cormorant Garamond','Georgia','STSong','STKaiti','Microsoft YaHei','PingFang SC','Arial'];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const cur=()=>projs.find(p=>p.id===curId)||null;
const BG_KEY=id=>`fb-bg-${id}`;
const LOGO_KEY=id=>`fb-logo-${id}`;

function defP(name){
  return{
    id:uid(),name,ct:Date.now(),at:Date.now(),
    // 背景图
    bg:{imgKey:null,nW:0,nH:0,px:50,py:50,zoom:1},
    // 渐变遮罩
    overlayTopH:590,
    overlayBotH:432,
    overlayColor:'0,0,0',
    overlayTopOp:0.5,
    overlayBotOp:0.6,
    // 小标题
    subTitle:'北仑一站式婚礼酒店',
    subTitleFont:'Noto Serif SC',subTitleSize:65,subTitleWeight:'700',subTitleColor:'#ffffff',
    subTitleY:138,subTitleLS:0.1,subTitleShow:true,
    // 主标题
    mainTitle:'办40桌·超性价比婚礼',
    mainTitleFont:'Noto Serif SC',mainTitleSize:95,mainTitleWeight:'700',mainTitleColor:'#ffffff',
    mainTitleY:228,mainTitleLS:0.04,
    // 胶囊标签
    tagText:'免场布费+无预制菜+一价全包',
    tagFont:'Noto Serif SC',tagSize:40,tagWeight:'400',tagColor:'#ffffff',
    tagY:364,tagLS:0.05,
    tagBorderColor:'rgba(255,255,255,0.85)',tagBorderW:2,tagPadH:16,tagPadV:38,tagRadius:999,tagShow:true,
    // 水印大字
    watermarkText:'BALRK GOLD',
    watermarkFont:'Noto Serif SC',watermarkSize:164,watermarkWeight:'700',watermarkColor:'rgba(255,255,255,0.12)',
    watermarkY:1324,watermarkLS:0.05,watermarkShow:true,
    // Logo图片
    logoShow:false,
    logo:{imgKey:null,nW:0,nH:0},
    logoW:120,logoY:1330,

  };
}

// ══ Storage ═══════════════════════════════════════════════════════
const imgCache={};
async function saveImg(key,blob){await dbP('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){try{await dbD('I',key);}catch(e){}if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];try{const b=await dbG('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}catch(e){return null;}}
async function save(p){p.at=Date.now();await dbP('P',p);}

// ══ 项目管理 ══════════════════════════════════════════════════════
let projs=[],curId=null;
async function newProj(){
  const n=prompt('项目名称：','未命名');if(!n)return;
  const p=defP(n.trim()||'未命名');
  await save(p);projs.unshift(p);renderList();openProj(p.id);
}
function renderList(){
  const el=document.getElementById('proj-list');
  if(!projs.length){el.innerHTML='<div style="font-size:10px;color:#444;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projs.map(p=>`<div class="pi ${p.id===curId?'on':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><p>${new Date(p.at).toLocaleDateString('zh-CN')}</p>
    <div class="pi-acts">
      <button class="pi-btn" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pi-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pi-btn" onclick="event.stopPropagation();exportProjJSON('${p.id}')">备份</button>
      <button class="pi-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function openProj(id){
  curId=id;const p=cur();if(!p)return;
  document.getElementById('pname').value=p.name;
  renderList();await renderPoster();renderRP();
}
async function renameProj(id){const p=projs.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await save(p);if(curId===id)document.getElementById('pname').value=p.name;renderList();}
async function dupProj(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  const bgb=await dbG('I',BG_KEY(id));if(bgb){await dbP('I',bgb,BG_KEY(nid));np.bg.imgKey=BG_KEY(nid);}
  const lgb=await dbG('I',LOGO_KEY(id));if(lgb){await dbP('I',lgb,LOGO_KEY(nid));np.logo.imgKey=LOGO_KEY(nid);}
  await save(np);projs.unshift(np);renderList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  await delImg(BG_KEY(id));await delImg(LOGO_KEY(id));
  await dbD('P',id);projs=projs.filter(x=>x.id!==id);
  if(curId===id){curId=null;document.getElementById('poster').innerHTML='';renderRP();}
  renderList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('pname').value;await save(p);renderList();}
function exportProjJSON(id){
  const p=projs.find(x=>x.id===id);if(!p)return;
  const data=JSON.parse(JSON.stringify(p));data.bg.imgKey=null;data.logo.imgKey=null;
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=(p.name||'project')+'_backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function importProjJSON(){
  const fi=document.createElement('input');fi.type='file';fi.accept='.json,application/json';
  fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const text=await f.text();const data=JSON.parse(text);
      if(!data.id||!data.name)throw new Error('格式错误');
      data.id=uid();data.at=Date.now();data.ct=Date.now();data.name=data.name+' (导入)';
      data.bg.imgKey=null;if(data.logo)data.logo.imgKey=null;
      await save(data);projs.unshift(data);renderList();openProj(data.id);
    }catch(err){alert('导入失败：文件格式不正确');}
  };fi.click();
}

// ══ 海报尺寸 ══════════════════════════════════════════════════════
function pSz(){
  const a=document.querySelector('.canvas');
  const aH=a.clientHeight-40,aW=a.clientWidth-40;
  let w,h;
  if(aH*0.75<aW){h=Math.floor(aH);w=Math.floor(h*0.75);}
  else{w=Math.floor(aW);h=Math.floor(w/0.75);}
  return{w,h};
}
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ══ 渲染 ══════════════════════════════════════════════════════════
async function renderPoster(){
  const el=document.getElementById('poster');
  const p=cur();
  if(!p){el.style.cssText='width:300px;height:400px;background:#222;';el.innerHTML='';return;}
  const{w,h}=pSz();const sc=w/1200;
  el.style.cssText=`width:${w}px;height:${h}px;background:#1a1410;position:relative;overflow:hidden;`;

  const bgUrl=await getURL(p.bg.imgKey);
  const logoUrl=await getURL(p.logo?.imgKey);
  let html='';

  // ── 背景图 ──
  if(bgUrl){
    html+=`<div id="bg-wrap" data-type="bg" style="position:absolute;inset:0;cursor:grab;z-index:1;">
      <img id="bg-img" src="${bgUrl}" draggable="false" style="position:absolute;display:block;">
    </div>`;
  } else {
    html+=`<div onclick="uploadBg()" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555;cursor:pointer;z-index:1;">
      <div style="font-size:28px;opacity:.4;">＋</div><div style="font-size:11px;">点击上传背景图</div>
    </div>`;
  }

  // ── 顶部渐变遮罩 ──
  const topH=Math.round((p.overlayTopH||500)*sc);
  const botH=Math.round((p.overlayBotH||600)*sc);
  const rgb=p.overlayColor||'0,0,0';
  html+=`<div style="position:absolute;left:0;top:0;width:${w}px;height:${topH}px;background:linear-gradient(to bottom,rgba(${rgb},${p.overlayTopOp||0.55}) 0%,rgba(${rgb},0) 100%);z-index:2;pointer-events:none;"></div>`;
  html+=`<div style="position:absolute;left:0;bottom:0;width:${w}px;height:${botH}px;background:linear-gradient(to top,rgba(${rgb},${p.overlayBotOp||0.65}) 0%,rgba(${rgb},0) 100%);z-index:2;pointer-events:none;"></div>`;

  // ── 水印大字 ──
  if(p.watermarkShow!==false){
    const wmSz=Math.round((p.watermarkSize||260)*sc);
    const wmY=Math.round((p.watermarkY||1180)*sc);
    html+=`<div style="position:absolute;left:0;right:0;top:${wmY}px;text-align:center;font-family:'${p.watermarkFont||'Cormorant Garamond'}',serif;font-size:${wmSz}px;font-weight:${p.watermarkWeight||'700'};color:${p.watermarkColor||'rgba(255,255,255,0.12)'};letter-spacing:${p.watermarkLS||0.08}em;z-index:3;line-height:1;white-space:nowrap;pointer-events:none;">${esc(p.watermarkText)}</div>`;
  }

  // ── 小标题 ──
  if(p.subTitleShow!==false){
    const stSz=Math.round((p.subTitleSize||42)*sc);
    const stY=Math.round((p.subTitleY||148)*sc);
    const shadow='1px 2px 8px rgba(0,0,0,0.6)';
    html+=`<div style="position:absolute;left:0;right:0;top:${stY}px;text-align:center;font-family:'${p.subTitleFont||'Noto Serif SC'}',serif;font-size:${stSz}px;font-weight:${p.subTitleWeight||'400'};color:${p.subTitleColor||'#fff'};letter-spacing:${p.subTitleLS||0.1}em;text-shadow:${shadow};z-index:5;">${esc(p.subTitle)}</div>`;
  }

  // ── 主标题 ──
  const mTSz=Math.round((p.mainTitleSize||96)*sc);
  const mTY=Math.round((p.mainTitleY||228)*sc);
  html+=`<div style="position:absolute;left:0;right:0;top:${mTY}px;text-align:center;font-family:'${p.mainTitleFont||'Noto Serif SC'}',serif;font-size:${mTSz}px;font-weight:${p.mainTitleWeight||'700'};color:${p.mainTitleColor||'#fff'};letter-spacing:${p.mainTitleLS||0.04}em;text-shadow:1px 2px 12px rgba(0,0,0,0.5);z-index:5;line-height:1.15;">${esc(p.mainTitle)}</div>`;

  // ── 胶囊标签 ──
  if(p.tagShow!==false){
    const tgSz=Math.round((p.tagSize||40)*sc);
    const tgY=Math.round((p.tagY||390)*sc);
    const tgPH=Math.round((p.tagPadH||16)*sc);
    const tgPV=Math.round((p.tagPadV||38)*sc);
    const tgBW=Math.round((p.tagBorderW||2)*sc)||1;
    const tgR=Math.round((p.tagRadius||999)*sc);
    html+=`<div style="position:absolute;left:0;right:0;top:${tgY}px;display:flex;justify-content:center;z-index:5;">
      <div style="display:inline-block;padding:${tgPH}px ${tgPV}px;border:${tgBW}px solid ${p.tagBorderColor||'rgba(255,255,255,0.85)'};border-radius:${tgR}px;font-family:'${p.tagFont||'Noto Serif SC'}',serif;font-size:${tgSz}px;font-weight:${p.tagWeight||'400'};color:${p.tagColor||'#fff'};letter-spacing:${p.tagLS||0.05}em;text-shadow:1px 1px 6px rgba(0,0,0,0.4);white-space:nowrap;">${esc(p.tagText)}</div>
    </div>`;
  }

  // ── Logo 图片 ──
  if(p.logoShow!==false){
    const lgW=Math.round((p.logoW||120)*sc);
    const lgY=Math.round((p.logoY||1330)*sc);
    if(logoUrl){
      html+=`<div style="position:absolute;left:0;right:0;top:${lgY}px;display:flex;justify-content:center;z-index:5;">
        <img id="logo-img" src="${logoUrl}" style="width:${lgW}px;height:auto;object-fit:contain;">
      </div>`;
    } else {
      html+=`<div onclick="uploadLogo()" style="position:absolute;left:0;right:0;top:${lgY}px;display:flex;justify-content:center;z-index:5;cursor:pointer;">
        <div style="width:${lgW}px;height:${lgW}px;border:1px dashed rgba(255,255,255,0.4);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,0.5);">
          <div style="font-size:16px;">＋</div><div style="font-size:8px;">Logo</div>
        </div>
      </div>`;
    }
  }



  el.innerHTML=html;

  // 背景图定位
  if(bgUrl){
    const img=document.getElementById('bg-img');
    if(img){if(img.complete&&img.naturalWidth)updBgPos();else img.onload=updBgPos;}
    document.getElementById('bg-wrap').addEventListener('mousedown',onMD);
  }
}

function updBgPos(){
  const p=cur();if(!p)return;
  const{w,h}=pSz();
  const s=p.bg;const img=document.getElementById('bg-img');if(!img)return;
  const l=iLay(s.nW||img.naturalWidth,s.nH||img.naturalHeight,w,h,s.zoom,s.px,s.py);
  img.style.cssText=`position:absolute;display:block;width:${l.width}px;height:${l.height}px;left:${l.left}px;top:${l.top}px;`;
}

// ══ 拖拽 ══════════════════════════════════════════════════════════
let drag={on:false,sx:0,sy:0,px0:50,py0:50};
function onMD(e){
  const p=cur();if(!p||e.button!==0)return;
  if(!p.bg.imgKey)return;
  drag={on:true,sx:e.clientX,sy:e.clientY,px0:p.bg.px,py0:p.bg.py};
  e.preventDefault();
}
document.addEventListener('mousemove',e=>{
  if(!drag.on)return;const p=cur();if(!p)return;
  const{w,h}=pSz();const s=p.bg;
  const l0=iLay(s.nW,s.nH,w,h,s.zoom,drag.px0,drag.py0);
  const mx=Math.max(0,l0.width-w),my=Math.max(0,l0.height-h);
  s.px=mx>0?Math.max(0,Math.min(100,drag.px0-(e.clientX-drag.sx)/mx*100)):50;
  s.py=my>0?Math.max(0,Math.min(100,drag.py0-(e.clientY-drag.sy)/my*100)):50;
  updBgPos();
});
document.addEventListener('mouseup',async()=>{if(drag.on){drag.on=false;const p=cur();if(p)await save(p);}});

// ══ 上传 ══════════════════════════════════════════════════════════
function uploadBg(){
  const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
  fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;const p=cur();if(!p)return;
    const u=URL.createObjectURL(f);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.bg.nW=img.naturalWidth;p.bg.nH=img.naturalHeight;URL.revokeObjectURL(u);res();};img.src=u;});
    await saveImg(BG_KEY(curId),f);p.bg.imgKey=BG_KEY(curId);p.bg.px=50;p.bg.py=50;p.bg.zoom=1;
    await save(p);await renderPoster();renderRP();
  };fi.click();
}
function uploadLogo(){
  const fi=document.createElement('input');fi.type='file';fi.accept='image/*';
  fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;const p=cur();if(!p)return;
    const u=URL.createObjectURL(f);
    await new Promise(res=>{const img=new Image();img.onload=()=>{p.logo.nW=img.naturalWidth;p.logo.nH=img.naturalHeight;URL.revokeObjectURL(u);res();};img.src=u;});
    await saveImg(LOGO_KEY(curId),f);p.logo.imgKey=LOGO_KEY(curId);
    await save(p);await renderPoster();renderRP();
  };fi.click();
}

function fO(sel){return FONTS.map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('');}
function wO(sel){return ['300','400','500','700','900'].map(w=>`<option value="${w}" ${(sel||'400')===w?'selected':''}>${{300:'细 300',400:'常规 400',500:'中等 500',700:'粗 700',900:'超粗 900'}[w]}</option>`).join('');}
function cp(k,v){return `<input type="color" value="${v||'#ffffff'}" style="width:100%;height:26px;border:1px solid #2a2a2a;border-radius:4px;background:#0a0a0a;cursor:pointer;margin-bottom:4px;" onchange="setP('${k}',this.value);reRender()">`;}
function sn(k,id,val,min,max,step='1'){
  return `<div class="row">
    <input class="sld" type="range" min="${min}" max="${max}" step="${step}" value="${val}" id="${id}_sld" oninput="setP('${k}',+this.value);reRender();document.getElementById('${id}_num').value=this.value">
    <input class="num" type="number" min="${min}" max="${max}" step="${step}" value="${val}" id="${id}_num" oninput="setP('${k}',+this.value);reRender();document.getElementById('${id}_sld').value=this.value">
    <span class="unit">px</span>
  </div>`;
}
function snImg(setter,id,val,min,max,step='1'){
  return `<div class="row">
    <input class="sld" type="range" min="${min}" max="${max}" step="${step}" value="${val}" id="${id}_sld" oninput="${setter};document.getElementById('${id}_num').value=this.value">
    <input class="num" type="number" min="${min}" max="${max}" step="${step}" value="${val}" id="${id}_num" oninput="${setter};document.getElementById('${id}_sld').value=this.value">
    <span class="unit">%</span>
  </div>`;
}
function tog(label,key,val){
  return `<div class="toggle-row">
    <span class="toggle-lbl">${label}</span>
    <button class="toggle ${val?'on':''}" id="tog_${key}" onclick="setP('${key}',!cur()['${key}']);this.classList.toggle('on');reRender()"></button>
  </div>`;
}
async function setP(k,v){const p=cur();if(!p)return;p[k]=v;await save(p);}
async function reRender(){await renderPoster();}

// ══ 导出 ══════════════════════════════════════════════════════════
function drawTextLS(ctx,text,cx,y,letterSpacingEm,align){
  const fs=parseFloat(ctx.font.match(/([\d.]+)px/)?.[1]||16);
  const ls=letterSpacingEm*fs;
  const chars=text.split('');
  let totalW=0;
  chars.forEach((ch,i)=>{totalW+=ctx.measureText(ch).width;if(i<chars.length-1)totalW+=ls;});
  let sx=align==='center'?cx-totalW/2:align==='right'?cx-totalW:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
}

async function doExport(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('exp-btn');btn.textContent='生成中…';btn.disabled=true;
  const W=1200,H=1600;
  const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  await document.fonts.ready;

  function loadImg(url){return new Promise(res=>{if(!url){res(null);return;}const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});}

  // 背景图
  const bgUrl=await getURL(p.bg.imgKey);
  const bgImg=await loadImg(bgUrl);
  if(bgImg){
    const s=p.bg;const zoom=s.zoom||1;
    const sc2=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight)*zoom;
    const rW=bgImg.naturalWidth*sc2,rH=bgImg.naturalHeight*sc2;
    const left=-((s.px||50)/100)*Math.max(0,rW-W);
    const top=-((s.py||50)/100)*Math.max(0,rH-H);
    ctx.drawImage(bgImg,left,top,rW,rH);
  } else {
    ctx.fillStyle='#1a1410';ctx.fillRect(0,0,W,H);
  }

  // 顶部渐变
  const rgb=p.overlayColor||'0,0,0';
  const topH=p.overlayTopH||500;
  const botH=p.overlayBotH||600;
  let gTop=ctx.createLinearGradient(0,0,0,topH);
  gTop.addColorStop(0,`rgba(${rgb},${p.overlayTopOp||0.55})`);
  gTop.addColorStop(1,`rgba(${rgb},0)`);
  ctx.fillStyle=gTop;ctx.fillRect(0,0,W,topH);

  // 底部渐变
  let gBot=ctx.createLinearGradient(0,H-botH,0,H);
  gBot.addColorStop(0,`rgba(${rgb},0)`);
  gBot.addColorStop(1,`rgba(${rgb},${p.overlayBotOp||0.65})`);
  ctx.fillStyle=gBot;ctx.fillRect(0,H-botH,W,botH);

  ctx.textBaseline='top';

  // 水印大字
  if(p.watermarkShow!==false){
    ctx.fillStyle=p.watermarkColor||'rgba(255,255,255,0.12)';
    ctx.font=`${p.watermarkWeight||'700'} ${p.watermarkSize||260}px "${p.watermarkFont||'Cormorant Garamond'}",serif`;
    drawTextLS(ctx,p.watermarkText,W/2,p.watermarkY||1180,p.watermarkLS||0.08,'center');
  }

  // 小标题
  if(p.subTitleShow!==false){
    ctx.fillStyle=p.subTitleColor||'#ffffff';
    ctx.font=`${p.subTitleWeight||'400'} ${p.subTitleSize||42}px "${p.subTitleFont||'Noto Serif SC'}",serif`;
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=16;ctx.shadowOffsetY=2;
    drawTextLS(ctx,p.subTitle,W/2,p.subTitleY||148,p.subTitleLS||0.1,'center');
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  }

  // 主标题
  ctx.fillStyle=p.mainTitleColor||'#ffffff';
  ctx.font=`${p.mainTitleWeight||'700'} ${p.mainTitleSize||96}px "${p.mainTitleFont||'Noto Serif SC'}",serif`;
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=24;ctx.shadowOffsetY=2;
  drawTextLS(ctx,p.mainTitle,W/2,p.mainTitleY||228,p.mainTitleLS||0.04,'center');
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  // 胶囊标签
  if(p.tagShow!==false){
    const tgSz=p.tagSize||40;
    const tgPH=p.tagPadH||16;
    const tgPV=p.tagPadV||38;
    const tgBW=p.tagBorderW||2;
    const tgR=p.tagRadius||999;
    ctx.font=`${p.tagWeight||'400'} ${tgSz}px "${p.tagFont||'Noto Serif SC'}",serif`;
    // 测量文字总宽
    const fs=tgSz;const ls=(p.tagLS||0.05)*fs;
    const chars=p.tagText.split('');
    let tw=0;chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
    const bW=tw+tgPV*2;const bH=tgSz+tgPH*2;
    const bX=W/2-bW/2;const bY=p.tagY||390;
    // 圆角矩形
    const r=Math.min(tgR,bH/2);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(bX+r,bY);ctx.lineTo(bX+bW-r,bY);ctx.quadraticCurveTo(bX+bW,bY,bX+bW,bY+r);
    ctx.lineTo(bX+bW,bY+bH-r);ctx.quadraticCurveTo(bX+bW,bY+bH,bX+bW-r,bY+bH);
    ctx.lineTo(bX+r,bY+bH);ctx.quadraticCurveTo(bX,bY+bH,bX,bY+bH-r);
    ctx.lineTo(bX,bY+r);ctx.quadraticCurveTo(bX,bY,bX+r,bY);
    ctx.closePath();
    // 解析边框颜色
    ctx.strokeStyle=p.tagBorderColor||'rgba(255,255,255,0.85)';
    ctx.lineWidth=tgBW;ctx.stroke();
    ctx.restore();
    // 文字
    ctx.fillStyle=p.tagColor||'#ffffff';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    drawTextLS(ctx,p.tagText,W/2,bY+tgPH,p.tagLS||0.05,'center');
    ctx.shadowBlur=0;
  }

  // Logo图片
  if(p.logoShow!==false){
    const logoUrl=await getURL(p.logo?.imgKey);
    const logoImg=await loadImg(logoUrl);
    if(logoImg){
      const lW=p.logoW||120;
      const lH=Math.round(logoImg.naturalHeight/logoImg.naturalWidth*lW);
      ctx.drawImage(logoImg,W/2-lW/2,p.logoY||1330,lW,lH);
    }
  }



  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.download=(p.name||'poster')+'_全图覆盖版_1200x1600.png';
    a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;
  },'image/png');
}
