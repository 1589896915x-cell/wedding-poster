// ═══ drawTextLS（规则2：内置 textBaseline='top'）══════════════════
function drawTextLS(ctx,text,cx,y,lsEm,align){
  if(!text)return;
  ctx.textBaseline='top';
  const m=ctx.font.match(/([\d.]+)px/);const fs=m?parseFloat(m[1]):16;const ls=lsEm*fs;
  const chars=[...text];let tw=0;
  chars.forEach((ch,i)=>{tw+=ctx.measureText(ch).width;if(i<chars.length-1)tw+=ls;});
  let sx=align==='center'?cx-tw/2:align==='right'?cx-tw:cx;
  chars.forEach((ch,i)=>{ctx.fillText(ch,sx,y);sx+=ctx.measureText(ch).width+(i<chars.length-1?ls:0);});
}

// ═══ iLay（规则5：共用图片裁切）══════════════════════════════════
function iLay(nW,nH,cW,cH,zoom,px,py){
  if(!nW||!nH)return{left:0,top:0,width:cW,height:cH};
  const s=Math.max(cW/nW,cH/nH)*(zoom||1);
  const rW=nW*s,rH=nH*s;
  return{left:-((px||50)/100)*Math.max(0,rW-cW),top:-((py||50)/100)*Math.max(0,rH-cH),width:rW,height:rH};
}

// ═══ IndexedDB ════════════════════════════════════════════════════
const DB_NAME='wedding-urgency-v1',DB_VER=1;
let db=null;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;['P','I'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,s==='P'?{keyPath:'id'}:undefined);});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=rej;});}
const TX=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbGet=(s,k)=>new Promise((r,j)=>{const q=TX(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=j;});
const dbPut=(s,v,k)=>new Promise((r,j)=>{const q=k!==undefined?TX(s,'readwrite').put(v,k):TX(s,'readwrite').put(v);q.onsuccess=r;q.onerror=j;});
const dbDel=(s,k)=>new Promise((r,j)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=r;t.onerror=j;});
const dbAll=(s)=>new Promise((r,j)=>{const q=TX(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=j;});

const FONTS=['Noto Serif SC','Noto Sans SC','STSong','STKaiti','PingFang SC','Microsoft YaHei','SimHei','Cormorant Garamond','Playfair Display','Times New Roman'];
const WTS=[['400','常规'],['500','中'],['700','粗'],['900','超粗']];

function defT(text,font,size,weight,color,x,y,align,ls){return{text,font,size,weight,color,x,y,align,ls};}

function defProject(){return{

  pricePrefix:defT('¥','Noto Sans SC',72,'900','#ffffff',55,1360,'left',0),

  badge2Font:'Noto Sans SC',badge2Size:50,badge2Weight:'700',badge2Color:'#2d1500',

  badge2X:782,badge2Y:1355,badge2W:347,badge2H:100,badge2Radius:6,
};}

// ═══ State ════════════════════════════════════════════════════════
let projects=[],curId=null;
const imgCache={};
let _dragging=false,_dragSX=0,_dragSY=0,_dragPX=50,_dragPY=50;
let _hist=[],_hIdx=-1;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const cur=()=>projects.find(p=>p.id===curId)||null;
const ikey=(pid,sl)=>`${pid}-${sl}`;

// ═══ History ══════════════════════════════════════════════════════
function pushH(){const p=cur();if(!p)return;_hist=_hist.slice(0,_hIdx+1);_hist.push(JSON.stringify(p));if(_hist.length>20)_hist.shift();_hIdx=_hist.length-1;}
async function undo(){if(_hIdx<=0)return;_hIdx--;const p=JSON.parse(_hist[_hIdx]);const i=projects.findIndex(x=>x.id===p.id);if(i>=0)projects[i]=p;await dbPut('P',p);await renderPoster();renderRP();}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

// ═══ Storage ══════════════════════════════════════════════════════
async function loadAll(){projects=await dbAll('P');projects.sort((a,b)=>b.at-a.at);}
async function saveP(p){p.at=Date.now();await dbPut('P',p);}
async function saveImg(key,blob){await dbPut('I',blob,key);if(imgCache[key])URL.revokeObjectURL(imgCache[key]);imgCache[key]=URL.createObjectURL(blob);}
async function delImg(key){await dbDel('I',key);if(imgCache[key]){URL.revokeObjectURL(imgCache[key]);delete imgCache[key];}}
async function getURL(key){if(!key)return null;if(imgCache[key])return imgCache[key];const b=await dbGet('I',key);if(!b)return null;imgCache[key]=URL.createObjectURL(b);return imgCache[key];}

// Backup
function exportJSON(){const p=cur();if(!p)return;const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=(p.name||'project')+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);}
function importJSON(){const fi=document.getElementById('json-in');fi.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());p.id=uid();p.name=(p.name||'导入')+' (导入)';p.ct=p.at=Date.now();await saveP(p);projects.unshift(p);renderProjList();openProj(p.id);}catch{alert('JSON格式错误');}fi.value='';};fi.click();}

// ═══ Modal ════════════════════════════════════════════════════════
function openNewModal(){document.getElementById('nm-name').value='';document.getElementById('new-modal').classList.add('open');setTimeout(()=>document.getElementById('nm-name').focus(),50);}
function closeNewModal(){document.getElementById('new-modal').classList.remove('open');}
async function createProject(){
  const name=document.getElementById('nm-name').value.trim()||'未命名';
  const p={id:uid(),name,ct:Date.now(),at:Date.now(),...defProject()};
  await saveP(p);projects.unshift(p);closeNewModal();renderProjList();openProj(p.id);
}
document.getElementById('nm-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProject();});

// ═══ Project List ═════════════════════════════════════════════════
function renderProjList(){
  const el=document.getElementById('proj-list');
  if(!projects.length){el.innerHTML='<div style="font-size:10px;color:#333;padding:8px 4px;">暂无项目</div>';return;}
  el.innerHTML=projects.map(p=>`<div class="proj-item${p.id===curId?' active':''}" onclick="openProj('${p.id}')">
    <h3>${esc(p.name)}</h3><div class="meta">${new Date(p.at).toLocaleDateString('zh-CN')}</div>
    <div class="proj-item-actions">
      <button class="pa-btn" onclick="event.stopPropagation();renameProj('${p.id}')">改名</button>
      <button class="pa-btn" onclick="event.stopPropagation();dupProj('${p.id}')">复制</button>
      <button class="pa-btn del" onclick="event.stopPropagation();delProj('${p.id}')">删除</button>
    </div></div>`).join('');
}
async function renameProj(id){const p=projects.find(x=>x.id===id);if(!p)return;const n=prompt('新名称：',p.name);if(!n||!n.trim())return;p.name=n.trim();await saveP(p);if(curId===id)document.getElementById('proj-name-in').value=p.name;renderProjList();}
async function openProj(id){curId=id;const p=cur();if(!p)return;document.getElementById('proj-name-in').value=p.name;_hist=[];_hIdx=-1;renderProjList();await renderPoster();renderRP();}
async function dupProj(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  const nid=uid();const np={...JSON.parse(JSON.stringify(p)),id:nid,name:p.name+' 副本',ct:Date.now(),at:Date.now()};
  const ok=ikey(id,'bgImg'),nk=ikey(nid,'bgImg');const b=await dbGet('I',ok);if(b){await dbPut('I',b,nk);np.bgImg.imgKey=nk;}
  await saveP(np);projects.unshift(np);renderProjList();
}
async function delProj(id){
  if(!confirm('确认删除？'))return;
  await delImg(ikey(id,'bgImg'));await dbDel('P',id);
  projects=projects.filter(p=>p.id!==id);
  if(curId===id){curId=null;document.getElementById('poster-wrap').innerHTML='';renderRP();}renderProjList();
}
async function onNameChange(){const p=cur();if(!p)return;p.name=document.getElementById('proj-name-in').value;await saveP(p);renderProjList();}

// ═══ Poster Size ══════════════════════════════════════════════════
function pSize(){const a=document.getElementById('canvas-area');const aH=a.clientHeight-24,aW=a.clientWidth-24;let h,w;if(aH*.75<aW){h=Math.floor(aH);w=Math.floor(h*.75);}else{w=Math.floor(aW);h=Math.floor(w/.75);}return{w,h};}

// ═══ Load Images ══════════════════════════════════════════════════
async function loadImgEl(key){
  const url=await getURL(key);if(!url)return null;
  return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=url;});
}

// ═══ Core Draw Function（预览和导出共用）══════════════════════════
async function drawPoster(ctx,W,H,p,bgImg){
  const sc=W/1200;

  // 背景（全铺图片或深色背景）
  ctx.fillStyle='#1a1206';ctx.fillRect(0,0,W,H);
  if(bgImg){
    const l=iLay(bgImg.naturalWidth,bgImg.naturalHeight,W,H,p.bgImg.zoom,p.bgImg.px,p.bgImg.py);
    ctx.save();ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();
    ctx.drawImage(bgImg,l.left,l.top,l.width,l.height);ctx.restore();
  } else if(W<1200){
    ctx.fillStyle='#2a1e0a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#555';ctx.font=`${Math.round(13*sc)}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('点击右侧"上传背景图"',W/2,H/2);ctx.textAlign='left';
  }

  // 遮罩层（顶部 + 底部，参数可调）
  function drawOverlay(on,y,h,color,alpha){
    if(!on)return;
    const hex=color||'#000000';
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const a=(alpha||0)/100;
    const gy=Math.round(y*sc),gh=Math.round(h*sc);
    // 顶部方向：从实色到透明；底部方向：从透明到实色
    const isTop=(y===0||(p.overlayTopOn&&y===p.overlayTopY&&h===p.overlayTopH));
    const grad=ctx.createLinearGradient(0,gy,0,gy+gh);
    if(isTop){grad.addColorStop(0,`rgba(${r},${g},${b},${a})`);grad.addColorStop(1,`rgba(${r},${g},${b},0)`);}
    else{grad.addColorStop(0,`rgba(${r},${g},${b},0)`);grad.addColorStop(1,`rgba(${r},${g},${b},${a})`);}
    ctx.fillStyle=grad;ctx.fillRect(0,gy,W,gh);
  }
  drawOverlay(p.overlayTopOn,p.overlayTopY,p.overlayTopH,p.overlayTopColor,p.overlayTopAlpha);
  drawOverlay(p.overlayBotOn,p.overlayBotY,p.overlayBotH,p.overlayBotColor,p.overlayBotAlpha);

  // ── 胶囊绘制函数（独立宽高 + 三色渐变）──────────────────────
  // arrow=false: 圆角胶囊，居中对齐，横向三色渐变
  // arrow=true:  左箭头标签，从X开始向右，纵向三色渐变
  function drawBadge(text,font,size,weight,textColor,g1,g2,g3,cx,cy,bwPx,bhPx,radius,arrow){
    ctx.save();
    const fs=Math.round(size*sc);
    ctx.font=`${weight} ${fs}px '${font}',sans-serif`;
    ctx.textBaseline='top';
    const bw=Math.round(bwPx*sc);
    const bh=Math.round(bhPx*sc);
    const r=Math.round(radius*sc);

    if(!arrow){
      // ── 圆角胶囊（居中） ────────────────────────────────────
      const bx=Math.round(cx*sc)-bw/2;
      const by=Math.round(cy*sc);
      // 横向三色渐变: g1→g2→g1
      const grad=ctx.createLinearGradient(bx,0,bx+bw,0);
      grad.addColorStop(0,g1);
      grad.addColorStop(0.5,g2);
      grad.addColorStop(1,g1);
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,r);
      ctx.fillStyle=grad;ctx.fill();
      // 文字垂直居中
      const ty=by+(bh-fs)/2;
      ctx.fillStyle=textColor;
      drawTextLS(ctx,text,bx+bw/2,ty,0,'center');
    } else {
      // ── 左箭头标签（从cx开始向右） ─────────────────────────
      const aw=Math.round(36*sc);
      const bx=Math.round(cx*sc);
      const by=Math.round(cy*sc);
      ctx.beginPath();
      ctx.moveTo(bx+aw,by);
      ctx.lineTo(bx+bw,by);
      ctx.lineTo(bx+bw,by+bh);
      ctx.lineTo(bx+aw,by+bh);
      ctx.lineTo(bx,by+bh/2);
      ctx.closePath();
      // 纵向三色渐变: g1→g2→g3
      const grad2=ctx.createLinearGradient(bx,by,bx,by+bh);
      grad2.addColorStop(0,g1);
      grad2.addColorStop(0.5,g2);
      grad2.addColorStop(1,g3);
      ctx.fillStyle=grad2;ctx.fill();
      // 文字垂直居中（箭头区域内）
      const tx=bx+aw+(bw-aw)/2;
      const ty=by+(bh-fs)/2;
      ctx.fillStyle=textColor;
      drawTextLS(ctx,text,tx,ty,0,'center');
    }
    ctx.restore();
  }

  // ── 标题（规则6：直接用坐标，textBaseline内置在drawTextLS里）
  function drawT(t){
    if(!t||!t.text)return;
    ctx.save();
    ctx.font=`${t.weight} ${Math.round(t.size*sc)}px '${t.font}',serif,sans-serif`;
    ctx.fillStyle=t.color;
    // 文字阴影
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=Math.round(16*sc);
    ctx.shadowOffsetX=Math.round(1*sc);ctx.shadowOffsetY=Math.round(2*sc);
    drawTextLS(ctx,t.text,Math.round(t.x*sc),Math.round(t.y*sc),t.ls,t.align||'left');
    ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
    ctx.restore();
  }

  drawT(p.title);

  // 胶囊1（居中渐变胶囊）
  drawBadge(p.badge1Text,p.badge1Font,p.badge1Size,p.badge1Weight,p.badge1Color,
    p.badge1Grad1,p.badge1Grad2,p.badge1Grad3,
    p.badge1X,p.badge1Y,p.badge1W,p.badge1H,p.badge1Radius,false);

  // 价格
  drawT(p.pricePrefix);
  drawT(p.priceNum);
  drawT(p.priceSuffix);

  // 胶囊2（左箭头）
  drawBadge(p.badge2Text,p.badge2Font,p.badge2Size,p.badge2Weight,p.badge2Color,
    p.badge2Grad1,p.badge2Grad2,p.badge2Grad3,
    p.badge2X,p.badge2Y,p.badge2W,p.badge2H,p.badge2Radius,true);
}

// ═══ Render Poster（预览用小 canvas）═════════════════════════════
async function renderPoster(){
  const wrap=document.getElementById('poster-wrap');
  const p=cur();if(!p){wrap.innerHTML='';wrap.style.cssText='';return;}
  const{w,h}=pSize();
  let canvas=wrap.querySelector('canvas');
  if(!canvas){
    wrap.innerHTML='';canvas=document.createElement('canvas');
    canvas.style.cssText='box-shadow:0 20px 60px rgba(0,0,0,.6);display:block;cursor:grab;';
    wrap.appendChild(canvas);
    canvas.addEventListener('mousedown',onMD);
    canvas.addEventListener('touchstart',onTS,{passive:false});
  }
  wrap.style.cssText=`width:${w}px;height:${h}px;position:relative;flex-shrink:0;`;
  canvas.width=w;canvas.height=h;
  await document.fonts.ready;
  const bgImg=await loadImgEl(p.bgImg.imgKey);
  const ctx=canvas.getContext('2d');
  await drawPoster(ctx,w,h,p,bgImg);
}

// ═══ Drag ═════════════════════════════════════════════════════════
function onMD(e){const p=cur();if(!p||!p.bgImg.imgKey||e.button!==0)return;_dragging=true;_dragSX=e.clientX;_dragSY=e.clientY;_dragPX=p.bgImg.px;_dragPY=p.bgImg.py;e.target.style.cursor='grabbing';e.preventDefault();}
function onTS(e){const p=cur();if(!p||!p.bgImg.imgKey)return;_dragging=true;_dragSX=e.touches[0].clientX;_dragSY=e.touches[0].clientY;_dragPX=p.bgImg.px;_dragPY=p.bgImg.py;e.preventDefault();}
document.addEventListener('mousemove',async e=>{
  if(!_dragging)return;const p=cur();if(!p)return;
  const{w,h}=pSize();
  p.bgImg.px=Math.max(0,Math.min(100,_dragPX-(e.clientX-_dragSX)/w*100));
  p.bgImg.py=Math.max(0,Math.min(100,_dragPY-(e.clientY-_dragSY)/h*100));
  const sli=document.getElementById('sl-px'),sly=document.getElementById('sl-py');
  const npi=document.getElementById('ni-px'),npy=document.getElementById('ni-py');
  if(sli)sli.value=p.bgImg.px;if(sly)sly.value=p.bgImg.py;
  if(npi)npi.value=Math.round(p.bgImg.px);if(npy)npy.value=Math.round(p.bgImg.py);
  await renderPoster();
});
document.addEventListener('touchmove',async e=>{
  if(!_dragging)return;const p=cur();if(!p)return;
  const{w}=pSize();
  p.bgImg.px=Math.max(0,Math.min(100,_dragPX-(e.touches[0].clientX-_dragSX)/w*100));
  p.bgImg.py=Math.max(0,Math.min(100,_dragPY-(e.touches[0].clientY-_dragSY)/w*100));
  await renderPoster();
},{passive:false});
document.addEventListener('mouseup',async()=>{
  if(!_dragging)return;_dragging=false;
  const c=document.querySelector('#poster-wrap canvas');if(c)c.style.cursor='grab';
  const p=cur();if(p){pushH();await saveP(p);}
});
document.addEventListener('touchend',async()=>{if(!_dragging)return;_dragging=false;const p=cur();if(p){pushH();await saveP(p);}});

// ═══ Upload ═══════════════════════════════════════════════════════
function uploadBg(){
  const fi=document.getElementById('file-in');
  fi.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;const p=cur();if(!p)return;
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=async()=>{
      p.bgImg.nW=img.naturalWidth;p.bgImg.nH=img.naturalHeight;URL.revokeObjectURL(url);
      const key=ikey(curId,'bgImg');await saveImg(key,file);p.bgImg.imgKey=key;
      p.bgImg.px=50;p.bgImg.py=50;p.bgImg.zoom=1;
      pushH();await saveP(p);await renderPoster();renderRP();
    };img.src=url;fi.value='';
  };fi.click();
}

        </div>
      </div>
      ${p.overlayBotOn?`
      <div class="rp-row"><label>颜色</label>
        <div class="col-dot" style="background:${toHex(p.overlayBotColor)};" onclick="document.getElementById('clr-ob').click()"></div>
        <input id="clr-ob" type="color" value="${toHex(p.overlayBotColor)}" style="display:none" onchange="setP('overlayBotColor',this.value);this.previousElementSibling.style.background=this.value">
        <span class="rp-unit">不透明度</span>
        <input type="number" min="0" max="100" value="${p.overlayBotAlpha||70}" class="rp-num" oninput="setPN('overlayBotAlpha',+this.value)">
        <span class="rp-unit">%</span>
      </div>
      <div class="pos-row"><label>起点Y</label>
        <input type="range" min="0" max="1600" value="${p.overlayBotY||960}" class="pos-sl" oninput="setPN('overlayBotY',+this.value);document.getElementById('ni-oby').value=this.value">
        <input id="ni-oby" type="number" value="${p.overlayBotY||960}" class="rp-num" oninput="setPN('overlayBotY',+this.value);this.previousElementSibling.value=this.value">
      </div>
      <div class="pos-row"><label>高度</label>
        <input type="range" min="50" max="1600" value="${p.overlayBotH||640}" class="pos-sl" oninput="setPN('overlayBotH',+this.value);document.getElementById('ni-obh').value=this.value">
        <input id="ni-obh" type="number" value="${p.overlayBotH||640}" class="rp-num" oninput="setPN('overlayBotH',+this.value);this.previousElementSibling.value=this.value">
      </div>`:''}
    </div>
    ${txtCtrl('① 标题大字','title')}
    ${badgeCtrl('② 胶囊标签1（中间）','badge1')}
    ${txtCtrl('③ 价格前缀（¥）','pricePrefix')}
    ${txtCtrl('④ 价格数字','priceNum')}
    ${txtCtrl('⑤ 价格后缀（起/桌）','priceSuffix')}
    ${badgeCtrl('⑥ 胶囊标签2（右下箭头）','badge2')}

    <div class="rp-sec">
      <div class="rp-sec-t">项目备份</div>
      <div class="bk-row">
        <button class="bk-btn" onclick="exportJSON()">⬇ 导出备份</button>
        <button class="bk-btn" onclick="importJSON()">⬆ 导入备份</button>
      </div>
    </div>`;
}

// ═══ Setters ══════════════════════════════════════════════════════
async function toggleOverlay(side){
  const p=cur();if(!p)return;pushH();
  p['overlay'+side+'On']=!p['overlay'+side+'On'];
  await saveP(p);await renderPoster();renderRP();
}
async function setTxt(tk,prop,val){const p=cur();if(!p)return;pushH();p[tk][prop]=val;await saveP(p);await renderPoster();}
async function setP(key,val){const p=cur();if(!p)return;pushH();p[key]=val;await saveP(p);await renderPoster();}
async function setPN(key,val){const p=cur();if(!p)return;pushH();p[key]=+val;await saveP(p);await renderPoster();}
async function setBgP(key,val){const p=cur();if(!p)return;p.bgImg[key]=+val;await renderPoster();await saveP(p);}

// ═══ Export PNG（规则1，4：fonts.ready + toBlob）═══════════════
async function exportPNG(){
  const p=cur();if(!p)return;
  if(!await wpCheckExportQuota())return;
  const btn=document.getElementById('export-btn');btn.textContent='生成中…';btn.disabled=true;
  try{
    await document.fonts.ready;
    const bgImg=await loadImgEl(p.bgImg.imgKey);
    const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=1600;
    const ctx=canvas.getContext('2d');
    await drawPoster(ctx,1200,1600,p,bgImg);
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.download=`${p.name||'poster'}_1200x1600.png`;a.href=url;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    },'image/png');
  }catch(err){console.error(err);alert('导出失败，请重试');}
  finally{btn.textContent='↓ 导出 PNG 1200×1600';btn.disabled=false;}
}

window.addEventListener('resize',()=>{if(curId)renderPoster();});
(async()=>{await wpCheckAuth();await openDB();await loadAll();renderProjList();})();
</script>
